            private void handleIntent(Intent intent) {
                if (intent == null) return;
                if (Intent.ACTION_SEND.equals(intent.getAction()) && "text/plain".equals(intent.getType())) {
                    String sharedText = intent.getStringExtra(Intent.EXTRA_TEXT);
                    if (sharedText != null) {
                        inputText.setText(sharedText);
                        sp.edit().putString("sync_text", sharedText).apply();
                    }
                } else if (intent.hasExtra("SYNC_TEXT")) {
                    String syncText = intent.getStringExtra("SYNC_TEXT");
                    if (syncText != null && !syncText.isEmpty()) {
                        inputText.setText(syncText);
                        sp.edit().putString("sync_text", syncText).apply();
                    }
                }
            }

            private void startFloatingService() {
