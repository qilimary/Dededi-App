        package com.app.dededi;
        import android.annotation.SuppressLint;
        import android.app.Notification;
        import android.app.NotificationChannel;
        import android.app.NotificationManager;
        import android.app.Service;
        import android.content.ClipData;
        import android.content.ClipboardManager;
        import android.content.Context;
        import android.content.Intent;
        import android.content.SharedPreferences;
        import android.graphics.PixelFormat;
        import android.os.Build;
        import android.os.Handler;
        import android.os.IBinder;
        import android.os.Looper;
        import android.text.Editable;
        import android.text.TextWatcher;
        import android.view.Gravity;
        import android.view.LayoutInflater;
        import android.view.MotionEvent;
        import android.view.View;
        import android.view.WindowManager;
        import android.widget.Button;
        import android.widget.EditText;
        import android.widget.ProgressBar;
        import android.widget.TextView;
        import android.widget.Toast;
        import org.pytorch.IValue;
        import org.pytorch.Tensor;
        import java.util.ArrayList;
        import java.util.List;
        import java.io.File;
        import java.io.FileOutputStream;

        public class FloatingService extends Service {
            private WindowManager windowManager;
            private View floatView;
            private WindowManager.LayoutParams params;
            private View panelInput;
            private EditText editFloatInput;
            private View circleSpin;
            private TextView tvStatus;
            private View statusContainer;
            private ProgressBar floatProgressBar;
            private Button btnFloatSwitch;
            private boolean isChecking = false;
            private volatile boolean isInterruptRequested = false;
            
            private long lastStatusTime = 0;
            private boolean lastStatusWasTypo = false;
            
            private Runnable hideStatusRunnable = () -> statusContainer.setVisibility(View.INVISIBLE);

            private void saveHistory(String text) {
                if (text == null || text.trim().isEmpty()) return;
                try {
                    SharedPreferences sp = getSharedPreferences("DedediConfig", Context.MODE_PRIVATE);
                    String historyStr = sp.getString("history_records", "[]");
                    org.json.JSONArray historyArray = new org.json.JSONArray(historyStr);
                    
                    // 去重：比较最后一条的hash
                    int currentHash = text.hashCode();
                    if (historyArray.length() > 0) {
                        org.json.JSONObject lastRecord = historyArray.getJSONObject(0);
                        if (lastRecord.has("textHash") && lastRecord.getInt("textHash") == currentHash) return;
                        if (lastRecord.has("text") && lastRecord.getString("text").equals(text)) return;
                    }
                    
                    org.json.JSONObject newRecord = new org.json.JSONObject();
                    newRecord.put("time", new java.text.SimpleDateFormat("yyyy-MM-dd HH:mm:ss", java.util.Locale.getDefault()).format(new java.util.Date()));
                    newRecord.put("textHash", currentHash);
                    
                    String preview = text.length() > 16 ? text.substring(0, 16).replace("\n", " ") + "..." : text.replace("\n", " ");
                    newRecord.put("preview", preview);
                    
                    String fileId = java.util.UUID.randomUUID().toString();
                    newRecord.put("file", fileId);
                    
                    File dir = new File(getFilesDir(), "history");
                    if (!dir.exists()) dir.mkdirs();
                    FileOutputStream fos = new FileOutputStream(new File(dir, fileId + ".txt"));
                    fos.write(text.getBytes("UTF-8"));
                    fos.close();
                    
                    if (!MainActivity.allSentencesBlocks.isEmpty()) {
                        String blocksJson = MainActivity.serializeBlocks(MainActivity.allSentencesBlocks);
                        FileOutputStream fosBlocks = new FileOutputStream(new File(dir, fileId + "_blocks.json"));
                        fosBlocks.write(blocksJson.getBytes("UTF-8"));
                        fosBlocks.close();
                    }
                    
                    org.json.JSONArray newArray = new org.json.JSONArray();
                    newArray.put(newRecord);
                    int limit = Math.min(historyArray.length(), 49);
                    for (int i = 0; i < limit; i++) {
                        newArray.put(historyArray.getJSONObject(i));
                    }
                    
                    if (historyArray.length() >= 50) {
                        for (int i = 49; i < historyArray.length(); i++) {
                            String oldFileId = historyArray.getJSONObject(i).optString("file", "");
                            if (!oldFileId.isEmpty()) {
                                new File(dir, oldFileId + ".txt").delete();
                                new File(dir, oldFileId + "_blocks.json").delete();
                            }
                        }
                    }
                    sp.edit().putString("history_records", newArray.toString()).apply();
                } catch (Exception e) {}
            }

            @Override
            public int onStartCommand(Intent intent, int flags, int startId) {
                if (intent != null && intent.hasExtra("IMPORTED_TEXT")) {
                    String text = intent.getStringExtra("IMPORTED_TEXT");
                    if (editFloatInput != null) {
                        editFloatInput.setText(text);
                        saveHistory(text);
                        Toast.makeText(this, "导入成功", Toast.LENGTH_SHORT).show();
                        if (panelInput != null && panelInput.getVisibility() != View.VISIBLE) {
                            panelInput.setVisibility(View.VISIBLE);
                            setFocusable(true);
                        }
                    }
                }
                return super.onStartCommand(intent, flags, startId);
            }

            @SuppressLint("ClickableViewAccessibility")
            @Override
            public void onCreate() {
                super.onCreate();
                MainActivity.loadTypoMap(this);

                if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                    NotificationChannel channel = new NotificationChannel("float_chan", "悬浮窗后台服务", NotificationManager.IMPORTANCE_LOW);
                    getSystemService(NotificationManager.class).createNotificationChannel(channel);
                    Notification notification = new Notification.Builder(this, "float_chan")
                            .setContentTitle("“的地得”纠错AI")
                            .setContentText("悬浮窗运行中")
                            .setSmallIcon(R.drawable.ic_dededi_fg)
                            .build();
                    startForeground(1, notification);
                }

                windowManager = (WindowManager) getSystemService(WINDOW_SERVICE);
                int layoutFlag = Build.VERSION.SDK_INT >= Build.VERSION_CODES.O ? WindowManager.LayoutParams.TYPE_APPLICATION_OVERLAY : WindowManager.LayoutParams.TYPE_PHONE;
                params = new WindowManager.LayoutParams(WindowManager.LayoutParams.WRAP_CONTENT, WindowManager.LayoutParams.WRAP_CONTENT, layoutFlag, WindowManager.LayoutParams.FLAG_NOT_FOCUSABLE | WindowManager.LayoutParams.FLAG_WATCH_OUTSIDE_TOUCH, PixelFormat.TRANSLUCENT);
                params.gravity = Gravity.TOP | Gravity.START;
                params.x = 0; params.y = 300;

                LayoutInflater inflater = (LayoutInflater) getSystemService(LAYOUT_INFLATER_SERVICE);
                floatView = inflater.inflate(R.layout.layout_floating, null);

                panelInput = floatView.findViewById(R.id.panelInput);
                editFloatInput = floatView.findViewById(R.id.editFloatInput);
                circleSpin = floatView.findViewById(R.id.circleSpin);
                tvStatus = floatView.findViewById(R.id.tvStatus);
                statusContainer = floatView.findViewById(R.id.statusContainer);
                floatProgressBar = floatView.findViewById(R.id.floatProgressBar);
                View btnCircle = floatView.findViewById(R.id.btnCircle);
                View panelTopBar = floatView.findViewById(R.id.panelTopBar);

                Button btnFloatImport = floatView.findViewById(R.id.btnFloatImport);
                Button btnFloatPaste = floatView.findViewById(R.id.btnFloatPaste);
                Button btnFloatClear = floatView.findViewById(R.id.btnFloatClear);
                Button btnFloatCheck = floatView.findViewById(R.id.btnFloatCheck);
                Button btnFloatCopy = floatView.findViewById(R.id.btnFloatCopy);
                btnFloatSwitch = floatView.findViewById(R.id.btnFloatSwitch);
                Button btnFloatJump = floatView.findViewById(R.id.btnFloatJump);
                Button btnFloatCloseAll = floatView.findViewById(R.id.btnFloatCloseAll);
                
                editFloatInput.addTextChangedListener(new TextWatcher() {
                    @Override public void beforeTextChanged(CharSequence s, int start, int count, int after) {}
                    @Override public void onTextChanged(CharSequence s, int start, int before, int count) {}
                    @Override public void afterTextChanged(Editable s) {
                        if (!isChecking) {
                            getSharedPreferences("DedediConfig", Context.MODE_PRIVATE).edit().putString("sync_text", s.toString()).apply();
                        }
                    }
                });

                floatView.setOnTouchListener((v, event) -> {
                    if (event.getAction() == MotionEvent.ACTION_OUTSIDE) {
                        if (panelInput.getVisibility() == View.VISIBLE) {
                            panelInput.setVisibility(View.GONE);
