                    }
                });
            }

            @Override
            protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                super.onActivityResult(requestCode, resultCode, data);
                if (requestCode == 101 && resultCode == RESULT_OK && data != null && data.getData() != null) {
                    try {
                        OutputStream os = getContentResolver().openOutputStream(data.getData());
                        if (os != null) {
                            os.write(cleanTextResult.getBytes(StandardCharsets.UTF_8));
                            os.close();
                            Toast.makeText(this, "保存成功", Toast.LENGTH_SHORT).show();
                        }
                    } catch (Exception ignored) {}
                }
            }

            private void loadVocab(Map<String, Long> map, String assetName) throws Exception {
                InputStream is = getAssets().open(assetName);
                byte[] buffer = new byte[is.available()];
                is.read(buffer); is.close();
                JSONObject json = new JSONObject(new String(buffer, StandardCharsets.UTF_8));
                Iterator<String> keys = json.keys();
                while(keys.hasNext()) {
                    String key = keys.next();
                    map.put(key, (long) json.getInt(key));
                }
            }

            // GZIP解压 + AES流式双重处理，保障安全并控制极致体积
            private Module loadDecryptedModule(Context context, String assetName) throws Exception {
                byte[] keyBytes = getSecretKey(); 
                byte[] ivBytes = "1234567890123456".getBytes(StandardCharsets.UTF_8);
                
                Cipher cipher = Cipher.getInstance("AES/CBC/PKCS5Padding");
                cipher.init(Cipher.DECRYPT_MODE, new SecretKeySpec(keyBytes, "AES"), new IvParameterSpec(ivBytes));

                File file = new File(context.getFilesDir(), assetName + ".tmp");
                try (InputStream is = context.getAssets().open(assetName);
                     CipherInputStream cis = new CipherInputStream(is, cipher);
                     GZIPInputStream gis = new GZIPInputStream(cis);
                     FileOutputStream os = new FileOutputStream(file)) {
                    byte[] buffer = new byte[8192];
                    int read;
                    while ((read = gis.read(buffer)) != -1) {
                        os.write(buffer, 0, read);
                    }
                    os.flush();
                }
                Module module = LiteModuleLoader.load(file.getAbsolutePath());
                file.delete(); 
                return module;
            }

            private void doInference(boolean isFastMode) {
                String text = inputText.getText().toString();
                if (text.isEmpty()) return;

                btnCheck.setEnabled(false); btnCopy.setEnabled(false); btnSaveTxt.setEnabled(false);
                outputText.setText(isFastMode ? "极速版正在审查..." : "专业版大模型正在思考...");

                final float temp, tDe, tDi, tDe3;
                float t1 = 1.2f, t2 = 0.70f, t3 = 0.76f, t4 = 0.76f;
                try {
                    t1 = Float.parseFloat(editTemp.getText().toString());
                    t2 = Float.parseFloat(editThreshDe1.getText().toString());
                    t3 = Float.parseFloat(editThreshDe2.getText().toString());
                    t4 = Float.parseFloat(editThreshDe3.getText().toString());
                } catch (Exception ignored) {}
                temp = t1; tDe = t2; tDi = t3; tDe3 = t4;

                new Thread(() -> {
                    try {
                        long startTime = System.currentTimeMillis();
                        String[] labels = {"的", "地", "得"};
                        String[] sentences = text.split("(?<=[。！？!?\n])");
                        
                        StringBuilder errorsHtmlBuilder = new StringBuilder(); 
                        StringBuilder fullHtmlBuilder = new StringBuilder();   
                        StringBuilder cleanTextBuilder = new StringBuilder();  
                        int totalChangeCount = 0;
                        long lastUpdateTime = System.currentTimeMillis();

                        for (int sIdx = 0; sIdx < sentences.length; sIdx++) {
                            String sentence = sentences[sIdx];
                            if (sentence.isEmpty()) { fullHtmlBuilder.append("<br>"); cleanTextBuilder.append("\n"); continue; }

                            boolean[] isIgnored = new boolean[sentence.length()];
                            for (String w : IGNORE_WORDS) {
                                int idx = sentence.indexOf(w);
                                while (idx >= 0) {
                                    for (int k = 0; k < w.length(); k++) isIgnored[idx + k] = true;
                                    idx = sentence.indexOf(w, idx + 1);
                                }
                            }

                            boolean hasTarget = false;
                            for (int i = 0; i < sentence.length(); i++) {
                                char c = sentence.charAt(i);
                                if ((c == '的' || c == '地' || c == '得') && !isIgnored[i]) { 
                                    hasTarget = true; break; 
                                }
                            }

                            boolean currentSentenceHasError = false;
                            StringBuilder sClean = new StringBuilder();
                            StringBuilder sFullHtml = new StringBuilder();
                            StringBuilder sErrorHtml = new StringBuilder();

                            if (!hasTarget) {
                                sClean.append(sentence);
                                for (int i = 0; i < sentence.length(); i++) {
                                    char ch = sentence.charAt(i);
                                    if (ch == '\n') { sFullHtml.append("<br>"); sErrorHtml.append("<br>"); }
                                    else { sFullHtml.append(ch); sErrorHtml.append(ch); }
                                }
                            } else {
                                float[] scores;
                                int vocabSize = isFastMode ? 3 : proVocab.size();

                                if (isFastMode) {
                                    long fUnk = fastVocab.getOrDefault("[UNK]", 1L);
                                    long fMask = fastVocab.getOrDefault("[MASK]", 2L);
                                    long[] ids = new long[sentence.length()];
                                    for (int i = 0; i < sentence.length(); i++) {
                                        String ch = String.valueOf(sentence.charAt(i));
                                        if (!isIgnored[i] && (ch.equals("的") || ch.equals("地") || ch.equals("得"))) ids[i] = fMask;
                                        else ids[i] = fastVocab.getOrDefault(ch, fUnk);
                                    }
                                    Tensor inputTensor = Tensor.fromBlob(ids, new long[]{1, sentence.length()});
                                    scores = fastModule.forward(IValue.from(inputTensor)).toTensor().getDataAsFloatArray();
                                } else {
                                    int exactLen = sentence.length() + 2;
                                    long[] ids = new long[exactLen];
                                    long[] masks = new long[exactLen];
                                    long[] types = new long[exactLen];

                                    ids[0] = clsId; masks[0] = 1; types[0] = 0;
                                    for (int i = 0; i < sentence.length(); i++) {
                                        String ch = String.valueOf(sentence.charAt(i));
                                        if (!isIgnored[i] && (ch.equals("的") || ch.equals("地") || ch.equals("得"))) ids[i + 1] = maskId;
                                        else ids[i + 1] = proVocab.getOrDefault(ch, unkId);
                                        masks[i + 1] = 1; types[i + 1] = 0;
                                    }
                                    ids[exactLen - 1] = sepId; masks[exactLen - 1] = 1; types[exactLen - 1] = 0;

                                    Tensor tIds = Tensor.fromBlob(ids, new long[]{1, exactLen});
                                    Tensor tMasks = Tensor.fromBlob(masks, new long[]{1, exactLen});
                                    Tensor tTypes = Tensor.fromBlob(types, new long[]{1, exactLen});

                                    IValue outputVal = proModule.forward(IValue.from(tIds), IValue.from(tMasks), IValue.from(tTypes));
                                    Tensor outTensor = outputVal.isTuple() ? outputVal.toTuple()[0].toTensor() : outputVal.toTensor();
                                    scores = outTensor.getDataAsFloatArray();
                                }

                                for (int i = 0; i < sentence.length(); i++) {
                                    char ch = sentence.charAt(i);
                                    
                                    if (isIgnored[i]) {
                                        sClean.append(ch);
                                        if (ch == '\n') { sFullHtml.append("<br>"); sErrorHtml.append("<br>"); }
                                        else { sFullHtml.append(ch); sErrorHtml.append(ch); }
                                        continue;
                                    }

                                    if (ch == '的' || ch == '地' || ch == '得') {
                                        float s0, s1, s2;
                                        if (isFastMode) {
                                            int base = i * 3;
                                            s0 = (float) Math.exp(scores[base] / temp);
                                            s1 = (float) Math.exp(scores[base + 1] / temp);
                                            s2 = (float) Math.exp(scores[base + 2] / temp);
                                        } else {
                                            int seqPos = i + 1; 
                                            s0 = (float) Math.exp(scores[seqPos * vocabSize + (int)deId] / temp);
                                            s1 = (float) Math.exp(scores[seqPos * vocabSize + (int)diId] / temp);
                                            s2 = (float) Math.exp(scores[seqPos * vocabSize + (int)de2Id] / temp);
                                        }

                                        float sum = s0 + s1 + s2;
                                        float p0 = s0 / sum, p1 = s1 / sum, p2 = s2 / sum;

                                        int maxIdx = 0; float maxProb = p0;
                                        if (p1 > maxProb) { maxProb = p1; maxIdx = 1; }
                                        if (p2 > maxProb) { maxProb = p2; maxIdx = 2; }

                                        float threshold = tDe;
                                        if (maxIdx == 1) threshold = tDi;
                                        if (maxIdx == 2) threshold = tDe3;

                                        String pred = labels[maxIdx];
                                        if (!pred.equals(String.valueOf(ch)) && maxProb >= threshold) {
                                            currentSentenceHasError = true;
                                            totalChangeCount++;
                                            sClean.append(pred);
                                            sFullHtml.append("<font color='#E53935'><b>").append(pred).append("</b></font>");
                                            sErrorHtml.append("<font color='#E53935'>").append(ch).append("</font>→<b>").append(pred).append("</b><font color='#888888'><small>（置信度：").append(String.format("%.2f", maxProb)).append("）</small></font> ");
                                        } else {
                                            sClean.append(ch); sFullHtml.append(ch); sErrorHtml.append(ch);
                                        }
                                    } else {
                                        sClean.append(ch);
                                        if (ch == '\n') { sFullHtml.append("<br>"); sErrorHtml.append("<br>"); }
                                        else { sFullHtml.append(ch); sErrorHtml.append(ch); }
                                    }
                                }
                            }

                            cleanTextBuilder.append(sClean);
                            fullHtmlBuilder.append(sFullHtml);
                            if (currentSentenceHasError) errorsHtmlBuilder.append(sErrorHtml).append("<br>");

                            long now = System.currentTimeMillis();
                            if (now - lastUpdateTime > 300 || sIdx == sentences.length - 1) {
                                lastUpdateTime = now;
                                double sec = (now - startTime) / 1000.0;
                                StringBuilder report = new StringBuilder();
                                report.append("<b>AI 正在审查中... 已耗时 <font color='#2196F3'>").append(String.format("%.1f", sec)).append("</font> 秒</b><br>");
                                report.append("进度：已分析 ").append(sIdx + 1).append(" / ").append(sentences.length).append(" 句<br><br>");
                                if (errorsHtmlBuilder.length() > 0) {
                                    report.append("<font color='#757575'><b>【已发现误用：】</b></font><br>").append(errorsHtmlBuilder.toString()).append("<br>");
                                }
                                report.append("<font color='#757575'><b>【动态修正预览】</b></font><br>").append(fullHtmlBuilder.toString());
                                final String snap = report.toString();
                                runOnUiThread(() -> outputText.setText(Html.fromHtml(snap, Html.FROM_HTML_MODE_COMPACT)));
                            }
                        }

                        cleanTextResult = cleanTextBuilder.toString();
                        double totalSec = (System.currentTimeMillis() - startTime) / 1000.0;
                        StringBuilder report = new StringBuilder();
                        report.append("<b>检查完毕！共更正 <font color='#E53935'>").append(totalChangeCount).append("</font> 处。耗时 ").append(String.format("%.2f", totalSec)).append(" 秒。</b><br><br>");
                        if (totalChangeCount > 0) {
                            report.append("<font color='#757575'><b>【更正清单：】</b></font><br>").append(errorsHtmlBuilder.toString()).append("<br>---------------------------------------<br><br>");
                        }
                        report.append("<font color='#757575'><b>【修正后的全文】</b></font><br>").append(fullHtmlBuilder.toString());
                        final String finalHtml = report.toString();
                        runOnUiThread(() -> {
                            outputText.setText(Html.fromHtml(finalHtml, Html.FROM_HTML_MODE_COMPACT));
                            btnCheck.setEnabled(true); btnCopy.setEnabled(true); btnSaveTxt.setEnabled(true);
                        });

                    } catch (Exception e) {
                        final String err = e.getMessage();
                        runOnUiThread(() -> {
                            outputText.setText("推理运行中断: " + err);
                            btnCheck.setEnabled(true);
                        });
                    }
                }).start();
            }
        }
        EOF

        wget -q https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.jar -O gradle/wrapper/gradle-wrapper.jar
        wget -q https://raw.githubusercontent.com/gradle/gradle/master/gradlew -O gradlew
        chmod +x gradlew

        cat << 'EOF' > gradle/wrapper/gradle-wrapper.properties
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-7.5-bin.zip
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        EOF

    - name: set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    - name: Build APK (Release mode)
      run: |
        ./gradlew assembleRelease --stacktrace --console=plain > build_output.log 2>&1 || {
          echo "### ❌ 编译未通过！以下是具体报错信息：" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`text" >> $GITHUB_STEP_SUMMARY
          tail -n 100 build_output.log >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          exit 1
        }

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Dededi-App-APK-Pro
        path: app/build/outputs/apk/release/app-release.apk
