                btnFloatSwitch = floatView.findViewById(R.id.btnFloatSwitch);
                Button btnFloatJump = floatView.findViewById(R.id.btnFloatJump);
                Button btnFloatCloseAll = floatView.findViewById(R.id.btnFloatCloseAll);

                editFloatInput.addTextChangedListener(new TextWatcher() {
                    @Override public void beforeTextChanged(CharSequence s, int start, int count, int after) {}
                    @Override public void onTextChanged(CharSequence s, int start, int before, int count) {}
                    @Override public void afterTextChanged(Editable s) {
