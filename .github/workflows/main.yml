                btnFloatJump.setOnClickListener(v -> jumpToApp.run());
                
                btnFloatCloseAll.setOnClickListener(v -> stopSelf());

                View.OnTouchListener dragListener = new View.OnTouchListener() {
                    private int initialX, initialY;
                    private float initialTouchX, initialTouchY;
                    private boolean isMoved = false;
                    private boolean isLongPressed = false;
                    private Handler handler = new Handler(Looper.getMainLooper());
                    private Runnable longPressRunnable = () -> {
                        isLongPressed = true;
                        jumpToApp.run();
                    };

                    @Override public boolean onTouch(View v, MotionEvent event) {
                        switch (event.getAction()) {
                            case MotionEvent.ACTION_DOWN:
                                initialX = params.x; initialY = params.y;
                                initialTouchX = event.getRawX(); initialTouchY = event.getRawY();
                                isMoved = false;
                                isLongPressed = false;
                                if (v.getId() == R.id.btnCircle) {
                                    handler.postDelayed(longPressRunnable, 500); 
                                }
                                return true; 
                            case MotionEvent.ACTION_MOVE:
                                int dx = (int) (event.getRawX() - initialTouchX);
                                int dy = (int) (event.getRawY() - initialTouchY);
                                if (!isMoved && (Math.abs(dx) > 10 || Math.abs(dy) > 10)) {
                                    isMoved = true;
                                    handler.removeCallbacks(longPressRunnable); 
                                }
                                if (isMoved) {
                                    params.x = initialX + dx; params.y = initialY + dy;
                                    windowManager.updateViewLayout(floatView, params);
                                }
                                return true;
                            case MotionEvent.ACTION_UP:
                            case MotionEvent.ACTION_CANCEL:
                                handler.removeCallbacks(longPressRunnable); 
                                if (!isMoved && !isLongPressed && v.getId() == R.id.btnCircle) {
                                    if (!isChecking) {
                                        boolean isVisible = panelInput.getVisibility() == View.VISIBLE;
                                        if (!isVisible) {
                                            String sync = getSharedPreferences("DedediConfig", Context.MODE_PRIVATE).getString("sync_text", "");
                                            if (!sync.isEmpty() && !sync.equals(editFloatInput.getText().toString())) {
                                                editFloatInput.setText(sync);
                                            }
                                        }
                                        panelInput.setVisibility(isVisible ? View.GONE : View.VISIBLE);
                                        setFocusable(!isVisible);
                                    } else {
                                        isInterruptRequested = true;
                                        showStatus("已中断", true);
                                    }
                                }
                                return true;
                        }
                        return false;
                    }
                };

                btnCircle.setOnTouchListener(dragListener);
                panelTopBar.setOnTouchListener(dragListener);
                panelInput.setOnTouchListener(dragListener);
                
                windowManager.addView(floatView, params);
            }

            private void setFocusable(boolean focusable) {
                if (focusable) {
                    params.flags = WindowManager.LayoutParams.FLAG_NOT_TOUCH_MODAL | WindowManager.LayoutParams.FLAG_WATCH_OUTSIDE_TOUCH;
                } else {
                    params.flags = WindowManager.LayoutParams.FLAG_NOT_FOCUSABLE | WindowManager.LayoutParams.FLAG_WATCH_OUTSIDE_TOUCH;
                }
                windowManager.updateViewLayout(floatView, params);
            }

            private void showStatus(String msg, boolean autoHide) {
                new Handler(Looper.getMainLooper()).post(() -> {
                    tvStatus.setText(msg);
                    statusContainer.setVisibility(View.VISIBLE);
                    floatProgressBar.setVisibility(View.GONE);
                    statusContainer.removeCallbacks(hideStatusRunnable);
                    if (autoHide) {
                        statusContainer.postDelayed(hideStatusRunnable, 3000);
                    }
                });
            }
            
            private void syncShowStatus(String msg, boolean isTypo) {
                long now = System.currentTimeMillis();
                if (lastStatusWasTypo) {
                    long diff = now - lastStatusTime;
                    if (diff < 1000) {
                        try { Thread.sleep(1000 - diff); } catch (Exception e){}
                    }
                }
                lastStatusTime = System.currentTimeMillis();
                lastStatusWasTypo = isTypo;
                
                new Handler(Looper.getMainLooper()).post(() -> {
                    if(!isInterruptRequested) {
                        tvStatus.setText(msg);
                        statusContainer.setVisibility(View.VISIBLE);
                        statusContainer.removeCallbacks(hideStatusRunnable);
                        statusContainer.postDelayed(hideStatusRunnable, 5000);
                    }
                });
            }

            private void startInference(String text) {
                SharedPreferences sp = getSharedPreferences("DedediConfig", Context.MODE_PRIVATE);
                boolean isFastMode = sp.getBoolean("is_fast_mode", false);
                String prefix = isFastMode ? "fast_" : "pro_";
                float temp = Float.parseFloat(sp.getString(prefix + "temp", isFastMode ? "1.2" : "1.0"));

                if (temp > 0.0f) {
                    if (isFastMode && MainActivity.fastModule == null) { Toast.makeText(this, "极速引擎未加载，请先打开一次主界面", Toast.LENGTH_SHORT).show(); return; }
                    if (!isFastMode && MainActivity.proModule == null) { Toast.makeText(this, "专业大模型未加载，请先打开一次主界面", Toast.LENGTH_SHORT).show(); return; }
                } else {
                    Toast.makeText(this, "已关闭“的地得”纠错，仅开启错别字纠错。", Toast.LENGTH_LONG).show();
                }
                float tDe = Float.parseFloat(sp.getString(prefix + "th1", isFastMode ? "0.80" : "0.70"));
                float tDi = Float.parseFloat(sp.getString(prefix + "th2", isFastMode ? "0.80" : "0.75"));
                float tDe3 = Float.parseFloat(sp.getString(prefix + "th3", isFastMode ? "0.80" : "0.75"));

                isChecking = true;
                isInterruptRequested = false;
                btnFloatSwitch.setEnabled(false);
                lastStatusTime = 0;
                lastStatusWasTypo = false;
                
                showStatus("正在纠错……", false);
                new Handler(Looper.getMainLooper()).post(() -> {
                    floatProgressBar.setVisibility(View.VISIBLE);
                    floatProgressBar.setProgress(0);
                });
                circleSpin.setVisibility(View.VISIBLE);

                new Thread(() -> {
                    try {
                        String[] labels = {"的", "地", "得"};
                                        // ===== 一级分割：按句号等强断点 =====
                        java.util.List<String> sList = new java.util.ArrayList<>();
                        StringBuilder tSb = new StringBuilder();
                        for (int i = 0; i < text.length(); i++) {
                            char c = text.charAt(i); tSb.append(c);
                            if (c == '。' || c == '！' || c == '？' || c == '!' || c == '?' || c == '\n') {
                                sList.add(tSb.toString()); tSb.setLength(0);
                            }
                        }
                        if (tSb.length() > 0) sList.add(tSb.toString());
        
                        // ===== 二级保底分割：确保单段不超过 300 字 =====
                        final int MAX_SEQ_LEN = 300;
                        java.util.List<String> finalList = new java.util.ArrayList<>();
                        for (String seg : sList) {
                            if (seg.length() <= MAX_SEQ_LEN) { finalList.add(seg); continue; }
                            StringBuilder sb2 = new StringBuilder();
                            for (int i = 0; i < seg.length(); i++) {
                                sb2.append(seg.charAt(i));
                                if (sb2.length() >= MAX_SEQ_LEN) {
                                    String sub = sb2.toString();
                                    // 从末尾往回找最近的弱断点（逗号/分号/顿号）
                                    int splitPos = -1;
                                    for (int j = sub.length() - 1; j >= Math.max(0, sub.length() - 60); j--) {
                                        char sc = sub.charAt(j);
                                        if (sc == '，' || sc == ',' || sc == '；' || sc == ';' || sc == '、') {
                                            splitPos = j; break;
                                        }
                                    }
                                    if (splitPos > 0) {
                                        finalList.add(sub.substring(0, splitPos + 1));
                                        sb2 = new StringBuilder(sub.substring(splitPos + 1));
                                    } else {
                                        // 找不到自然断点，强制截断
                                        finalList.add(sub);
                                        sb2 = new StringBuilder();
                                    }
                                }
                            }
                            if (sb2.length() > 0) finalList.add(sb2.toString());
                        }
                        String[] sentences = finalList.toArray(new String[0]);
                        StringBuilder fullCleanText = new StringBuilder();
                        int[] errorCount = {0};
                        
                        long startTime = System.currentTimeMillis();
                        List<List<MainActivity.TextBlock>> syncAllBlocks = new ArrayList<>();
                        long lastUIUpdateTime = System.currentTimeMillis();

                        for (int sIdx = 0; sIdx < sentences.length; sIdx++) {
                            if (isInterruptRequested) {
                                new Handler(Looper.getMainLooper()).post(() -> {
                                    isChecking = false;
                                    btnFloatSwitch.setEnabled(true);
                                    circleSpin.setVisibility(View.INVISIBLE);
                                });
                                return;
                            }
                            
                            long now = System.currentTimeMillis();
                            if (now - lastUIUpdateTime > 300 || sIdx == sentences.length - 1) {
                                lastUIUpdateTime = now;
                                int currentProgress = sIdx + 1;
                                int maxProgress = sentences.length;
                                new Handler(Looper.getMainLooper()).post(() -> {
                                    if (!isInterruptRequested) {
                                        floatProgressBar.setMax(maxProgress);
                                        floatProgressBar.setProgress(currentProgress);
                                    }
                                });
                            }

                            String sentence = sentences[sIdx];
                            if (sentence.isEmpty()) continue;
                            
                            List<MainActivity.TextBlock> currentSentenceBlocks = new ArrayList<>();
                            
                            List<String> combinedIgnore = new ArrayList<>(java.util.Arrays.asList(MainActivity.IGNORE_WORDS));
                            combinedIgnore.addAll(MainActivity.typoMap.keySet());
                            boolean[] isIgnored = new boolean[sentence.length()];
                            for (String w : combinedIgnore) {
                                int idx = sentence.indexOf(w);
                                while (idx >= 0) {
                                    for (int k = 0; k < w.length(); k++) isIgnored[idx + k] = true;
                                    idx = sentence.indexOf(w, idx + 1);
                                }
                            }
                            
                            boolean hasTarget = false;
                            for (int i = 0; i < sentence.length(); i++) {
                                char c = sentence.charAt(i);
                                if ((c == '的' || c == '地' || c == '得') && !isIgnored[i]) { hasTarget = true; break; }
                            }
                            
                            if (!hasTarget || temp <= 0.0f) {
                                currentSentenceBlocks.add(new MainActivity.TextBlock(sentence, sentence, false, 0f, 0));
                            } else {
                                float[] scores;
                                int vocabSize = isFastMode ? 3 : MainActivity.proVocab.size();
                                if (isFastMode) {
                                    long fUnk = MainActivity.fastVocab.getOrDefault("[UNK]", 1L);
                                    long fMask = MainActivity.fastVocab.getOrDefault("[MASK]", 2L);
                                    long[] ids = new long[sentence.length()];
                                    for (int i = 0; i < sentence.length(); i++) {
                                        String ch = String.valueOf(sentence.charAt(i));
                                        if (!isIgnored[i] && (ch.equals("的") || ch.equals("地") || ch.equals("得"))) ids[i] = fMask;
                                        else ids[i] = MainActivity.fastVocab.getOrDefault(ch, fUnk);
                                    }
                                    Tensor inputTensor = Tensor.fromBlob(ids, new long[]{1, sentence.length()});
                                    scores = MainActivity.fastModule.forward(IValue.from(inputTensor)).toTensor().getDataAsFloatArray();
                                } else {
                                    int exactLen = sentence.length() + 2;
                                    long[] ids = new long[exactLen]; long[] masks = new long[exactLen]; long[] types = new long[exactLen];
                                    ids[0] = MainActivity.clsId; masks[0] = 1; types[0] = 0;
                                    for (int i = 0; i < sentence.length(); i++) {
                                        String ch = String.valueOf(sentence.charAt(i));
                                        if (!isIgnored[i] && (ch.equals("的") || ch.equals("地") || ch.equals("得"))) ids[i + 1] = MainActivity.maskId;
                                        else ids[i + 1] = MainActivity.proVocab.getOrDefault(ch, MainActivity.unkId);
                                        masks[i + 1] = 1; types[i + 1] = 0;
                                    }
                                    ids[exactLen - 1] = MainActivity.sepId; masks[exactLen - 1] = 1; types[exactLen - 1] = 0;
                                    Tensor tIds = Tensor.fromBlob(ids, new long[]{1, exactLen});
                                    Tensor tMasks = Tensor.fromBlob(masks, new long[]{1, exactLen});
                                    Tensor tTypes = Tensor.fromBlob(types, new long[]{1, exactLen});
                                    IValue outputVal = MainActivity.proModule.forward(IValue.from(tIds), IValue.from(tMasks), IValue.from(tTypes));
                                    Tensor outTensor = outputVal.isTuple() ? outputVal.toTuple()[0].toTensor() : outputVal.toTensor();
                                    scores = outTensor.getDataAsFloatArray();
                                }
                                
                                StringBuilder normalText = new StringBuilder();
                                Runnable flushNormal = () -> {
                                    if(normalText.length() > 0) { 
                                        currentSentenceBlocks.add(new MainActivity.TextBlock(normalText.toString(), normalText.toString(), false, 0f, 0)); 
                                        normalText.setLength(0); 
                                    }
                                };
                                
                                for (int i = 0; i < sentence.length(); i++) {
                                    char ch = sentence.charAt(i);
                                    if (isIgnored[i] || (ch != '的' && ch != '地' && ch != '得')) {
                                        normalText.append(ch);
                                        if (ch == '，' || ch == ',' || ch == '；' || ch == ';' || ch == '、' || ch == '\n') flushNormal.run();
                                        continue;
                                    }
                                    flushNormal.run();
                                    
                                    float s0, s1, s2;
                                    if (isFastMode) {
                                        int base = i * 3;
                                        s0 = (float) Math.exp(scores[base] / temp); s1 = (float) Math.exp(scores[base + 1] / temp); s2 = (float) Math.exp(scores[base + 2] / temp);
                                    } else {
                                        int seqPos = i + 1; 
                                        s0 = (float) Math.exp(scores[seqPos * vocabSize + (int)MainActivity.deId] / temp);
                                        s1 = (float) Math.exp(scores[seqPos * vocabSize + (int)MainActivity.diId] / temp);
                                        s2 = (float) Math.exp(scores[seqPos * vocabSize + (int)MainActivity.de2Id] / temp);
                                    }
                                    float sum = s0 + s1 + s2; float p0 = s0 / sum, p1 = s1 / sum, p2 = s2 / sum;
                                    int maxIdx = 0; float maxProb = p0;
                                    if (p1 > maxProb) { maxProb = p1; maxIdx = 1; }
                                    if (p2 > maxProb) { maxProb = p2; maxIdx = 2; }
                                    float threshold = maxIdx == 1 ? tDi : (maxIdx == 2 ? tDe3 : tDe);
                                    String pred = labels[maxIdx];
                                    boolean changed = !pred.equals(String.valueOf(ch)) && maxProb >= threshold;
                                    
                                    currentSentenceBlocks.add(new MainActivity.TextBlock(String.valueOf(ch), changed ? pred : String.valueOf(ch), true, maxProb, 1));
                                    
                                    if (changed) {
                                        errorCount[0]++;
                                        final String errLog = "发现错误：" + ch + " → " + pred + " (置信度:" + String.format("%.2f", maxProb) + ") | 共 " + errorCount[0] + " 处";
                                        syncShowStatus(errLog, false);
                                    }
                                }
                                flushNormal.run();
                            }

                            List<MainActivity.TextBlock> finalSentenceBlocks = new ArrayList<>();
                            for (MainActivity.TextBlock b : currentSentenceBlocks) {
                                if (b.isMutable) {
                                    finalSentenceBlocks.add(b);
                                } else {
                                    int i = 0;
                                    StringBuilder normalBuf = new StringBuilder();
                                    while (i < b.original.length()) {
                                        boolean matchedTypo = false;
                                        boolean matchedQuant = false;
                                        
                                        if (MainActivity.maxTypoLen > 0) {
                                            for (int len = Math.min(MainActivity.maxTypoLen, b.original.length() - i); len >= MainActivity.minTypoLen; len--) {
                                                String sub = b.original.substring(i, i + len);
                                                if (MainActivity.typoMap.containsKey(sub)) {
                                                    if (normalBuf.length() > 0) {
                                                        finalSentenceBlocks.add(new MainActivity.TextBlock(normalBuf.toString(), normalBuf.toString(), false, 0f, 0));
                                                        normalBuf.setLength(0);
                                                    }
                                                    String correct = MainActivity.typoMap.get(sub);
                                                    boolean isRealTypo = !sub.equals(correct);
                                                    int blockType = MainActivity.customTypoKeys.contains(sub) ? 4 : 2;
                                                    finalSentenceBlocks.add(new MainActivity.TextBlock(sub, correct, isRealTypo, 1.0f, blockType));
                                                    
                                                    if (isRealTypo) {
                                                        errorCount[0]++;
                                                        final String errLog = "发现错误：" + sub + " → " + correct + " | 共 " + errorCount[0] + " 处";
                                                        syncShowStatus(errLog, true);
                                                    }
                                                    
                                                    i += len;
                                                    matchedTypo = true;
                                                    break;
                                                }
                                            }
                                        }
                                        
                                        if (!matchedTypo && i > 0 && i + 1 < b.original.length()) {
                                            if (normalBuf.length() > 0) {
                                                char numChar = normalBuf.charAt(normalBuf.length() - 1);
                                                char quantChar = b.original.charAt(i);
                                                char nounChar = b.original.charAt(i + 1);
                                                
                                                if (MainActivity.KNOWN_QUANTS.indexOf(quantChar) >= 0 && MainActivity.NUMS.indexOf(numChar) >= 0) {
                                                    if (MainActivity.quantRules.containsKey(nounChar)) {
                                                        MainActivity.QuantifierRule rule = MainActivity.quantRules.get(nounChar);
                                                        if (rule.allowedQuants.indexOf(quantChar) < 0) {
                                                            char nextC = (i + 2 < b.original.length()) ? b.original.charAt(i + 2) : '\0';
                                                            if (MainActivity.isSafeCharAfterNoun(nextC)) {
                                                                if (normalBuf.length() > 0) {
                                                                    finalSentenceBlocks.add(new MainActivity.TextBlock(normalBuf.toString(), normalBuf.toString(), false, 0f, 0));
                                                                    normalBuf.setLength(0);
                                                                }
                                                                finalSentenceBlocks.add(new MainActivity.TextBlock(String.valueOf(quantChar), rule.primaryQuant, true, 1.0f, 3));
                                                                
                                                                errorCount[0]++;
                                                                final String errLog = "发现错误：" + numChar + quantChar + nounChar + " → " + numChar + rule.primaryQuant + nounChar + " | 共 " + errorCount[0] + " 处";
                                                                syncShowStatus(errLog, true);
                                                                
                                                                i += 1;
                                                                matchedQuant = true;
                                                            }
                                                        }
                                                    }
                                                }
                                            }
                                        }

                                        if (!matchedTypo && !matchedQuant) {
                                            normalBuf.append(b.original.charAt(i));
                                            i++;
                                        }
                                    }
                                    if (normalBuf.length() > 0) {
                                        finalSentenceBlocks.add(new MainActivity.TextBlock(normalBuf.toString(), normalBuf.toString(), false, 0f, 0));
                                    }
                                }
                            }
                            
                            for (MainActivity.TextBlock b : finalSentenceBlocks) {
                                fullCleanText.append(b.current);
                            }
                            syncAllBlocks.add(finalSentenceBlocks);
                        }
                        
                        MainActivity.allSentencesBlocks = syncAllBlocks;
                        MainActivity.lastTimeMs = System.currentTimeMillis() - startTime;
                        MainActivity.hasNewFloatResult = true;
                        
                        if (errorCount[0] > 0) {
                            try { Thread.sleep(1000); } catch (Exception e) {}
                        }
                        
                        new Handler(Looper.getMainLooper()).post(() -> {
                            isChecking = false; 
                            btnFloatSwitch.setEnabled(true);
                            if (errorCount[0] == 0) {
                                showStatus("未检测到错误", true);
                            } else {
                                showStatus("已完成，共修正 " + errorCount[0] + " 处", true);
                            }
                            circleSpin.setVisibility(View.INVISIBLE);
                            ClipboardManager clipboard = (ClipboardManager) getSystemService(Context.CLIPBOARD_SERVICE);
                            clipboard.setPrimaryClip(ClipData.newPlainText("Corrected", fullCleanText.toString()));
                        });
                    } catch (Exception e) {
                        new Handler(Looper.getMainLooper()).post(() -> {
                            isChecking = false; 
                            btnFloatSwitch.setEnabled(true);
                            circleSpin.setVisibility(View.INVISIBLE);
                            Toast.makeText(FloatingService.this, "纠错中断: " + e.getMessage(), Toast.LENGTH_SHORT).show();
                        });
                    }
                }).start();
            }

            @Override public IBinder onBind(Intent intent) { return null; }
            @Override public void onDestroy() { super.onDestroy(); if (floatView != null) windowManager.removeView(floatView); }
        }
