        package com.app.dededi;
        import android.content.Context;
        import android.util.AttributeSet;
        import android.view.View;
        import android.view.ViewGroup;

        public class FlowLayout extends ViewGroup {
            private int hGap = 20;
            private int vGap = 20;
            public FlowLayout(Context context) { super(context); }
            public FlowLayout(Context context, AttributeSet attrs) { super(context, attrs); }
            @Override protected void onMeasure(int widthMeasureSpec, int heightMeasureSpec) {
                int sizeWidth = MeasureSpec.getSize(widthMeasureSpec);
                int modeWidth = MeasureSpec.getMode(widthMeasureSpec);
                int sizeHeight = MeasureSpec.getSize(heightMeasureSpec);
                int modeHeight = MeasureSpec.getMode(heightMeasureSpec);
                int width = 0, height = 0;
                int lineWidth = 0, lineHeight = 0;
                for (int i = 0; i < getChildCount(); i++) {
                    View child = getChildAt(i);
                    if (child.getVisibility() != GONE) {
                        measureChild(child, widthMeasureSpec, heightMeasureSpec);
                        int childWidth = child.getMeasuredWidth();
                        int childHeight = child.getMeasuredHeight();
                        if (lineWidth + childWidth > sizeWidth - getPaddingLeft() - getPaddingRight()) {
                            width = Math.max(width, lineWidth);
                            lineWidth = childWidth;
                            height += lineHeight + vGap;
                            lineHeight = childHeight;
                        } else {
                            lineWidth += childWidth + (lineWidth == 0 ? 0 : hGap);
                            lineHeight = Math.max(lineHeight, childHeight);
                        }
                    }
                }
                width = Math.max(width, lineWidth);
                height += lineHeight;
                setMeasuredDimension((modeWidth == MeasureSpec.EXACTLY) ? sizeWidth : width + getPaddingLeft() + getPaddingRight(),
                                     (modeHeight == MeasureSpec.EXACTLY) ? sizeHeight : height + getPaddingTop() + getPaddingBottom());
            }
            @Override protected void onLayout(boolean changed, int l, int t, int r, int b) {
                int width = getWidth();
                int lineWidth = 0, lineHeight = 0;
                int x = getPaddingLeft(), y = getPaddingTop();
                for (int i = 0; i < getChildCount(); i++) {
                    View child = getChildAt(i);
                    if (child.getVisibility() != GONE) {
                        int childWidth = child.getMeasuredWidth();
                        int childHeight = child.getMeasuredHeight();
                        if (lineWidth + childWidth > width - getPaddingLeft() - getPaddingRight()) {
                            x = getPaddingLeft();
                            y += lineHeight + vGap;
                            lineWidth = childWidth;
                            lineHeight = childHeight;
                        } else {
                            lineWidth += childWidth + (lineWidth == 0 ? 0 : hGap);
                            lineHeight = Math.max(lineHeight, childHeight);
                        }
                        child.layout(x, y, x + childWidth, y + childHeight);
                        x += childWidth + hGap;
                    }
                }
            }
        }
