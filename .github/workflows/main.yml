                    boolean isFastMode = rbFast.isChecked();
                    if (isFastMode && fastModule == null) {
                        Toast.makeText(this, "极速版引擎仍在解密初始化，请稍候...", Toast.LENGTH_SHORT).show();
                        return;
                    }
                    if (!isFastMode && proModule == null) {
                        Toast.makeText(this, "专业版大模型仍在解密初始化，请稍候...", Toast.LENGTH_SHORT).show();
                        return;
                    }
                    doInference(isFastMode);
                });

                btnCopy.setOnClickListener(v -> {
                    if (cleanTextResult.isEmpty()) return;
                    ClipboardManager clipboard = (ClipboardManager) getSystemService(Context.CLIPBOARD_SERVICE);
