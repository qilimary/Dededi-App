name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Python Dependencies
      run: pip install gdown torch

    - name: Download, Unzip and Preprocess Pro Model
      run: |
        echo "正在利用云端从 Google Drive 极速下载专业版大模型压缩包..."
        gdown 15JfoTVtYWhP7duhueKpjtbGQv16LEI2t -O dededi_model_pt201_final.zip
        
        echo "正在解压模型压缩包..."
        unzip -o dededi_model_pt201_final.zip
        
        cat << 'EOF' > convert.py
        import json
        import torch
        import os
        from torch.utils.mobile_optimizer import optimize_for_mobile
        
        model_path = None
        vocab_path = None
        for root, dirs, files in os.walk('.'):
            if 'model_traced.pt' in files:
                model_path = os.path.join(root, 'model_traced.pt')
            if 'tokenizer.json' in files:
                vocab_path = os.path.join(root, 'tokenizer.json')
                
        if not model_path or not vocab_path:
            raise Exception("❌ 压缩包内未找到 model_traced.pt 或 tokenizer.json，请检查文件名！")
            
        print(f"🎯 成功定位文件：\n- 模型: {model_path}\n- 词表: {vocab_path}")
        
        print("正在转换词表...")
        with open(vocab_path, 'r', encoding='utf-8') as f:
            data = json.load(f)
        raw_vocab = data['model']['vocab']
        clean_vocab = {token: int(idx) for token, idx in raw_vocab.items()}
        with open('roberta_vocab.json', 'w', encoding='utf-8') as f:
            json.dump(clean_vocab, f, ensure_ascii=False)
            
        print("正在转换手机端模型...")
        model = torch.jit.load(model_path)
        optimized_model = optimize_for_mobile(model)
        optimized_model._save_for_lite_interpreter('roberta_mobile.ptl')
        print("✅ 转换成功！")
        EOF
        
        python convert.py

    - name: Encrypt Models (Anti-Decompilation)
      run: |
        cat << 'EOF' > encrypt.py
        import os
        def encrypt(file_in, file_out):
            if not os.path.exists(file_in): return
            with open(file_in, 'rb') as f: data = bytearray(f.read())
            # 对模型执行位级 XOR 加密污染，防逆向破解
            for i in range(len(data)): data[i] ^= 0x7B
            with open(file_out, 'wb') as f: f.write(data)

        encrypt('dededi_mobile.ptl', 'sys_core_f.dat')
        encrypt('roberta_mobile.ptl', 'sys_core_p.dat')
        print("✅ 模型已完成二进制加密，伪装系统文件完毕！")
        EOF
        python encrypt.py

    - name: Scaffold Android Project
      run: |
        mkdir -p app/src/main/java/com/app/dededi
        mkdir -p app/src/main/res/layout
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/drawable
        mkdir -p app/src/main/res/mipmap-anydpi-v26
        mkdir -p app/src/main/assets
        mkdir -p gradle/wrapper

        # 移动加密后的模型到assets，完全隐藏原本结构
        cp sys_core_f.dat app/src/main/assets/ || true
        cp sys_core_p.dat app/src/main/assets/
        cp student_vocab.json app/src/main/assets/ || true
        cp roberta_vocab.json app/src/main/assets/

        cat << 'EOF' > gradle.properties
        android.useAndroidX=true
        android.enableJetifier=true
        org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m
        EOF

        cat << 'EOF' > build.gradle
        buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath "com.android.tools.build:gradle:7.4.2" }
        }
        allprojects { repositories { google(); mavenCentral() } }
        EOF

        echo "include ':app'" > settings.gradle

        # 移除了 noCompress，开启系统级压缩，大幅缩小体积
        cat << 'EOF' > app/build.gradle
        apply plugin: 'com.android.application'
        android {
            namespace 'com.app.dededi'
            compileSdk 33
            defaultConfig {
                applicationId "com.app.dededi"
                minSdk 24
                targetSdk 33
                versionCode 2
                versionName "2.0"
                ndk { abiFilters "arm64-v8a" }
            }
            buildTypes {
                release {
                    minifyEnabled true      
                    shrinkResources true    
                    proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                    signingConfig signingConfigs.debug 
                }
            }
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_11
                targetCompatibility JavaVersion.VERSION_11
            }
        }
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.8.0'
            implementation 'org.pytorch:pytorch_android_lite:1.13.0'
        }
        EOF

        cat << 'EOF' > app/proguard-rules.pro
        -keep class org.pytorch.** { *; }
        -keep class com.facebook.jni.** { *; }
        -keepclasseswithmembers class * {
            native <methods>;
        }
        -dontwarn org.pytorch.**
        EOF

        cat << 'EOF' > app/src/main/res/values/colors.xml
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <color name="icon_bg">#2196F3</color>
        </resources>
        EOF
        
        # 缩小对勾的大小，让它居中完整显示
        cat << 'EOF' > app/src/main/res/drawable/ic_dededi_fg.xml
        <vector xmlns:android="http://schemas.android.com/apk/res/android"
            android:width="108dp" android:height="108dp" android:viewportWidth="24" android:viewportHeight="24">
            <group android:scaleX="0.75" android:scaleY="0.75" android:pivotX="12" android:pivotY="12">
                <path android:fillColor="#FFFFFF" android:pathData="M9,16.17L4.83,12l-1.42,1.41L9,19 21,7l-1.41,-1.41z"/>
            </group>
        </vector>
        EOF
        
        cat << 'EOF' > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
        <?xml version="1.0" encoding="utf-8"?>
        <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
            <background android:drawable="@color/icon_bg"/>
            <foreground android:drawable="@drawable/ic_dededi_fg"/>
        </adaptive-icon>
        EOF

        # 加入 extractNativeLibs="false"，防止系统重复解压C库占空间
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <application android:allowBackup="true" 
                         android:extractNativeLibs="false"
                         android:icon="@mipmap/ic_launcher"
                         android:roundIcon="@mipmap/ic_launcher"
                         android:label="“的地得”纠错AI Pro" 
                         android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                <activity android:name=".MainActivity" android:exported="true" android:windowSoftInputMode="adjustPan">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        # 布局：默认勾选专业版 rbPro
        cat << 'EOF' > app/src/main/res/layout/activity_main.xml
        <?xml version="1.0" encoding="utf-8"?>
        <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent" android:layout_height="match_parent"
            android:orientation="vertical" android:padding="14dp" android:background="#F8F9FA">
            
            <RelativeLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:layout_marginBottom="8dp">
                <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" 
                    android:text="“的地得”纠错AI Pro" android:textSize="20sp" android:textStyle="bold" android:textColor="#1A1A1A"
                    android:layout_alignParentStart="true" android:layout_centerVertical="true"/>
                <Button android:id="@+id/btnHelp" android:layout_width="wrap_content" android:layout_height="36dp" 
                    android:text="说明" android:textSize="12sp" android:backgroundTint="#757575" 
                    android:layout_alignParentEnd="true" android:layout_centerVertical="true"
                    android:paddingStart="8dp" android:paddingEnd="8dp"/>
            </RelativeLayout>

            <RadioGroup android:id="@+id/rgMode" android:layout_width="match_parent" android:layout_height="wrap_content"
                android:orientation="horizontal" android:layout_marginBottom="10dp" android:gravity="center">
                <RadioButton android:id="@+id/rbFast" android:layout_width="0dp" android:layout_height="wrap_content"
                    android:layout_weight="1" android:text="极速版 (BiGRU)" android:textSize="14sp"/>
                <RadioButton android:id="@+id/rbPro" android:layout_width="0dp" android:layout_height="wrap_content"
                    android:layout_weight="1" android:text="专业版 (RoBERTa)" android:checked="true" android:textSize="14sp"/>
            </RadioGroup>
            
            <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content"
                android:orientation="horizontal" android:background="#FFFFFF" android:padding="8dp" android:layout_marginBottom="10dp">
                <LinearLayout android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:orientation="vertical" android:gravity="center">
                    <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="温度参数" android:textSize="11sp" android:textColor="#666"/>
                    <EditText android:id="@+id/editTemp" android:layout_width="50dp" android:layout_height="36dp" android:text="1.2" android:textSize="13sp" android:inputType="numberDecimal" android:gravity="center" android:background="@null"/>
                </LinearLayout>
                <LinearLayout android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:orientation="vertical" android:gravity="center">
                    <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="的阈值" android:textSize="11sp" android:textColor="#666"/>
                    <EditText android:id="@+id/editThreshDe1" android:layout_width="50dp" android:layout_height="36dp" android:text="0.70" android:textSize="13sp" android:inputType="numberDecimal" android:gravity="center" android:background="@null"/>
                </LinearLayout>
                <LinearLayout android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:orientation="vertical" android:gravity="center">
                    <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="地阈值" android:textSize="11sp" android:textColor="#666"/>
                    <EditText android:id="@+id/editThreshDe2" android:layout_width="50dp" android:layout_height="36dp" android:text="0.76" android:textSize="13sp" android:inputType="numberDecimal" android:gravity="center" android:background="@null"/>
                </LinearLayout>
                <LinearLayout android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:orientation="vertical" android:gravity="center">
                    <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="得阈值" android:textSize="11sp" android:textColor="#666"/>
                    <EditText android:id="@+id/editThreshDe3" android:layout_width="50dp" android:layout_height="36dp" android:text="0.76" android:textSize="13sp" android:inputType="numberDecimal" android:gravity="center" android:background="@null"/>
                </LinearLayout>
            </LinearLayout>

            <EditText android:id="@+id/inputText" android:layout_width="match_parent" android:layout_height="140dp"
                android:hint="在此输入或者粘贴需要检查的文本..." android:gravity="top|start" android:background="#FFF"
                android:padding="12dp" android:textSize="15sp" android:scrollbars="vertical"/>
            
            <Button android:id="@+id/btnCheck" android:layout_width="match_parent" android:layout_height="52dp"
                android:text="开始纠错" android:textSize="16sp" android:layout_marginTop="10dp" android:layout_marginBottom="10dp" android:backgroundTint="#2196F3"/>
            
            <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content"
                android:orientation="horizontal" android:layout_marginBottom="10dp">
                <Button android:id="@+id/btnCopy" android:layout_width="0dp" android:layout_height="48dp"
                    android:layout_weight="1" android:text="复制纯净全文" android:textSize="14sp"
                    android:backgroundTint="#4CAF50" android:layout_marginRight="4dp" android:enabled="false"/>
                <Button android:id="@+id/btnSaveTxt" android:layout_width="0dp" android:layout_height="48dp"
                    android:layout_weight="1" android:text="保存TXT" android:textSize="14sp"
                    android:backgroundTint="#FF9800" android:enabled="false"/>
            </LinearLayout>

            <ScrollView android:layout_width="match_parent" android:layout_height="match_parent">
                <TextView android:id="@+id/outputText" android:layout_width="match_parent" android:layout_height="wrap_content"
                    android:textSize="16sp" android:background="#FFF" android:padding="12dp" android:textColor="#333" android:lineSpacingExtra="5dp"/>
            </ScrollView>
        </LinearLayout>
        EOF

        # 更新 Java 代码，加入阅后即焚、加密还原、说明书内容等
        cat << 'EOF' > app/src/main/java/com/app/dededi/MainActivity.java
        package com.app.dededi;
        import android.content.ClipData;
        import android.content.ClipboardManager;
        import android.content.Context;
        import android.content.Intent;
        import android.os.Bundle;
        import android.text.Html;
        import android.view.inputmethod.InputMethodManager;
        import android.widget.Button;
        import android.widget.EditText;
        import android.widget.RadioButton;
        import android.widget.TextView;
        import android.widget.Toast;
        import androidx.appcompat.app.AppCompatActivity;
        import org.json.JSONObject;
        import org.pytorch.IValue;
        import org.pytorch.LiteModuleLoader;
        import org.pytorch.Module;
        import org.pytorch.Tensor;
        import java.io.File;
        import java.io.FileOutputStream;
        import java.io.InputStream;
        import java.io.OutputStream;
        import java.nio.charset.StandardCharsets;
        import java.util.HashMap;
        import java.util.Iterator;
        import java.util.Map;

        public class MainActivity extends AppCompatActivity {
            private Module fastModule = null;
            private Map<String, Long> fastVocab = new HashMap<>();

            private Module proModule = null;
            private Map<String, Long> proVocab = new HashMap<>();
            private long clsId=101, sepId=102, maskId=103, unkId=100, deId=0, diId=0, de2Id=0;

            private EditText inputText, editTemp, editThreshDe1, editThreshDe2, editThreshDe3;
            private TextView outputText;
            private Button btnCheck, btnCopy, btnSaveTxt;
            private RadioButton rbFast;
            private String cleanTextResult = ""; 

            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                setContentView(R.layout.activity_main);
                inputText = findViewById(R.id.inputText);
                outputText = findViewById(R.id.outputText);
                editTemp = findViewById(R.id.editTemp);
                editThreshDe1 = findViewById(R.id.editThreshDe1);
                editThreshDe2 = findViewById(R.id.editThreshDe2);
                editThreshDe3 = findViewById(R.id.editThreshDe3);
                btnCheck = findViewById(R.id.btnCheck);
                btnCopy = findViewById(R.id.btnCopy);
                btnSaveTxt = findViewById(R.id.btnSaveTxt);
                rbFast = findViewById(R.id.rbFast);
                Button btnHelp = findViewById(R.id.btnHelp);

                // 开屏立刻异步唤醒和解密模型
                outputText.setText("🔄 正在底层解密并唤醒 AI 引擎，首次启动约需数秒...");
                new Thread(() -> {
                    try {
                        try {
                            fastModule = loadDecryptedModule(this, "sys_core_f.dat");
                            loadVocab(fastVocab, "student_vocab.json");
                        } catch(Exception ignored) {}
                        
                        try {
                            proModule = loadDecryptedModule(this, "sys_core_p.dat");
                            loadVocab(proVocab, "roberta_vocab.json");
                            clsId = proVocab.getOrDefault("[CLS]", 101L);
                            sepId = proVocab.getOrDefault("[SEP]", 102L);
                            maskId = proVocab.getOrDefault("[MASK]", 103L);
                            unkId = proVocab.getOrDefault("[UNK]", 100L);
                            deId = proVocab.getOrDefault("的", 0L);
                            diId = proVocab.getOrDefault("地", 0L);
                            de2Id = proVocab.getOrDefault("得", 0L);
                        } catch(Exception ignored) {}

                        runOnUiThread(() -> {
                            outputText.setText("✅ AI 引擎已全部就绪 (已启用底层多重防护)");
                        });
                    } catch (Exception ignored) {}
                }).start();

                btnHelp.setOnClickListener(v -> {
                    new androidx.appcompat.app.AlertDialog.Builder(this)
                        .setTitle("版本与参数说明")
                        .setMessage("【版本区别】\n" +
                                    "• 极速版 (BiGRU)：体积小、运行极快，适合日常短句或大批量文本的极速扫描，但对长难句复杂语境理解可能稍弱。\n" +
                                    "• 专业版 (RoBERTa)：拥有数十倍的参数量，深入理解复杂上下文，准确率极高，适合写文章精细润色，但耗时稍长。\n\n" +
                                    "【温度参数】\n" +
                                    "控制AI判断的果断程度。\n" +
                                    "• 越低 (如0.5)：模型更自信，更激进，修改量可能上升。\n" +
                                    "• 越高 (如2.0)：模型更保守，不易触发修改。\n\n" +
                                    "【置信度拦截阈值】\n" +
                                    "只有AI的置信度 ≥ 该阈值时才执行修改，否则保留原字，防止过度纠错。\n" +
                                    "示例：若阈值设为0.76，AI置信度0.85则修改，0.70则维持原样。")
                        .setPositiveButton("知道了", null)
                        .show();
                });

                btnCheck.setOnClickListener(v -> {
                    InputMethodManager imm = (InputMethodManager) getSystemService(Context.INPUT_METHOD_SERVICE);
                    if (imm != null) imm.hideSoftInputFromWindow(v.getWindowToken(), 0);
                    
                    boolean isFastMode = rbFast.isChecked();
                    if (isFastMode && fastModule == null) {
                        Toast.makeText(this, "极速版引擎仍在解密初始化，请稍候...", Toast.LENGTH_SHORT).show();
                        return;
                    }
                    if (!isFastMode && proModule == null) {
                        Toast.makeText(this, "专业版大模型仍在解密初始化，请稍候...", Toast.LENGTH_SHORT).show();
                        return;
                    }
                    doInference(isFastMode);
                });

                btnCopy.setOnClickListener(v -> {
                    if (cleanTextResult.isEmpty()) return;
                    ClipboardManager clipboard = (ClipboardManager) getSystemService(Context.CLIPBOARD_SERVICE);
                    ClipData clip = ClipData.newPlainText("Corrected Article", cleanTextResult);
                    if (clipboard != null) clipboard.setPrimaryClip(clip);
                    Toast.makeText(this, "纯净全文已复制", Toast.LENGTH_SHORT).show();
                });

                btnSaveTxt.setOnClickListener(v -> {
                    if (cleanTextResult.isEmpty()) return;
                    try {
                        Intent intent = new Intent(Intent.ACTION_CREATE_DOCUMENT);
                        intent.addCategory(Intent.CATEGORY_OPENABLE);
                        intent.setType("text/plain");
                        intent.putExtra(Intent.EXTRA_TITLE, "地得纠错Pro结果.txt");
                        startActivityForResult(intent, 101);
                    } catch (Exception e) {
                        Toast.makeText(this, "调起失败: " + e.getMessage(), Toast.LENGTH_SHORT).show();
                    }
                });
            }

            @Override
            protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                super.onActivityResult(requestCode, resultCode, data);
                if (requestCode == 101 && resultCode == RESULT_OK && data != null && data.getData() != null) {
                    try {
                        OutputStream os = getContentResolver().openOutputStream(data.getData());
                        if (os != null) {
                            os.write(cleanTextResult.getBytes(StandardCharsets.UTF_8));
                            os.close();
                            Toast.makeText(this, "保存成功", Toast.LENGTH_SHORT).show();
                        }
                    } catch (Exception ignored) {}
                }
            }

            // 加载词汇表
            private void loadVocab(Map<String, Long> map, String assetName) throws Exception {
                InputStream is = getAssets().open(assetName);
                byte[] buffer = new byte[is.available()];
                is.read(buffer); is.close();
                JSONObject json = new JSONObject(new String(buffer, StandardCharsets.UTF_8));
                Iterator<String> keys = json.keys();
                while(keys.hasNext()) {
                    String key = keys.next();
                    map.put(key, (long) json.getInt(key));
                }
            }

            // 核心防护：解密、挂载内存后立即自毁文件
            private Module loadDecryptedModule(Context context, String assetName) throws Exception {
                File file = new File(context.getFilesDir(), assetName + ".tmp");
                try (InputStream is = context.getAssets().open(assetName);
                     FileOutputStream os = new FileOutputStream(file)) {
                    byte[] buffer = new byte[8 * 1024]; 
                    int read;
                    while ((read = is.read(buffer)) != -1) {
                        for(int i = 0; i < read; i++) buffer[i] ^= 0x7B; // 二进制动态还原
                        os.write(buffer, 0, read);
                    }
                    os.flush();
                }
                Module module = LiteModuleLoader.load(file.getAbsolutePath());
                // 挂载成功后，毫秒级内将本体文件“阅后即焚”，节省手机400MB空间且极高强度防盗取
                file.delete(); 
                return module;
            }

            private void doInference(boolean isFastMode) {
                String text = inputText.getText().toString();
                if (text.isEmpty()) return;

                btnCheck.setEnabled(false); btnCopy.setEnabled(false); btnSaveTxt.setEnabled(false);
                outputText.setText(isFastMode ? "极速版正在审查..." : "专业版大模型正在思考...");

                final float temp, tDe, tDi, tDe3;
                float t1 = 1.2f, t2 = 0.70f, t3 = 0.76f, t4 = 0.76f;
                try {
                    t1 = Float.parseFloat(editTemp.getText().toString());
                    t2 = Float.parseFloat(editThreshDe1.getText().toString());
                    t3 = Float.parseFloat(editThreshDe2.getText().toString());
                    t4 = Float.parseFloat(editThreshDe3.getText().toString());
                } catch (Exception ignored) {}
                temp = t1; tDe = t2; tDi = t3; tDe3 = t4;

                new Thread(() -> {
                    try {
                        long startTime = System.currentTimeMillis();
                        String[] labels = {"的", "地", "得"};
                        String[] sentences = text.split("(?<=[。！？!?\n])");
                        
                        StringBuilder errorsHtmlBuilder = new StringBuilder(); 
                        StringBuilder fullHtmlBuilder = new StringBuilder();   
                        StringBuilder cleanTextBuilder = new StringBuilder();  
                        int totalChangeCount = 0;
                        long lastUpdateTime = System.currentTimeMillis();

                        for (int sIdx = 0; sIdx < sentences.length; sIdx++) {
                            String sentence = sentences[sIdx];
                            if (sentence.isEmpty()) { fullHtmlBuilder.append("<br>"); cleanTextBuilder.append("\n"); continue; }

                            boolean hasTarget = false;
                            for (int i = 0; i < sentence.length(); i++) {
                                char c = sentence.charAt(i);
                                if (c == '的' || c == '地' || c == '得') { hasTarget = true; break; }
                            }

                            boolean currentSentenceHasError = false;
                            StringBuilder sClean = new StringBuilder();
                            StringBuilder sFullHtml = new StringBuilder();
                            StringBuilder sErrorHtml = new StringBuilder();

                            if (!hasTarget) {
                                sClean.append(sentence);
                                for (int i = 0; i < sentence.length(); i++) {
                                    char ch = sentence.charAt(i);
                                    if (ch == '\n') { sFullHtml.append("<br>"); sErrorHtml.append("<br>"); }
                                    else { sFullHtml.append(ch); sErrorHtml.append(ch); }
                                }
                            } else {
                                float[] scores;
                                int vocabSize = isFastMode ? 3 : proVocab.size();

                                if (isFastMode) {
                                    long fUnk = fastVocab.getOrDefault("[UNK]", 1L);
                                    long fMask = fastVocab.getOrDefault("[MASK]", 2L);
                                    long[] ids = new long[sentence.length()];
                                    for (int i = 0; i < sentence.length(); i++) {
                                        String ch = String.valueOf(sentence.charAt(i));
                                        if (ch.equals("的") || ch.equals("地") || ch.equals("得")) ids[i] = fMask;
                                        else ids[i] = fastVocab.getOrDefault(ch, fUnk);
                                    }
                                    Tensor inputTensor = Tensor.fromBlob(ids, new long[]{1, sentence.length()});
                                    scores = fastModule.forward(IValue.from(inputTensor)).toTensor().getDataAsFloatArray();
                                } else {
                                    int exactLen = sentence.length() + 2;
                                    long[] ids = new long[exactLen];
                                    long[] masks = new long[exactLen];
                                    long[] types = new long[exactLen];

                                    ids[0] = clsId; masks[0] = 1; types[0] = 0;
                                    for (int i = 0; i < sentence.length(); i++) {
                                        String ch = String.valueOf(sentence.charAt(i));
                                        if (ch.equals("的") || ch.equals("地") || ch.equals("得")) ids[i + 1] = maskId;
                                        else ids[i + 1] = proVocab.getOrDefault(ch, unkId);
                                        masks[i + 1] = 1; types[i + 1] = 0;
                                    }
                                    ids[exactLen - 1] = sepId; masks[exactLen - 1] = 1; types[exactLen - 1] = 0;

                                    Tensor tIds = Tensor.fromBlob(ids, new long[]{1, exactLen});
                                    Tensor tMasks = Tensor.fromBlob(masks, new long[]{1, exactLen});
                                    Tensor tTypes = Tensor.fromBlob(types, new long[]{1, exactLen});

                                    IValue outputVal = proModule.forward(IValue.from(tIds), IValue.from(tMasks), IValue.from(tTypes));
                                    Tensor outTensor = outputVal.isTuple() ? outputVal.toTuple()[0].toTensor() : outputVal.toTensor();
                                    scores = outTensor.getDataAsFloatArray();
                                }

                                for (int i = 0; i < sentence.length(); i++) {
                                    char ch = sentence.charAt(i);
                                    if (ch == '的' || ch == '地' || ch == '得') {
                                        float s0, s1, s2;
                                        if (isFastMode) {
                                            int base = i * 3;
                                            s0 = (float) Math.exp(scores[base] / temp);
                                            s1 = (float) Math.exp(scores[base + 1] / temp);
                                            s2 = (float) Math.exp(scores[base + 2] / temp);
                                        } else {
                                            int seqPos = i + 1; 
                                            s0 = (float) Math.exp(scores[seqPos * vocabSize + (int)deId] / temp);
                                            s1 = (float) Math.exp(scores[seqPos * vocabSize + (int)diId] / temp);
                                            s2 = (float) Math.exp(scores[seqPos * vocabSize + (int)de2Id] / temp);
                                        }

                                        float sum = s0 + s1 + s2;
                                        float p0 = s0 / sum, p1 = s1 / sum, p2 = s2 / sum;

                                        int maxIdx = 0; float maxProb = p0;
                                        if (p1 > maxProb) { maxProb = p1; maxIdx = 1; }
                                        if (p2 > maxProb) { maxProb = p2; maxIdx = 2; }

                                        float threshold = tDe;
                                        if (maxIdx == 1) threshold = tDi;
                                        if (maxIdx == 2) threshold = tDe3;

                                        String pred = labels[maxIdx];
                                        if (!pred.equals(String.valueOf(ch)) && maxProb >= threshold) {
                                            currentSentenceHasError = true;
                                            totalChangeCount++;
                                            sClean.append(pred);
                                            sFullHtml.append("<font color='#E53935'><b>").append(pred).append("</b></font>");
                                            sErrorHtml.append("<font color='#E53935'>").append(ch).append("</font>→<b>").append(pred).append("</b><font color='#888888'><small>（置信度：").append(String.format("%.2f", maxProb)).append("）</small></font> ");
                                        } else {
                                            sClean.append(ch); sFullHtml.append(ch); sErrorHtml.append(ch);
                                        }
                                    } else {
                                        sClean.append(ch);
                                        if (ch == '\n') { sFullHtml.append("<br>"); sErrorHtml.append("<br>"); }
                                        else { sFullHtml.append(ch); sErrorHtml.append(ch); }
                                    }
                                }
                            }

                            cleanTextBuilder.append(sClean);
                            fullHtmlBuilder.append(sFullHtml);
                            if (currentSentenceHasError) errorsHtmlBuilder.append(sErrorHtml).append("<br>");

                            long now = System.currentTimeMillis();
                            if (now - lastUpdateTime > 300 || sIdx == sentences.length - 1) {
                                lastUpdateTime = now;
                                double sec = (now - startTime) / 1000.0;
                                StringBuilder report = new StringBuilder();
                                report.append("<b>AI 正在审查中... 已耗时 <font color='#2196F3'>").append(String.format("%.1f", sec)).append("</font> 秒</b><br>");
                                report.append("进度：已分析 ").append(sIdx + 1).append(" / ").append(sentences.length).append(" 句<br><br>");
                                if (errorsHtmlBuilder.length() > 0) {
                                    report.append("<font color='#757575'><b>【已发现误用：】</b></font><br>").append(errorsHtmlBuilder.toString()).append("<br>");
                                }
                                report.append("<font color='#757575'><b>【动态修正预览】</b></font><br>").append(fullHtmlBuilder.toString());
                                final String snap = report.toString();
                                runOnUiThread(() -> outputText.setText(Html.fromHtml(snap, Html.FROM_HTML_MODE_COMPACT)));
                            }
                        }

                        cleanTextResult = cleanTextBuilder.toString();
                        double totalSec = (System.currentTimeMillis() - startTime) / 1000.0;
                        StringBuilder report = new StringBuilder();
                        report.append("<b>检查完毕！共更正 <font color='#E53935'>").append(totalChangeCount).append("</font> 处。耗时 ").append(String.format("%.2f", totalSec)).append(" 秒。</b><br><br>");
                        if (totalChangeCount > 0) {
                            report.append("<font color='#757575'><b>【更正清单：】</b></font><br>").append(errorsHtmlBuilder.toString()).append("<br>---------------------------------------<br><br>");
                        }
                        report.append("<font color='#757575'><b>【修正后的全文】</b></font><br>").append(fullHtmlBuilder.toString());
                        final String finalHtml = report.toString();
                        runOnUiThread(() -> {
                            outputText.setText(Html.fromHtml(finalHtml, Html.FROM_HTML_MODE_COMPACT));
                            btnCheck.setEnabled(true); btnCopy.setEnabled(true); btnSaveTxt.setEnabled(true);
                        });

                    } catch (Exception e) {
                        final String err = e.getMessage();
                        runOnUiThread(() -> {
                            outputText.setText("推理运行中断: " + err);
                            btnCheck.setEnabled(true);
                        });
                    }
                }).start();
            }
        }
        EOF

        wget -q https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.jar -O gradle/wrapper/gradle-wrapper.jar
        wget -q https://raw.githubusercontent.com/gradle/gradle/master/gradlew -O gradlew
        chmod +x gradlew

        cat << 'EOF' > gradle/wrapper/gradle-wrapper.properties
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-7.5-bin.zip
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        EOF

    - name: set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    - name: Build APK (Release mode)
      run: |
        ./gradlew assembleRelease --stacktrace --console=plain > build_output.log 2>&1 || {
          echo "### ❌ 编译未通过！以下是具体报错信息：" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`text" >> $GITHUB_STEP_SUMMARY
          tail -n 100 build_output.log >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          exit 1
        }

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Dededi-App-APK-Pro
        path: app/build/outputs/apk/release/app-release.apk
