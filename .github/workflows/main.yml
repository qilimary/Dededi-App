                expandedEditText.setMovementMethod(LinkMovementMethod.getInstance());

                expandedEditText.addTextChangedListener(new TextWatcher() {
                    @Override public void beforeTextChanged(CharSequence s, int start, int count, int after) {}
                    @Override public void onTextChanged(CharSequence s, int start, int before, int count) {}
                    @Override public void afterTextChanged(Editable s) {
                        if (isCheckingMain || currentClauseLinks == null || isEditorSelfModifying) return;
                        
                        boolean needPurge = false;
                        for (ClauseLink link : currentClauseLinks) {
                            if (link.isDead) continue;
                            boolean clauseAltered = false;
                            for (TargetSpan ts : link.targetSpans) {
                                int tsStart = s.getSpanStart(ts);
                                int tsEnd = s.getSpanEnd(ts);
                                if (tsStart == -1 || tsEnd == -1) {
                                    clauseAltered = true; break;
                                }
                                String currentContent = s.subSequence(tsStart, tsEnd).toString();
                                if (!currentContent.equals(ts.expected)) {
                                    clauseAltered = true; break;
                                }
                            }
                            if (clauseAltered) {
                                link.isDead = true;
                                needPurge = true;
                            }
                        }
                        
                        if (needPurge) {
                            expandedEditText.post(() -> {
                                isEditorSelfModifying = true;
                                try {
                                    Editable editable = expandedEditText.getText();
                                    List<ListMarkerSpan> spansToDelete = new ArrayList<>();
                                    for (ClauseLink link : currentClauseLinks) {
                                        if (link.isDead && editable.getSpanStart(link.listMarkerSpan) != -1) {
                                            spansToDelete.add(link.listMarkerSpan);
                                        }
                                    }
                                    spansToDelete.sort((a, b) -> Integer.compare(editable.getSpanStart(b), editable.getSpanStart(a)));
                                    
                                    for (ListMarkerSpan span : spansToDelete) {
                                        int mStart = editable.getSpanStart(span);
                                        int mEnd = editable.getSpanEnd(span);
                                        if (mStart != -1 && mEnd != -1) {
                                            int lineStart = mStart;
                                            while (lineStart > 0 && editable.charAt(lineStart - 1) != '\n') lineStart--;
                                            int lineEnd = mEnd;
                                            while (lineEnd < editable.length() && editable.charAt(lineEnd) != '\n') lineEnd++;
                                            if (lineEnd < editable.length()) lineEnd++;
                                            editable.delete(lineStart, lineEnd);
                                        }
                                    }
                                } catch (Exception e) {}
                                isEditorSelfModifying = false;
                            });
                        }
                    }
                });

                expandedEditText.setFilters(new InputFilter[]{
                    new InputFilter() {
                        public CharSequence filter(CharSequence source, int start, int end, Spanned dest, int dstart, int dend) {
                            if (isEditorSelfModifying) return null;
                            Editable editable = expandedEditText.getText();
                            if (editable != null) {
                                HeaderEndSpan[] spans = editable.getSpans(0, editable.length(), HeaderEndSpan.class);
                                if (spans.length > 0) {
                                    int lockedEnd = editable.getSpanStart(spans[0]);
                                    if (lockedEnd > 0 && dstart < lockedEnd) {
                                        return dest.subSequence(dstart, dend);
                                    }
                                }
                            }
                            return null;
                        }
                    }
                });

                editorScrollTouchArea.setOnTouchListener((v, event) -> {
                    int action = event.getActionMasked();
                    Layout layout = expandedEditText.getLayout();
                    if (layout != null) {
                        int maxScrollY = layout.getHeight() - expandedEditText.getHeight() + expandedEditText.getPaddingTop() + expandedEditText.getPaddingBottom();
                        if (maxScrollY > 0) {
                            float y = Math.max(0, Math.min(event.getY(), v.getHeight()));
                            float ratio = y / v.getHeight();
                            expandedEditText.scrollTo(0, (int) (ratio * maxScrollY));
                        }
                    }
                    return true;
                });

                outputText.setOnTouchListener(new View.OnTouchListener() {
                    private final boolean[] isLongPressTriggered = {false};
                    private final float[] startX = {0f};
                    private final float[] startY = {0f};
                    private final float[] rawTouchPos = {0f, 0f}; // 记录手指的绝对坐标
                    private final Handler handler = new Handler(Looper.getMainLooper());
                    private final Runnable longPressRunnable = () -> {
                        if (outputText.getText().length() == 0 || "正在加载...".equals(outputText.getText().toString()) || "AI已加载。".equals(outputText.getText().toString())) return;
                        isLongPressTriggered[0] = true;
                        outputText.performHapticFeedback(android.view.HapticFeedbackConstants.LONG_PRESS);
                        
                        // === 水波纹扩散动画 ===
                        ViewGroup parent = (ViewGroup) scrollView.getParent();
                        int[] parentLoc = new int[2];
                        parent.getLocationOnScreen(parentLoc);
                        int cx = (int) (rawTouchPos[0] - parentLoc[0]);
                        int cy = (int) (rawTouchPos[1] - parentLoc[1]);
                        
                        View rippleView = new View(MainActivity.this);
                        rippleView.setBackgroundColor(Color.parseColor("#20000000")); // 浅灰色半透明遮罩
                        rippleView.setVisibility(View.INVISIBLE);
                        parent.addView(rippleView, new ViewGroup.LayoutParams(ViewGroup.LayoutParams.MATCH_PARENT, ViewGroup.LayoutParams.MATCH_PARENT));
                        
                        float maxRadius = (float) Math.hypot(Math.max(cx, parent.getWidth() - cx), Math.max(cy, parent.getHeight() - cy));
                        
                        Animator reveal = ViewAnimationUtils.createCircularReveal(rippleView, cx, cy, 0f, maxRadius);
                        reveal.setDuration(350);
                        rippleView.setVisibility(View.VISIBLE);
                        reveal.start();
                        
                        reveal.addListener(new AnimatorListenerAdapter() {
                            @Override
                            public void onAnimationEnd(Animator animation) {
                                parent.removeView(rippleView);
                                
                                // === 动画结束后执行原有展开逻辑 ===
                                if (isManuallyEditedOut) {
                                    lastEditorSpannable = new SpannableStringBuilder(outputText.getText());
                                }
                                originalEditorText = lastEditorSpannable.toString();
                                
                                
                                isEditorSelfModifying = true;
                                expandedEditText.setText(lastEditorSpannable);
                                isEditorSelfModifying = false;
                                editorUndoStack.clear();
                                
                                expandedEditorOverlay.setAlpha(0f);
                                expandedEditorOverlay.setTranslationY(150f);
                                expandedEditorOverlay.setVisibility(View.VISIBLE);
                                expandedEditorOverlay.animate().alpha(1f).translationY(0f).setDuration(250).start();
                                Toast.makeText(MainActivity.this, "进入全屏便签：原有的跳转序号仍可点击滑动", Toast.LENGTH_SHORT).show();
                            }
                        });
                    };

                    @Override
                    public boolean onTouch(View v, MotionEvent event) {
                        switch (event.getActionMasked()) {
                            case MotionEvent.ACTION_DOWN:
                                isLongPressTriggered[0] = false;
                                startX[0] = event.getX();
                                startY[0] = event.getY();
                                rawTouchPos[0] = event.getRawX(); // 记录绝对X
                                rawTouchPos[1] = event.getRawY(); // 记录绝对Y
                                handler.postDelayed(longPressRunnable, 600);
                                break;
                            case MotionEvent.ACTION_MOVE:
                                if (Math.abs(event.getX() - startX[0]) > 20 || Math.abs(event.getY() - startY[0]) > 20) {
                                    handler.removeCallbacks(longPressRunnable);
                                }
                                break;
                            case MotionEvent.ACTION_UP:
                            case MotionEvent.ACTION_CANCEL:
                                handler.removeCallbacks(longPressRunnable);
                                if (isLongPressTriggered[0]) {
                                    MotionEvent cancelEvent = MotionEvent.obtain(event);
                                    cancelEvent.setAction(MotionEvent.ACTION_CANCEL);
                                    v.onTouchEvent(cancelEvent);
                                    cancelEvent.recycle();
                                    return true;
                                }
                                break;
                        }
                        return false;
                    }
                });

                Runnable applyEditorChanges = () -> {
