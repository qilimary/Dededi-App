name: Build Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Scaffold Android Project
      run: |
        mkdir -p app/src/main/java/com/app/dededi
        mkdir -p app/src/main/res/layout
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/assets
        mkdir -p gradle/wrapper

        # 复制模型和词表
        cp dededi_mobile.ptl app/src/main/assets/
        cp student_vocab.json app/src/main/assets/

        # 生成 gradle.properties
        cat << 'EOF' > gradle.properties
        android.useAndroidX=true
        android.enableJetifier=true
        org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m
        EOF

        # 1. 生成根目录 build.gradle
        cat << 'EOF' > build.gradle
        buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath "com.android.tools.build:gradle:7.4.2" }
        }
        allprojects { repositories { google(); mavenCentral() } }
        EOF

        # 2. 生成 settings.gradle
        echo "include ':app'" > settings.gradle

        # 3. 生成 app/build.gradle
        cat << 'EOF' > app/build.gradle
        apply plugin: 'com.android.application'
        android {
            namespace 'com.app.dededi'
            compileSdk 33
            defaultConfig {
                applicationId "com.app.dededi"
                minSdk 24
                targetSdk 33
                versionCode 1
                versionName "1.0"
                ndk {
                    abiFilters "arm64-v8a"
                }
            }
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_11
                targetCompatibility JavaVersion.VERSION_11
            }
        }
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.8.0'
            implementation 'org.pytorch:pytorch_android_lite:1.13.0'
            implementation 'org.pytorch:pytorch_android_torchvision_lite:1.13.0'
        }
        EOF

        # 4. 生成 AndroidManifest.xml
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <application android:allowBackup="true" android:label="“的地得”纠错AI" android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                <activity android:name=".MainActivity" android:exported="true" android:windowSoftInputMode="adjustPan">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        # 5. 生成布局文件
        cat << 'EOF' > app/src/main/res/layout/activity_main.xml
        <?xml version="1.0" encoding="utf-8"?>
        <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent" android:layout_height="match_parent"
            android:orientation="vertical" android:padding="14dp" android:background="#F8F9FA">
            
            <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" 
                      android:text="“的地得”纠错AI" android:textSize="20sp" android:textStyle="bold" android:layout_marginBottom="12dp" android:textColor="#1A1A1A"/>
            
            <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content"
                android:orientation="horizontal" android:background="#FFFFFF" android:padding="8dp" android:layout_marginBottom="10dp">
                <LinearLayout android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:orientation="vertical" android:gravity="center">
                    <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="temperature参数" android:textSize="11sp" android:textColor="#666"/>
                    <EditText android:id="@+id/editTemp" android:layout_width="50dp" android:layout_height="36dp" android:text="1.2" android:textSize="13sp" android:inputType="numberDecimal" android:gravity="center" android:background="@null"/>
                </LinearLayout>
                <LinearLayout android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:orientation="vertical" android:gravity="center">
                    <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="的阈值" android:textSize="11sp" android:textColor="#666"/>
                    <EditText android:id="@+id/editThreshDe1" android:layout_width="50dp" android:layout_height="36dp" android:text="0.70" android:textSize="13sp" android:inputType="numberDecimal" android:gravity="center" android:background="@null"/>
                </LinearLayout>
                <LinearLayout android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:orientation="vertical" android:gravity="center">
                    <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="地阈值" android:textSize="11sp" android:textColor="#666"/>
                    <EditText android:id="@+id/editThreshDe2" android:layout_width="50dp" android:layout_height="36dp" android:text="0.76" android:textSize="13sp" android:inputType="numberDecimal" android:gravity="center" android:background="@null"/>
                </LinearLayout>
                <LinearLayout android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:orientation="vertical" android:gravity="center">
                    <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="得阈值" android:textSize="11sp" android:textColor="#666"/>
                    <EditText android:id="@+id/editThreshDe3" android:layout_width="50dp" android:layout_height="36dp" android:text="0.76" android:textSize="13sp" android:inputType="numberDecimal" android:gravity="center" android:background="@null"/>
                </LinearLayout>
            </LinearLayout>

            <EditText android:id="@+id/inputText" android:layout_width="match_parent" android:layout_height="160dp"
                android:hint="在此输入或者粘贴需要检查的文本..." android:gravity="top|start" android:background="#FFF"
                android:padding="12dp" android:textSize="15sp" android:scrollbars="vertical"/>
            
            <Button android:id="@+id/btnCheck" android:layout_width="match_parent" android:layout_height="52dp"
                android:text="开始纠错" android:textSize="16sp" android:layout_marginTop="10dp" android:layout_marginBottom="10dp" android:backgroundTint="#2196F3"/>
            
            <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content"
                android:orientation="horizontal" android:layout_marginBottom="10dp">
                <Button android:id="@+id/btnCopy" android:layout_width="0dp" android:layout_height="48dp"
                    android:layout_weight="1" android:text="复制纯净全文" android:textSize="14sp"
                    android:backgroundTint="#4CAF50" android:layout_marginRight="4dp" android:enabled="false"/>
                <Button android:id="@+id/btnSaveTxt" android:layout_width="0dp" android:layout_height="48dp"
                    android:layout_weight="1" android:text="保存为TXT文件" android:textSize="14sp"
                    android:backgroundTint="#FF9800" android:enabled="false"/>
            </LinearLayout>

            <ScrollView android:layout_width="match_parent" android:layout_height="match_parent">
                <TextView android:id="@+id/outputText" android:layout_width="match_parent" android:layout_height="wrap_content"
                    android:textSize="16sp" android:background="#FFF" android:padding="12dp" android:textColor="#333" android:lineSpacingExtra="5dp"/>
            </ScrollView>
        </LinearLayout>
        EOF

        # 6. 生成 MainActivity.java (重构多线程后台处理与流式刷新逻辑)
        cat << 'EOF' > app/src/main/java/com/app/dededi/MainActivity.java
        package com.app.dededi;
        import android.content.ClipData;
        import android.content.ClipboardManager;
        import android.content.Context;
        import android.content.Intent;
        import android.os.Bundle;
        import android.text.Html;
        import android.view.inputmethod.InputMethodManager;
        import android.widget.Button;
        import android.widget.EditText;
        import android.widget.TextView;
        import android.widget.Toast;
        import androidx.appcompat.app.AppCompatActivity;
        import org.json.JSONObject;
        import org.pytorch.IValue;
        import org.pytorch.LiteModuleLoader;
        import org.pytorch.Module;
        import org.pytorch.Tensor;
        import java.io.File;
        import java.io.FileOutputStream;
        import java.io.InputStream;
        import java.io.OutputStream;
        import java.nio.charset.StandardCharsets;
        import java.nio.ByteBuffer;
        import java.nio.ByteOrder;
        import java.nio.LongBuffer;
        import java.util.HashMap;
        import java.util.Iterator;
        import java.util.Map;

        public class MainActivity extends AppCompatActivity {
            private Module module = null;
            private Map<String, Long> vocab = new HashMap<>();
            private EditText inputText, editTemp, editThreshDe1, editThreshDe2, editThreshDe3;
            private TextView outputText;
            private Button btnCheck, btnCopy, btnSaveTxt;
            private String cleanTextResult = ""; 

            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                setContentView(R.layout.activity_main);
                inputText = findViewById(R.id.inputText);
                outputText = findViewById(R.id.outputText);
                editTemp = findViewById(R.id.editTemp);
                editThreshDe1 = findViewById(R.id.editThreshDe1);
                editThreshDe2 = findViewById(R.id.editThreshDe2);
                editThreshDe3 = findViewById(R.id.editThreshDe3);
                btnCheck = findViewById(R.id.btnCheck);
                btnCopy = findViewById(R.id.btnCopy);
                btnSaveTxt = findViewById(R.id.btnSaveTxt);

                try {
                    String modulePath = assetFilePath(this, "dededi_mobile.ptl");
                    module = LiteModuleLoader.load(modulePath);
                    InputStream is = getAssets().open("student_vocab.json");
                    byte[] buffer = new byte[is.available()];
                    is.read(buffer);
                    is.close();
                    String jsonStr = new String(buffer, StandardCharsets.UTF_8);
                    JSONObject json = new JSONObject(jsonStr);
                    Iterator<String> keys = json.keys();
                    while(keys.hasNext()) {
                        String key = keys.next();
                        vocab.put(key, (long) json.getInt(key));
                    }
                    outputText.setText("✅ AI 模型已就绪 (离线可用)");
                } catch (Exception e) {
                    outputText.setText("❌ 模型加载失败: " + e.getMessage());
                }

                btnCheck.setOnClickListener(v -> {
                    InputMethodManager imm = (InputMethodManager) getSystemService(Context.INPUT_METHOD_SERVICE);
                    if (imm != null) imm.hideSoftInputFromWindow(v.getWindowToken(), 0);
                    doInference();
                });

                btnCopy.setOnClickListener(v -> {
                    if (cleanTextResult.isEmpty()) return;
                    ClipboardManager clipboard = (ClipboardManager) getSystemService(Context.CLIPBOARD_SERVICE);
                    ClipData clip = ClipData.newPlainText("Corrected Article", cleanTextResult);
                    if (clipboard != null) clipboard.setPrimaryClip(clip);
                    Toast.makeText(this, "修正后的全文已复制到剪贴板", Toast.LENGTH_SHORT).show();
                });

                btnSaveTxt.setOnClickListener(v -> {
                    if (cleanTextResult.isEmpty()) return;
                    try {
                        Intent intent = new Intent(Intent.ACTION_CREATE_DOCUMENT);
                        intent.addCategory(Intent.CATEGORY_OPENABLE);
                        intent.setType("text/plain");
                        intent.putExtra(Intent.EXTRA_TITLE, "纠错结果_纯净版.txt");
                        startActivityForResult(intent, 101);
                    } catch (Exception e) {
                        Toast.makeText(this, "调起系统文件管理器失败: " + e.getMessage(), Toast.LENGTH_SHORT).show();
                    }
                });
            }

            @Override
            protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                super.onActivityResult(requestCode, resultCode, data);
                if (requestCode == 101 && resultCode == RESULT_OK && data != null && data.getData() != null) {
                    try {
                        android.net.Uri uri = data.getData();
                        OutputStream os = getContentResolver().openOutputStream(uri);
                        if (os != null) {
                            os.write(cleanTextResult.getBytes(StandardCharsets.UTF_8));
                            os.close();
                            Toast.makeText(this, ".txt文件已安全写入", Toast.LENGTH_SHORT).show();
                        }
                    } catch (Exception e) {
                        Toast.makeText(this, "❌写入文件失败: " + e.getMessage(), Toast.LENGTH_SHORT).show();
                    }
                }
            }

            private void doInference() {
                if (module == null) return;
                String text = inputText.getText().toString();
                if (text.isEmpty()) return;

                // 准备工作：工作锁定状态
                btnCheck.setEnabled(false);
                btnCopy.setEnabled(false);
                btnSaveTxt.setEnabled(false);
                outputText.setText("正在拉起异步 AI 算力引擎...");

                final float temp;
                final float tDe, tDi, tDe3;
                float t1 = 1.2f, t2 = 0.70f, t3 = 0.76f, t4 = 0.76f;
                try {
                    t1 = Float.parseFloat(editTemp.getText().toString());
                    t2 = Float.parseFloat(editThreshDe1.getText().toString());
                    t3 = Float.parseFloat(editThreshDe2.getText().toString());
                    t4 = Float.parseFloat(editThreshDe3.getText().toString());
                } catch (Exception ignored) {}
                temp = t1; tDe = t2; tDi = t3; tDe3 = t4;

                // 开启异步全新跑腿线程，防止一万字导致主线程阻塞闪退
                new Thread(() -> {
                    try {
                        long startTime = System.currentTimeMillis();
                        long unkId = vocab.containsKey("[UNK]") ? vocab.get("[UNK]") : 1;
                        long maskId = vocab.containsKey("[MASK]") ? vocab.get("[MASK]") : 2;
                        String[] labels = {"的", "地", "得"};

                        // 分割句子
                        String[] sentences = text.split("(?<=[。！？!?\n])");
                        
                        StringBuilder errorsHtmlBuilder = new StringBuilder(); 
                        StringBuilder fullHtmlBuilder = new StringBuilder();   
                        StringBuilder cleanTextBuilder = new StringBuilder();  
                        int totalChangeCount = 0;
                        long lastUpdateTime = System.currentTimeMillis();

                        for (int sIdx = 0; sIdx < sentences.length; sIdx++) {
                            String sentence = sentences[sIdx];
                            if (sentence.isEmpty()) {
                                fullHtmlBuilder.append("<br>");
                                cleanTextBuilder.append("\n");
                                continue;
                            }

                            ByteBuffer byteBuffer = ByteBuffer.allocateDirect(sentence.length() * 8);
                            byteBuffer.order(ByteOrder.nativeOrder());
                            LongBuffer inputBuffer = byteBuffer.asLongBuffer();

                            for (int i = 0; i < sentence.length(); i++) {
                                String ch = String.valueOf(sentence.charAt(i));
                                if (ch.equals("的") || ch.equals("地") || ch.equals("得")) {
                                    inputBuffer.put(maskId);
                                } else {
                                    inputBuffer.put(vocab.containsKey(ch) ? vocab.get(ch) : unkId);
                                }
                            }
                            inputBuffer.rewind();

                            Tensor inputTensor = Tensor.fromBlob(inputBuffer, new long[]{1, sentence.length()});
                            Tensor outputTensor = module.forward(IValue.from(inputTensor)).toTensor();
                            float[] scores = outputTensor.getDataAsFloatArray();

                            boolean currentSentenceHasError = false;
                            StringBuilder sClean = new StringBuilder();
                            StringBuilder sFullHtml = new StringBuilder();
                            StringBuilder sErrorHtml = new StringBuilder();

                            for (int i = 0; i < sentence.length(); i++) {
                                String ch = String.valueOf(sentence.charAt(i));
                                if (ch.equals("的") || ch.equals("地") || ch.equals("得")) {
                                    int baseIdx = i * 3;
                                    float s0 = (float) Math.exp(scores[baseIdx] / temp);
                                    float s1 = (float) Math.exp(scores[baseIdx + 1] / temp);
                                    float s2 = (float) Math.exp(scores[baseIdx + 2] / temp);
                                    float sum = s0 + s1 + s2;
                                    float p0 = s0 / sum, p1 = s1 / sum, p2 = s2 / sum;

                                    int maxIdx = 0; float maxProb = p0;
                                    if (p1 > maxProb) { maxProb = p1; maxIdx = 1; }
                                    if (p2 > maxProb) { maxProb = p2; maxIdx = 2; }

                                    float currentThreshold = tDe;
                                    if (maxIdx == 1) currentThreshold = tDi;
                                    if (maxIdx == 2) currentThreshold = tDe3;

                                    String pred = labels[maxIdx];
                                    if (!pred.equals(ch) && maxProb >= currentThreshold) {
                                        currentSentenceHasError = true;
                                        totalChangeCount++;

                                        sClean.append(pred);
                                        sFullHtml.append("<font color='#E53935'><b>").append(pred).append("</b></font>");
                                        sErrorHtml.append("<font color='#E53935'>").append(ch).append("</font>→<b>").append(pred).append("</b><font color='#888888'><small>（").append(String.format("%.2f", maxProb)).append("）</small></font>");
                                    } else {
                                        sClean.append(ch);
                                        sFullHtml.append(ch);
                                        sErrorHtml.append(ch);
                                    }
                                } else {
                                    sClean.append(ch);
                                    if (ch.equals("\n")) {
                                        sFullHtml.append("<br>");
                                        sErrorHtml.append("<br>");
                                    } else {
                                        sFullHtml.append(ch);
                                        sErrorHtml.append(ch);
                                    }
                                }
                            }

                            cleanTextBuilder.append(sClean);
                            fullHtmlBuilder.append(sFullHtml);
                            if (currentSentenceHasError) {
                                errorsHtmlBuilder.append(" ").append(sErrorHtml).append("<br>");
                            }

                            //【核心升级：流式限流刷新 + 动态计时器】
                            // 每隔 250 毫秒（或处理到最后一句时）就向主线程抛一次界面快照，防止频繁刷新卡UI
                            long now = System.currentTimeMillis();
                            if (now - lastUpdateTime > 250 || sIdx == sentences.length - 1) {
                                lastUpdateTime = now;
                                double elapsedSec = (now - startTime) / 1000.0;
                                
                                StringBuilder liveReport = new StringBuilder();
                                liveReport.append(" <b>AI 正在审查... 已耗时 <font color='#2196F3'>").append(String.format("%.1f", elapsedSec)).append("</font> 秒</b><br>");
                                liveReport.append("进度：已分析 ").append(sIdx + 1).append(" / ").append(sentences.length).append(" 句<br><br>");
                                
                                if (errorsHtmlBuilder.length() > 0) {
                                    liveReport.append("<font color='#757575'><b>【🔍 错误修正明细】</b></font><br>")
                                              .append(errorsHtmlBuilder.toString())
                                              .append("<br>---------------------------------------<br><br>");
                                }
                                liveReport.append("<font color='#757575'><b>【📄 修正后完整全文】</b></font><br>")
                                           .append(fullHtmlBuilder.toString());

                                final String htmlSnapshot = liveReport.toString();
                                runOnUiThread(() -> outputText.setText(Html.fromHtml(htmlSnapshot, Html.FROM_HTML_MODE_COMPACT)));
                            }
                        }

                        // 最终大结局：渲染全量完工报告
                        cleanTextResult = cleanTextBuilder.toString();
                        long totalTime = System.currentTimeMillis() - startTime;
                        double totalTimeSec = totalTime / 1000.0;

                        StringBuilder finalReport = new StringBuilder();
                        finalReport.append("<b>检查完毕！共更正 <font color='#E53935'>").append(totalChangeCount).append("</font> 处。总耗时 ").append(String.format("%.2f", totalTimeSec)).append(" 秒。</b><br><br>");
                        
                        if (totalChangeCount > 0) {
                            finalReport.append("<font color='#757575'><b>【错误句子：】</b></font><br>")
                                       .append(errorsHtmlBuilder.toString())
                                       .append("<br>---------------------------------------<br><br>");
                        }
                        finalReport.append("<font color='#757575'><b>【修正后的全文】</b></font><br>")
                                   .append(fullHtmlBuilder.toString());

                        final String finalHtmlStr = finalReport.toString();
                        final int finalChanges = totalChangeCount;
                        runOnUiThread(() -> {
                            outputText.setText(Html.fromHtml(finalHtmlStr, Html.FROM_HTML_MODE_COMPACT));
                            btnCheck.setEnabled(true);
                            if (finalChanges > 0 || !cleanTextResult.isEmpty()) {
                                btnCopy.setEnabled(true);
                                btnSaveTxt.setEnabled(true);
                            }
                        });

                    } catch (Exception e) {
                        final String errMsg = e.getMessage();
                        runOnUiThread(() -> {
                            outputText.setText("推理出错: " + errMsg);
                            btnCheck.setEnabled(true);
                        });
                    }
                }).start();
            }

            private String assetFilePath(Context context, String assetName) throws Exception {
                File file = new File(context.getFilesDir(), assetName);
                if (file.exists() && file.length() > 0) return file.getAbsolutePath();
                try (InputStream is = context.getAssets().open(assetName);
                     FileOutputStream os = new FileOutputStream(file)) {
                    byte[] buffer = new byte[4 * 1024];
                    int read;
                    while ((read = is.read(buffer)) != -1) os.write(buffer, 0, read);
                    os.flush();
                }
                return file.getAbsolutePath();
            }
        }
        EOF

        # 7. 下载 Gradle Wrapper 核心文件
        wget -q https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.jar -O gradle/wrapper/gradle-wrapper.jar
        wget -q https://raw.githubusercontent.com/gradle/gradle/master/gradlew -O gradlew
        chmod +x gradlew

        # 8. 生成 wrapper 配置文件
        cat << 'EOF' > gradle/wrapper/gradle-wrapper.properties
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-7.5.1-bin.zip
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        EOF

    - name: set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    - name: Build APK
      run: |
        ./gradlew assembleDebug --stacktrace --console=plain > build_output.log 2>&1 || {
          echo "### ❌ 编译未通过！以下是手机专供的具体报错信息：" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`text" >> $GITHUB_STEP_SUMMARY
          tail -n 100 build_output.log >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          exit 1
        }

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Dededi-App-APK
        path: app/build/outputs/apk/debug/app-debug.apk
