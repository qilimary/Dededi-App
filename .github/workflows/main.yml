            public static String serializeBlocks(List<List<TextBlock>> blocks) {
                JSONArray arr = new JSONArray();
                try {
                    for (List<TextBlock> sentence : blocks) {
                        JSONArray sentArr = new JSONArray();
                        for (TextBlock b : sentence) {
                            JSONObject obj = new JSONObject();
                            obj.put("o", b.original);
                            obj.put("c", b.current);
                            obj.put("mc", b.modelCorrected);
                            obj.put("m", b.isMutable);
                            obj.put("f", b.conf);
                            obj.put("t", b.type);
                            obj.put("u", b.userModified);
                            sentArr.put(obj);
                        }
                        arr.put(sentArr);
                    }
                } catch (Exception e) {}
                return arr.toString();
            }
            
            public static List<List<TextBlock>> deserializeBlocks(String json) {
                List<List<TextBlock>> blocks = new ArrayList<>();
                try {
                    JSONArray arr = new JSONArray(json);
                    for (int i = 0; i < arr.length(); i++) {
                        JSONArray sentArr = arr.getJSONArray(i);
                        List<TextBlock> sentence = new ArrayList<>();
                        for (int j = 0; j < sentArr.length(); j++) {
                            JSONObject obj = sentArr.getJSONObject(j);
                            TextBlock b = new TextBlock(
                                obj.getString("o"),
                                obj.getString("c"),
                                obj.getBoolean("m"),
                                (float) obj.getDouble("f"),
                                obj.getInt("t")
                            );
                            b.modelCorrected = obj.getString("mc");
                            b.userModified = obj.getBoolean("u");
                            sentence.add(b);
                        }
                        blocks.add(sentence);
                    }
                } catch (Exception e) {}
                return blocks;
            }

            public static synchronized void loadTypoMap(Context ctx) {
                typoMap.clear();
                customTypoKeys.clear();
                maxTypoLen = 0;
                minTypoLen = Integer.MAX_VALUE;
                try {
                    InputStream is = ctx.getAssets().open("错别字.txt");
                    BufferedReader br = new BufferedReader(new InputStreamReader(is, StandardCharsets.UTF_8));
                    String line;
                    while ((line = br.readLine()) != null) {
                        line = line.trim();
                        if (line.isEmpty()) continue;
                        String[] parts = line.split("\\s+");
                        if (parts.length >= 2) {
                            String err = parts[0];
                            String corr = parts[1];
                            if (!err.equals(corr)) {
                                typoMap.put(err, corr);
                                maxTypoLen = Math.max(maxTypoLen, err.length());
                                minTypoLen = Math.min(minTypoLen, err.length());
                            }
                        }
                    }
                    br.close();
                } catch (Exception e) {}
                
                try {
                    SharedPreferences prefs = ctx.getSharedPreferences("DedediConfig", Context.MODE_PRIVATE);
                    String customTyposStr = prefs.getString("custom_typos", "{}");
                    JSONObject customTypos = new JSONObject(customTyposStr);
                    Iterator<String> keys = customTypos.keys();
                    while (keys.hasNext()) {
                        String err = keys.next();
                        String corr = customTypos.getString(err);
                        typoMap.put(err, corr);
                        customTypoKeys.add(err);
                        maxTypoLen = Math.max(maxTypoLen, err.length());
                        minTypoLen = Math.min(minTypoLen, err.length());
                    }
                } catch (Exception e) {}
                
                if (minTypoLen == Integer.MAX_VALUE) minTypoLen = 0;
                typoMapLoaded = true;
            }

            public static void extractTextFromUriAsync(Context context, android.net.Uri uri, TextExtractCallback callback) {
                new Handler(Looper.getMainLooper()).post(() -> {
                    if (callback != null) callback.onStart();
                });
                new Thread(() -> {
                    try {
                        String mimeType = context.getContentResolver().getType(uri);
                        String name = getFileName(context, uri);
                        if (name != null) name = name.toLowerCase();

                        if ((name != null && (name.endsWith(".jpg") || name.endsWith(".jpeg") || name.endsWith(".png") || name.endsWith(".bmp") || name.endsWith(".webp"))) ||
                            (mimeType != null && mimeType.startsWith("image/"))) {
                            Bitmap bitmap = android.provider.MediaStore.Images.Media.getBitmap(context.getContentResolver(), uri);
                            String result = performOcrOnBitmap(bitmap, context, callback);
                            new Handler(Looper.getMainLooper()).post(() -> {
                                if(callback != null) callback.onExtracted(result);
                            });
                            return;
                        }
                        else if ((name != null && name.endsWith(".pdf")) || "application/pdf".equals(mimeType)) {
                            String result = performOcrOnPdf(uri, context, callback);
                            new Handler(Looper.getMainLooper()).post(() -> {
                                if(callback != null) callback.onExtracted(result);
                            });
                            return;
                        }
                        String text = extractTextFromUri(context, uri);
                        new Handler(Looper.getMainLooper()).post(() -> {
                            if(callback != null) callback.onExtracted(text);
                        });
                    } catch (Exception e) {
                        new Handler(Looper.getMainLooper()).post(() -> {
                            if(callback != null) callback.onExtracted("");
                        });
                    }
                }).start();
            }
            
            public static String cleanOcrText(String text) {
                if (text == null) return "";
                String[] lines = text.split("\n", -1);
                StringBuilder sb = new StringBuilder();
                boolean first = true;
                for (int i = 0; i < lines.length; i++) {
                    String line = lines[i];
                    String trimmed = line.trim();
                    if (trimmed.length() == 1) {
                        if ("个口日目一丨丶卜丿〇回凸凹卐卍了的地得".contains(trimmed)) {
                            continue;
                        }
                    }
                    if (!first) sb.append("\n");
                    sb.append(line);
                    first = false;
                }
                return sb.toString();
            }

            public static int countDarkPixels(Bitmap b, int y) {
                int w = b.getWidth();
                int step = Math.max(1, w / 30);
                int count = 0;
                for(int x = 0; x < w; x += step) {
                    int color = b.getPixel(x, y);
                    int r = Color.red(color), g = Color.green(color), bl = Color.blue(color);
                    if (r < 220 && g < 220 && bl < 220) {
                        count++;
                    }
                }
                return count;
            }

            public static String performOcrOnBitmap(Bitmap fullBitmap, Context context, TextExtractCallback callback) throws Exception {
                TextRecognizer recognizer = TextRecognition.getClient(new ChineseTextRecognizerOptions.Builder().build());
                StringBuilder fullText = new StringBuilder();

                List<Bitmap> chunks = new ArrayList<>();
                int maxH = 3000;
                int currentY = 0;
                while(currentY < fullBitmap.getHeight()) {
                    if (fullBitmap.getHeight() - currentY <= maxH) {
                        chunks.add(Bitmap.createBitmap(fullBitmap, 0, currentY, fullBitmap.getWidth(), fullBitmap.getHeight() - currentY));
                        break;
                    }
                    int searchStart = Math.max(currentY + maxH / 2, currentY + 10);
                    int searchEnd = currentY + maxH;
                    int splitY = searchEnd;
                    int bestBlankHeight = 0, currentBlankHeight = 0, potentialSplit = searchEnd;
                    int minDarkPixels = Integer.MAX_VALUE, bestRow = searchEnd;

                    for (int y = searchStart; y < searchEnd; y++) {
                        int darkPixels = countDarkPixels(fullBitmap, y);
                        if (darkPixels < minDarkPixels) {
                            minDarkPixels = darkPixels;
                            bestRow = y;
                        }
                        if (darkPixels <= 5) {
                            currentBlankHeight++;
                            if (currentBlankHeight > bestBlankHeight) {
                                bestBlankHeight = currentBlankHeight;
                                potentialSplit = y - currentBlankHeight / 2;
                            }
                        } else {
                            currentBlankHeight = 0;
                        }
                    }
                    if (bestBlankHeight >= 5) {
                        splitY = potentialSplit;
                    } else {
                        splitY = bestRow; 
                    }
                    chunks.add(Bitmap.createBitmap(fullBitmap, 0, currentY, fullBitmap.getWidth(), splitY - currentY));
                    currentY = splitY;
                }

                for (int i = 0; i < chunks.size(); i++) {
                    final int progress = i + 1;
                    if(callback != null) {
                        new Handler(Looper.getMainLooper()).post(() -> callback.onProgress(progress, chunks.size()));
                    }
                    Bitmap chunk = chunks.get(i);
                    InputImage image = InputImage.fromBitmap(chunk, 0);
                    Task<Text> result = recognizer.process(image);
                    Text text = Tasks.await(result);
                    fullText.append(text.getText()).append("\n");
                    chunk.recycle();
                }
                return cleanOcrText(fixPunctuation(fullText.toString()));
            }

            public static String performOcrOnPdf(android.net.Uri uri, Context context, TextExtractCallback callback) throws Exception {
                TextRecognizer recognizer = TextRecognition.getClient(new ChineseTextRecognizerOptions.Builder().build());
                StringBuilder fullText = new StringBuilder();
                android.os.ParcelFileDescriptor pfd = context.getContentResolver().openFileDescriptor(uri, "r");
                if (pfd != null) {
                    android.graphics.pdf.PdfRenderer renderer = new android.graphics.pdf.PdfRenderer(pfd);
                    int pageCount = renderer.getPageCount();
                    for(int i = 0; i < pageCount; i++) {
                        final int progress = i + 1;
                        if(callback != null) {
                            new Handler(Looper.getMainLooper()).post(() -> callback.onProgress(progress, pageCount));
                        }
                        android.graphics.pdf.PdfRenderer.Page page = renderer.openPage(i);
                        Bitmap bitmap = Bitmap.createBitmap(page.getWidth() * 2, page.getHeight() * 2, Bitmap.Config.ARGB_8888);
                        bitmap.eraseColor(Color.WHITE);
                        page.render(bitmap, null, null, android.graphics.pdf.PdfRenderer.Page.RENDER_MODE_FOR_DISPLAY);
                        page.close();

                        InputImage image = InputImage.fromBitmap(bitmap, 0);
                        Task<Text> result = recognizer.process(image);
                        Text text = Tasks.await(result);
                        fullText.append(text.getText()).append("\n");
                        bitmap.recycle();
                    }
                    renderer.close();
                    pfd.close();
                }
                return fixPunctuation(fullText.toString());
            }

            public static String fixPunctuation(String text) {
                if (text == null) return "";
                text = text.replaceAll("(?<=[\\u4e00-\\u9fa5])\\.{2,6}(?=[\\u4e00-\\u9fa5]?)", "……");
                text = text.replaceAll("(?<=[\\u4e00-\\u9fa5]?)\\.{2,6}(?=[\\u4e00-\\u9fa5])", "……");

                StringBuilder sb = new StringBuilder(text.length());
                boolean inQuote = false;
                for (int i = 0; i < text.length(); i++) {
                    char c = text.charAt(i);
                    boolean isPunct = (c == ',' || c == '.' || c == ':' || c == ';' || c == '?' || c == '!' || c == '"' || c == '(' || c == ')' || c == '\'');
                    if (isPunct) {
                        boolean prevIsCh = false, nextIsCh = false;
                        for (int j = i - 1; j >= Math.max(0, i - 3); j--) {
                            if (isChinese(text.charAt(j))) { prevIsCh = true; break; }
                            if (Character.isWhitespace(text.charAt(j))) continue;
                            break;
                        }
                        for (int j = i + 1; j < Math.min(text.length(), i + 4); j++) {
                            if (isChinese(text.charAt(j))) { nextIsCh = true; break; }
                            if (Character.isWhitespace(text.charAt(j))) continue;
                            break;
                        }

                        if (prevIsCh || nextIsCh) {
                            if (c == ',') c = '，';
                            else if (c == '.') c = '。';
                            else if (c == ':') c = '：';
                            else if (c == ';') c = '；';
                            else if (c == '?') c = '？';
                            else if (c == '!') c = '！';
                            else if (c == '(') c = '（';
                            else if (c == ')') c = '）';
                            else if (c == '"') {
                                c = inQuote ? '”' : '“';
                                inQuote = !inQuote;
                            }
                            else if (c == '\'') c = '’';
                        }
                    }
                    sb.append(c);
                }
                return sb.toString();
            }

            public static boolean isChinese(char c) {
                return c >= '\u4e00' && c <= '\u9fa5';
            }

            public static String extractTextFromUri(Context context, android.net.Uri uri) {
                try {
                    String name = getFileName(context, uri);
                    String mimeType = context.getContentResolver().getType(uri);
                    if ((name != null && name.toLowerCase().endsWith(".docx")) || 
                        "application/vnd.openxmlformats-officedocument.wordprocessingml.document".equals(mimeType)) {
                        java.util.zip.ZipInputStream zis = new java.util.zip.ZipInputStream(context.getContentResolver().openInputStream(uri));
                        java.util.zip.ZipEntry entry;
                        String xmlContent = null;
                        while ((entry = zis.getNextEntry()) != null) {
                            if (entry.getName().equals("word/document.xml")) {
                                java.io.ByteArrayOutputStream baos = new java.io.ByteArrayOutputStream();
                                byte[] buffer = new byte[4096];
                                int len;
                                while ((len = zis.read(buffer)) != -1) {
                                    baos.write(buffer, 0, len);
                                }
                                xmlContent = baos.toString("UTF-8");
                                break;
                            }
                        }
                        zis.close();
                        if (xmlContent == null) return "";
            
                        StringBuilder textBuilder = new StringBuilder();
                        try {
                            org.xmlpull.v1.XmlPullParserFactory factory = org.xmlpull.v1.XmlPullParserFactory.newInstance();
                            org.xmlpull.v1.XmlPullParser parser = factory.newPullParser();
                            parser.setInput(new java.io.StringReader(xmlContent));
                            int eventType = parser.getEventType();
                            boolean inText = false;
                            while (eventType != org.xmlpull.v1.XmlPullParser.END_DOCUMENT) {
                                String tagName = parser.getName();
                                if (eventType == org.xmlpull.v1.XmlPullParser.START_TAG) {
                                    if ("t".equals(tagName) || "w:t".equals(tagName)) {
                                        inText = true;
                                    }
                                } else if (eventType == org.xmlpull.v1.XmlPullParser.TEXT && inText) {
                                    textBuilder.append(parser.getText());
                                } else if (eventType == org.xmlpull.v1.XmlPullParser.END_TAG) {
                                    if ("t".equals(tagName) || "w:t".equals(tagName)) {
                                        inText = false;
                                    } else if ("p".equals(tagName) || "w:p".equals(tagName)) {
                                        textBuilder.append("\n"); // 遇到段落结束符时加个换行
                                    }
                                }
                                eventType = parser.next();
                            }
                        } catch (Exception e) {
                            java.util.regex.Matcher m = java.util.regex.Pattern.compile("<w:t[^>]*>(.*?)</w:t>", java.util.regex.Pattern.DOTALL).matcher(xmlContent);
                            while (m.find()) {
                                textBuilder.append(m.group(1));
                            }
                        }
            
                        String raw = textBuilder.toString();
                        raw = raw.replaceAll("<[^>]+>", "");
                        raw = raw.replace("&lt;", "<").replace("&gt;", ">").replace("&amp;", "&").replace("&quot;", "\"").replace("&apos;", "'");
                        return raw;
                    } else if ((name != null && name.toLowerCase().endsWith(".pptx")) || 
                        "application/vnd.openxmlformats-officedocument.presentationml.presentation".equals(mimeType)) {
                        java.util.zip.ZipInputStream zis = new java.util.zip.ZipInputStream(context.getContentResolver().openInputStream(uri));
                        java.util.zip.ZipEntry entry;
                        StringBuilder textBuilder = new StringBuilder();
                        while ((entry = zis.getNextEntry()) != null) {
                            if (entry.getName().startsWith("ppt/slides/slide") && entry.getName().endsWith(".xml")) {
                                java.io.ByteArrayOutputStream baos = new java.io.ByteArrayOutputStream();
                                byte[] buffer = new byte[4096];
                                int len;
                                while ((len = zis.read(buffer)) != -1) { baos.write(buffer, 0, len); }
                                String xmlContent = baos.toString("UTF-8");
                                java.util.regex.Matcher m = java.util.regex.Pattern.compile("<a:t[^>]*>(.*?)</a:t>", java.util.regex.Pattern.DOTALL).matcher(xmlContent);
                                while (m.find()) { textBuilder.append(m.group(1)); }
                                textBuilder.append("\n\n"); // 不同的幻灯片之间加空行分隔
                            }
                        }
                        zis.close();
                        String raw = textBuilder.toString().replaceAll("<[^>]+>", "");
                        return raw.replace("&lt;", "<").replace("&gt;", ">").replace("&amp;", "&").replace("&quot;", "\"").replace("&apos;", "'").trim();
                    } else {
                        java.io.InputStream is = context.getContentResolver().openInputStream(uri);
                        java.io.BufferedReader br = new java.io.BufferedReader(new java.io.InputStreamReader(is, StandardCharsets.UTF_8));
                        StringBuilder sb = new StringBuilder();
                        String line;
                        while ((line = br.readLine()) != null) {
                            sb.append(line).append("\n");
                        }
                        br.close();
                        return sb.toString();
                    }
                } catch (Exception e) {
                    e.printStackTrace();
                    return "";
                }
            }

            public static String getFileName(Context context, android.net.Uri uri) {
                String result = null;
                if (uri.getScheme().equals("content")) {
                    try (android.database.Cursor cursor = context.getContentResolver().query(uri, null, null, null, null)) {
                        if (cursor != null && cursor.moveToFirst()) {
                            result = cursor.getString(cursor.getColumnIndexOrThrow(android.provider.OpenableColumns.DISPLAY_NAME));
                        }
                    } catch (Exception e) {}
                }
                if (result == null) {
                    result = uri.getPath();
                    int cut = result.lastIndexOf('/');
                    if (cut != -1) {
                        result = result.substring(cut + 1);
                    }
                }
                return result;
            }

            private void openFilePicker() {
                Intent intent = new Intent(Intent.ACTION_GET_CONTENT);
                intent.setType("*/*");
                intent.putExtra(Intent.EXTRA_MIME_TYPES, new String[]{"text/plain", "text/markdown", "application/vnd.openxmlformats-officedocument.wordprocessingml.document", "application/vnd.openxmlformats-officedocument.presentationml.presentation", "application/pdf", "image/*"});
                startActivityForResult(intent, 102);
            }

            private void saveHistory(String text) {
                if (text == null || text.trim().isEmpty()) return;
                try {
                    String historyStr = sp.getString("history_records", "[]");
                    JSONArray historyArray = new JSONArray(historyStr);
                    
                    int currentHash = text.hashCode();
                    if (historyArray.length() > 0) {
                        JSONObject lastRecord = historyArray.getJSONObject(0);
                        if (lastRecord.has("textHash") && lastRecord.getInt("textHash") == currentHash) return;
                        if (lastRecord.has("text") && lastRecord.getString("text").equals(text)) return;
                    }
                    
                    JSONObject newRecord = new JSONObject();
                    newRecord.put("time", new SimpleDateFormat("yyyy-MM-dd HH:mm:ss", Locale.getDefault()).format(new Date()));
                    newRecord.put("textHash", currentHash);
                    
                    String preview = text.length() > 16 ? text.substring(0, 16).replace("\n", " ") + "..." : text.replace("\n", " ");
                    newRecord.put("preview", preview);
                    
                    String fileId = UUID.randomUUID().toString();
                    newRecord.put("file", fileId);
                    lastSavedHistoryFileId = fileId;
                    
                    File dir = new File(getFilesDir(), "history");
                    if (!dir.exists()) dir.mkdirs();
                    
                    // 保存原文
                    FileOutputStream fos = new FileOutputStream(new File(dir, fileId + ".txt"));
                    fos.write(text.getBytes("UTF-8"));
                    fos.close();
                    
                    // 如果有纠错结果，也保存下来
                    if (!allSentencesBlocks.isEmpty()) {
                        String blocksJson = serializeBlocks(allSentencesBlocks);
                        FileOutputStream fosBlocks = new FileOutputStream(new File(dir, fileId + "_blocks.json"));
                        fosBlocks.write(blocksJson.getBytes("UTF-8"));
                        fosBlocks.close();
                    }
                    
                    JSONArray newArray = new JSONArray();
                    newArray.put(newRecord);
                    int limit = Math.min(historyArray.length(), 49);
                    for (int i = 0; i < limit; i++) {
                        newArray.put(historyArray.getJSONObject(i));
                    }
                    
                    if (historyArray.length() >= 50) {
                        for (int i = 49; i < historyArray.length(); i++) {
                            String oldFileId = historyArray.getJSONObject(i).optString("file", "");
                            if (!oldFileId.isEmpty()) {
                                new File(dir, oldFileId + ".txt").delete();
                                new File(dir, oldFileId + "_blocks.json").delete();
                              
                            }
                        }
                    }
                    
                    sp.edit().putString("history_records", newArray.toString()).apply();
                    renderHistoryUI();
                } catch (Exception e) {}
            }
            
