            private void renderCustomTyposUI() {
                FlowLayout llCustomTypos = findViewById(R.id.llCustomTypos);
                Button btnExpandTypos = findViewById(R.id.btnExpandTypos);
                EditText etOriginal = findViewById(R.id.etOriginal);
                EditText etCorrected = findViewById(R.id.etCorrected);
                Button btnAddTypo = findViewById(R.id.btnAddTypo);
                llCustomTypos.removeAllViews();
                try {
                    String customStr = sp.getString("custom_typos", "{}");
                    JSONObject obj = new JSONObject(customStr);
                    Iterator<String> keys = obj.keys();
                    List<String[]> list = new ArrayList<>();
                    while(keys.hasNext()){
                        String k = keys.next();
                        list.add(new String[]{k, obj.getString(k)});
                    }
                    
                    int displayCount = isTyposExpanded ? list.size() : Math.min(list.size(), 15);
                    for(int i=0; i<displayCount; i++){
                        String[] item = list.get(i);
                        TextView tv = new TextView(this);
                        String displayTxt = item[0].equals(item[1]) ? item[0] : (item[0] + " → " + item[1]);
                        tv.setText(displayTxt);
                        tv.setPadding(16, 16, 16, 16);
                        tv.setTextSize(14f);
                        tv.setTextColor(Color.parseColor("#4CAF50"));
                        tv.setBackgroundResource(R.drawable.item_bg_selector);
                        tv.setClickable(true);
                        tv.setOnClickListener(v -> {
                            new AlertDialog.Builder(this)
                                .setTitle("操作错词")
                                .setMessage("原始：" + item[0] + "\n修改后：" + (item[0].equals(item[1]) ? "（保持不变）" : item[1]))
                                .setPositiveButton("删除", (d, w) -> {
                                    obj.remove(item[0]);
                                    sp.edit().putString("custom_typos", obj.toString()).apply();
                                    loadTypoMap(this);
                                    renderCustomTyposUI();
                                })
                                .setNeutralButton("编辑", (d, w) -> {
                                    editingTypoKey = item[0];
                                    etOriginal.setText(item[0]);
                                    etCorrected.setText(item[0].equals(item[1]) ? "" : item[1]);
                                    btnAddTypo.setText("完成");
                                })
                                .setNegativeButton("取消", null)
                                .show();
                        });
                        llCustomTypos.addView(tv);
                    }
                    
                    if (list.size() > 15) {
                        btnExpandTypos.setVisibility(View.VISIBLE);
                        btnExpandTypos.setText(isTyposExpanded ? "折叠" : "展开全部");
                        btnExpandTypos.setOnClickListener(v -> {
                            isTyposExpanded = !isTyposExpanded;
                            renderCustomTyposUI();
                        });
                    } else {
                        btnExpandTypos.setVisibility(View.GONE);
                    }
                } catch(Exception e){}
            }
            
            private void renderHistoryUI() {
                LinearLayout llHistory = findViewById(R.id.llHistory);
                llHistory.removeAllViews();
                try {
                    String historyStr = sp.getString("history_records", "[]");
                    JSONArray arr = new JSONArray(historyStr);
                    for(int i=0; i<arr.length(); i++){
                        JSONObject obj = arr.getJSONObject(i);
                        String time = obj.optString("time", "");
                        String preview = obj.optString("preview", "");
                        if (preview.isEmpty() && obj.has("text")) {
                            String rawText = obj.optString("text", "");
                            preview = rawText.length() > 16 ? rawText.substring(0, 16).replace("\n", " ") + "..." : rawText.replace("\n", " ");
                        }
                        if(preview.length() > 16) preview = preview.substring(0, 16) + "...";
                        String fileId = obj.optString("file", obj.optString("fileName", ""));
                        
                        LinearLayout itemLayout = new LinearLayout(this);
                        itemLayout.setOrientation(LinearLayout.VERTICAL);
                        itemLayout.setPadding(0, 24, 0, 24);
                        itemLayout.setBackgroundResource(R.drawable.item_bg_selector);
                        itemLayout.setClickable(true);
                        
                        TextView tvTime = new TextView(this);
                        tvTime.setText(time);
                        tvTime.setTextSize(12f);
                        tvTime.setTextColor(Color.parseColor("#9E9E9E"));
                        
                        TextView tvPreview = new TextView(this);
                        tvPreview.setText(preview);
                        tvPreview.setTextSize(14f);
                        
                        itemLayout.addView(tvTime);
                        itemLayout.addView(tvPreview);
                        
                        itemLayout.setOnClickListener(v -> {
                            drawerLayout.closeDrawer(GravityCompat.END);
                            progressBar.setVisibility(View.VISIBLE);
                            progressBar.setIndeterminate(true);
                            new Thread(() -> {
                                String fullText = "";
                                String blocksJson = "";
                                if (!fileId.isEmpty()) {
                                    try {
                                        File dir = new File(getFilesDir(), "history");
                                        File f = new File(dir, fileId + ".txt");
                                        if(f.exists()){
                                            FileInputStream fis = new FileInputStream(f);
                                            byte[] data = new byte[(int) f.length()];
                                            fis.read(data);
                                            fis.close();
                                            fullText = new String(data, "UTF-8");
                                        }
                                        File bf = new File(dir, fileId + "_blocks.json");
                                        if(bf.exists()){
                                            FileInputStream fisB = new FileInputStream(bf);
                                            byte[] dataB = new byte[(int) bf.length()];
                                            fisB.read(dataB);
                                            fisB.close();
                                            blocksJson = new String(dataB, "UTF-8");
                                        }
                                    } catch(Exception e){}
                                } else {
                                    fullText = obj.optString("text", "");
                                }
                                
                                final String textToSet = fullText;
                                final String blocksToSet = blocksJson;
                                runOnUiThread(() -> {
                                    isRestoringHistory = true;
                                    inputText.setText(textToSet);
                                    isRestoringHistory = false;
                                    lastSavedHistoryFileId = fileId;
                                    
                                    if (!blocksToSet.isEmpty()) {
                                        allSentencesBlocks = deserializeBlocks(blocksToSet);
                                        lastTimeMs = 0;
                                        renderFinalBlocks();
                                        btnCheck.setText("继续纠错");
                                        btnCopy.setEnabled(true);
                                        btnSaveTxt.setEnabled(true);
                                    } else {
                                        allSentencesBlocks.clear();
                                        outputText.setText("");
                                        btnCheck.setText("开始纠错");
                                    }
                                    progressBar.setVisibility(View.INVISIBLE);
                                    progressBar.setIndeterminate(false);
                                });
                            }).start();
                            
                           
                        });
                        
                        final int index = i;
                        itemLayout.setOnLongClickListener(v -> {
                            new AlertDialog.Builder(this)
                                .setMessage("确认删除这条历史记录吗？")
                                .setPositiveButton("删除", (d, w) -> {
                                    try {
                                        String delFileId = arr.getJSONObject(index).optString("file", "");
                                        if(!delFileId.isEmpty()) new File(new File(getFilesDir(), "history"), delFileId + ".txt").delete();
                                    } catch(Exception e) {}
                                    
                                    if (android.os.Build.VERSION.SDK_INT >= android.os.Build.VERSION_CODES.KITKAT) {
                                        arr.remove(index);
                                    } else {
                                        JSONArray newArr = new JSONArray();
                                        try {
                                            for(int j=0; j<arr.length(); j++){
                                                if (j != index) newArr.put(arr.get(j));
                                            }
                                        } catch (Exception e) {}
                                        sp.edit().putString("history_records", newArr.toString()).apply();
                                        renderHistoryUI();
                                        return;
                                    }
                                    sp.edit().putString("history_records", arr.toString()).apply();
                                    renderHistoryUI();
                                })
                                .setNegativeButton("取消", null)
                                .show();
                            return true;
                        });
                        
                        llHistory.addView(itemLayout);
                        
                        if (i < arr.length() - 1) {
                            View line = new View(this);
                            line.setLayoutParams(new LinearLayout.LayoutParams(LinearLayout.LayoutParams.MATCH_PARENT, 1));
                            line.setBackgroundColor(Color.parseColor("#E0E0E0"));
                            llHistory.addView(line);
                        }
                    }
                } catch(Exception e){}
            }
            
            @Override
            protected void onResume() {
                super.onResume();
                String sync = sp.getString("sync_text", "");
                if (!sync.isEmpty() && !sync.equals(inputText.getText().toString())) {
                    inputText.setText(sync);
                }
                
                boolean spFast = sp.getBoolean("is_fast_mode", false);
                if (spFast != currentIsFast || rgMode.getCheckedRadioButtonId() == -1) {
                    currentIsFast = spFast;
                    rgMode.check(currentIsFast ? R.id.rbFast : R.id.rbPro);
                    loadSettings(currentIsFast);
                }
                
                if (hasNewFloatResult) {
                    hasNewFloatResult = false;
                    isManuallyEditedOut = false;
                    renderFinalBlocks();
                    btnCopy.setEnabled(true);
                    btnCheck.setEnabled(true);
                    btnSaveTxt.setEnabled(true);
                    scrollView.post(() -> scrollView.fullScroll(View.FOCUS_UP));
                }
            }

            @Override
            protected void onNewIntent(Intent intent) {
                super.onNewIntent(intent);
                handleIntent(intent);
            }
            
            private void handleIntent(Intent intent) {
                if (intent == null) return;
                if (Intent.ACTION_SEND.equals(intent.getAction()) && intent.getType() != null) {
                    if ("text/plain".equals(intent.getType())) {
                        String sharedText = intent.getStringExtra(Intent.EXTRA_TEXT);
                        if (sharedText != null) {
                            inputText.setText(sharedText);
                            sp.edit().putString("sync_text", sharedText).apply();
                        }
                    } else if (intent.getType().startsWith("image/")) {
                        android.net.Uri imageUri = (android.net.Uri) intent.getParcelableExtra(Intent.EXTRA_STREAM);
                        if (imageUri != null) {
                            Toast.makeText(this, "正在处理导入图片，请稍候...", Toast.LENGTH_SHORT).show();
                            extractTextFromUriAsync(this, imageUri, new TextExtractCallback() {
                                @Override public void onStart() { progressBar.setVisibility(View.VISIBLE); progressBar.setProgress(0); }
                                @Override public void onProgress(int p, int m) { progressBar.setMax(m); progressBar.setProgress(p); }
                                @Override public void onExtracted(String text) {
                                    progressBar.setVisibility(View.INVISIBLE);
                                    if (text != null && !text.trim().isEmpty()) {
                                        inputText.setText(text);
                                        saveHistory(text);
                                    } else {
                                        Toast.makeText(MainActivity.this, "无法读取图片文字", Toast.LENGTH_SHORT).show();
                                    }
                                }
                            });
                        }
                    }
                } else if (intent.hasExtra("SYNC_TEXT")) {
                    String syncText = intent.getStringExtra("SYNC_TEXT");
                    if (syncText != null && !syncText.isEmpty()) {
                        inputText.setText(syncText);
                        sp.edit().putString("sync_text", syncText).apply();
                    }
                }
            }

            private void startFloatingService() {
                Intent intent = new Intent(this, FloatingService.class);
                if (android.os.Build.VERSION.SDK_INT >= android.os.Build.VERSION_CODES.O) { startForegroundService(intent); } 
                else { startService(intent); }
                Toast.makeText(this, "悬浮窗已开启", Toast.LENGTH_SHORT).show();
                moveTaskToBack(true);
            }

            private boolean hasError(List<TextBlock> clause) {
                for (TextBlock b : clause) { if (b.isMutable && (!b.current.equals(b.original) || b.userModified)) return true; }
                return false;
            }

            private void loadSettings(boolean isFast) {
                String prefix = isFast ? "fast_" : "pro_";
                editTemp.setText(sp.getString(prefix + "temp", isFast ? "1.2" : "1.0"));
                editThreshDe1.setText(sp.getString(prefix + "th1", isFast ? "0.80" : "0.70"));
                editThreshDe2.setText(sp.getString(prefix + "th2", isFast ? "0.80" : "0.75"));
                editThreshDe3.setText(sp.getString(prefix + "th3", isFast ? "0.80" : "0.75"));
            }

            private void saveSettings(boolean isFast) {
                String prefix = isFast ? "fast_" : "pro_";
                sp.edit().putString(prefix + "temp", editTemp.getText().toString()).putString(prefix + "th1", editThreshDe1.getText().toString())
                  .putString(prefix + "th2", editThreshDe2.getText().toString()).putString(prefix + "th3", editThreshDe3.getText().toString()).apply();
            }

            @Override
            protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                super.onActivityResult(requestCode, resultCode, data);
                if (requestCode == 201) {
                    if (android.os.Build.VERSION.SDK_INT >= android.os.Build.VERSION_CODES.M && android.provider.Settings.canDrawOverlays(this)) {
                        startFloatingService();
                    } else { Toast.makeText(this, "悬浮窗权限未被授予，无法开启", Toast.LENGTH_SHORT).show(); }
                }
                if (requestCode == 102 && resultCode == RESULT_OK && data != null) {
                    android.net.Uri uri = data.getData();
                    if (uri != null) {
                        Toast.makeText(this, "正在处理导入文件，请稍候...", Toast.LENGTH_SHORT).show();
                        extractTextFromUriAsync(this, uri, new TextExtractCallback() {
                            @Override public void onStart() { progressBar.setVisibility(View.VISIBLE); progressBar.setProgress(0); }
                            @Override public void onProgress(int p, int m) { progressBar.setMax(m); progressBar.setProgress(p); }
                            @Override public void onExtracted(String text) {
                                progressBar.setVisibility(View.INVISIBLE);
                                if (text != null && !text.trim().isEmpty()) {
                                    inputText.setText(text);
                                    saveHistory(text);
                                    Toast.makeText(MainActivity.this, "导入成功", Toast.LENGTH_SHORT).show();
                                } else {
                                    Toast.makeText(MainActivity.this, "无法读取文件内容或未识别到文字", Toast.LENGTH_SHORT).show();
                                }
                            }
                        });
                    }
                }
                if (requestCode == 101 && resultCode == RESULT_OK && data != null && data.getData() != null) {
                    try {
                        OutputStream os = getContentResolver().openOutputStream(data.getData());
                        if (os != null) {
                            if (saveFormat == 0 || saveFormat == 1) {
                                os.write(pendingSaveText.getBytes(StandardCharsets.UTF_8));
                            } else if (saveFormat == 2) {
                                android.graphics.pdf.PdfDocument pdf = new android.graphics.pdf.PdfDocument();
                                android.text.TextPaint paint = new android.text.TextPaint();
                                paint.setTextSize(14); paint.setColor(Color.BLACK);
                                android.text.StaticLayout sl = new android.text.StaticLayout(pendingSaveText, paint, 555, android.text.Layout.Alignment.ALIGN_NORMAL, 1.5f, 0.0f, false);
                                int textHeight = sl.getHeight() + 40; int pageHeight = Math.max(842, textHeight);
                                android.graphics.pdf.PdfDocument.PageInfo pageInfo = new android.graphics.pdf.PdfDocument.PageInfo.Builder(595, pageHeight, 1).create();
                                android.graphics.pdf.PdfDocument.Page page = pdf.startPage(pageInfo);
                                android.graphics.Canvas canvas = page.getCanvas();
                                canvas.translate(20, 20); sl.draw(canvas);
                                pdf.finishPage(page); pdf.writeTo(os); pdf.close();
                            } else if (saveFormat == 3) {
                                java.util.zip.ZipOutputStream zos = new java.util.zip.ZipOutputStream(os);
                                zos.putNextEntry(new java.util.zip.ZipEntry("[Content_Types].xml"));
                                zos.write(("<?xml version=\"1.0\" encoding=\"UTF-8\"?><Types xmlns=\"http://schemas.openxmlformats.org/package/2006/content-types\"><Default Extension=\"rels\" ContentType=\"application/vnd.openxmlformats-package.relationships+xml\"/><Override PartName=\"/word/document.xml\" ContentType=\"application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml\"/></Types>").getBytes(StandardCharsets.UTF_8));
                                zos.closeEntry(); zos.putNextEntry(new java.util.zip.ZipEntry("_rels/.rels"));
                                zos.write(("<?xml version=\"1.0\" encoding=\"UTF-8\"?><Relationships xmlns=\"http://schemas.openxmlformats.org/package/2006/relationships\"><Relationship Id=\"rId1\" Type=\"http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument\" Target=\"word/document.xml\"/></Relationships>").getBytes(StandardCharsets.UTF_8));
                                zos.closeEntry(); zos.putNextEntry(new java.util.zip.ZipEntry("word/document.xml"));
                                String safeText = pendingSaveText.replace("&", "&amp;").replace("<", "&lt;").replace(">", "&gt;");
                                StringBuilder docxContent = new StringBuilder("<?xml version=\"1.0\" encoding=\"UTF-8\"?><w:document xmlns:w=\"http://schemas.openxmlformats.org/wordprocessingml/2006/main\"><w:body>");
                                for(String p : safeText.split("\n")) { docxContent.append("<w:p><w:r><w:t xml:space=\"preserve\">").append(p).append("</w:t></w:r></w:p>"); }
                                docxContent.append("</w:body></w:document>");
                                zos.write(docxContent.toString().getBytes(StandardCharsets.UTF_8));
                                zos.closeEntry(); zos.close();
                            } else if (saveFormat == 4 || saveFormat == 5) {
                                android.text.TextPaint paint = new android.text.TextPaint();
                                paint.setTextSize(40); paint.setColor(Color.BLACK); paint.setAntiAlias(true);
                                String cleanText = pendingSaveText;
                                if (cleanText.isEmpty()) cleanText = "无内容";
                                android.text.StaticLayout sl = new android.text.StaticLayout(cleanText, paint, 1000, android.text.Layout.Alignment.ALIGN_NORMAL, 1.5f, 0.0f, false);
                                android.graphics.Bitmap bitmap = android.graphics.Bitmap.createBitmap(1080, sl.getHeight() + 80, android.graphics.Bitmap.Config.ARGB_8888);
                                android.graphics.Canvas canvas = new android.graphics.Canvas(bitmap);
                                canvas.drawColor(Color.WHITE);
                                canvas.translate(40, 40);
                                sl.draw(canvas);
                                if (saveFormat == 4) {
                                    bitmap.compress(android.graphics.Bitmap.CompressFormat.JPEG, 90, os);
                                } else {
                                    bitmap.compress(android.graphics.Bitmap.CompressFormat.PNG, 100, os);
                                }
                                bitmap.recycle();
                            }
                            os.close(); Toast.makeText(this, "保存成功", Toast.LENGTH_SHORT).show();
                        }
                    } catch (Exception e) { Toast.makeText(this, "保存过程出现错误", Toast.LENGTH_SHORT).show(); }
                }
            }

            private void loadVocab(Map<String, Long> map, String assetName) throws Exception {
                InputStream is = getAssets().open(assetName);
                byte[] buffer = new byte[is.available()];
                is.read(buffer); is.close();
                JSONObject json = new JSONObject(new String(buffer, StandardCharsets.UTF_8));
                Iterator<String> keys = json.keys();
                while(keys.hasNext()) { String key = keys.next(); map.put(key, (long) json.getInt(key)); }
            }

            private Module loadDecryptedModule(Context context, String assetName, String cacheKey) throws Exception {
                File cacheFile = new File(context.getFilesDir(), cacheKey + ".ptl");
                if (cacheFile.exists() && cacheFile.length() > 0) {
                    try { return LiteModuleLoader.load(cacheFile.getAbsolutePath()); } catch (Exception e) { cacheFile.delete(); }
                }
                byte[] keyBytes = getSecretKey(); byte[] ivBytes = getSecretIV();
                Cipher cipher = Cipher.getInstance("AES/CBC/PKCS5Padding");
                cipher.init(Cipher.DECRYPT_MODE, new SecretKeySpec(keyBytes, "AES"), new IvParameterSpec(ivBytes));
                File tempFile = new File(context.getFilesDir(), cacheKey + "_tmp.ptl");
                try (InputStream is = context.getAssets().open(assetName); CipherInputStream cis = new CipherInputStream(is, cipher); GZIPInputStream gis = new GZIPInputStream(cis); FileOutputStream os = new FileOutputStream(tempFile)) {
                    byte[] buffer = new byte[8192]; int read; while ((read = gis.read(buffer)) != -1) os.write(buffer, 0, read);
                    os.flush();
                }
                tempFile.renameTo(cacheFile); return LiteModuleLoader.load(cacheFile.getAbsolutePath());
            }

            private void doInference(boolean isFastMode) {
                String text = inputText.getText().toString();
                if (text.isEmpty()) {
                    isCheckingMain = false;
                    btnCheck.setText("开始纠错");
                    return;
                }

                btnCopy.setEnabled(false); btnSaveTxt.setEnabled(false);
                final float temp, tDe, tDi, tDe3;
                float t1 = 1.0f, t2 = 0.70f, t3 = 0.75f, t4 = 0.75f;
                try {
                    t1 = Float.parseFloat(editTemp.getText().toString()); t2 = Float.parseFloat(editThreshDe1.getText().toString());
                    t3 = Float.parseFloat(editThreshDe2.getText().toString()); t4 = Float.parseFloat(editThreshDe3.getText().toString());
                } catch (Exception ignored) {}
                temp = t1; tDe = t2; tDi = t3; tDe3 = t4;

                new Thread(() -> {
                    try {
                        runOnUiThread(() -> { getWindow().addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON); progressBar.setVisibility(View.VISIBLE); progressBar.setProgress(0); });
                        long startTime = System.currentTimeMillis();
                        String[] labels = {"的", "地", "得"};
                                        // ===== 一级分割：按句号等强断点 =====
                        java.util.List<String> sList = new java.util.ArrayList<>();
                        StringBuilder tSb = new StringBuilder();
                        for (int i = 0; i < text.length(); i++) {
                            char c = text.charAt(i); tSb.append(c);
                            if (c == '。' || c == '！' || c == '？' || c == '!' || c == '?' || c == '\n') {
                                sList.add(tSb.toString()); tSb.setLength(0);
                            }
                        }
                        if (tSb.length() > 0) sList.add(tSb.toString());
        
                        // ===== 二级保底分割：确保单段不超过 300 字 =====
                        final int MAX_SEQ_LEN = 300;
                        java.util.List<String> finalList = new java.util.ArrayList<>();
                        for (String seg : sList) {
                            if (seg.length() <= MAX_SEQ_LEN) { finalList.add(seg); continue; }
                            StringBuilder sb2 = new StringBuilder();
                            for (int i = 0; i < seg.length(); i++) {
                                sb2.append(seg.charAt(i));
                                if (sb2.length() >= MAX_SEQ_LEN) {
                                    String sub = sb2.toString();
                                    // 从末尾往回找最近的弱断点（逗号/分号/顿号）
                                    int splitPos = -1;
                                    for (int j = sub.length() - 1; j >= Math.max(0, sub.length() - 60); j--) {
                                        char sc = sub.charAt(j);
                                        if (sc == '，' || sc == ',' || sc == '；' || sc == ';' || sc == '、') {
                                            splitPos = j; break;
                                        }
                                    }
                                    if (splitPos > 0) {
                                        finalList.add(sub.substring(0, splitPos + 1));
                                        sb2 = new StringBuilder(sub.substring(splitPos + 1));
                                    } else {
                                        // 找不到自然断点，强制截断
                                        finalList.add(sub);
                                        sb2 = new StringBuilder();
                                    }
                                }
                            }
                            if (sb2.length() > 0) finalList.add(sb2.toString());
                        }
                        String[] sentences = finalList.toArray(new String[0]);
                        runOnUiThread(() -> progressBar.setMax(sentences.length));
                        allSentencesBlocks.clear(); StringBuilder liveErrorsHtml = new StringBuilder(); long lastUIUpdateTime = System.currentTimeMillis();
                        int liveErrorCount = 0; 

                        for (int sIdx = 0; sIdx < sentences.length; sIdx++) {
                            if (!isCheckingMain) {
                                runOnUiThread(() -> {
                                    outputText.setText("已取消纠错。");
                                    btnCheck.setText("开始纠错");
                                    btnCheck.setEnabled(true);
                                    progressBar.setVisibility(View.INVISIBLE);
                                });
                                return;
                            }

                            String sentence = sentences[sIdx];
                            if (sentence.isEmpty()) continue;
                            List<TextBlock> currentSentenceBlocks = new ArrayList<>();
                            
                            List<String> combinedIgnore = new ArrayList<>(Arrays.asList(IGNORE_WORDS));
                            combinedIgnore.addAll(typoMap.keySet());
                            boolean[] isIgnored = new boolean[sentence.length()];
                            for (String w : combinedIgnore) {
                                int idx = sentence.indexOf(w);
                                while (idx >= 0) { 
                                    for (int k = 0; k < w.length(); k++) isIgnored[idx + k] = true; 
                                    idx = sentence.indexOf(w, idx + 1); 
                                }
                            }

                            boolean hasTarget = false;
                            for (int i = 0; i < sentence.length(); i++) {
                                char c = sentence.charAt(i);
                                if ((c == '的' || c == '地' || c == '得') && !isIgnored[i]) { hasTarget = true; break; }
                            }

                            if (!hasTarget || temp <= 0.0f) {
                                currentSentenceBlocks.add(new TextBlock(sentence, sentence, false, 0f, 0));
                            } else {
                                float[] scores;
                                int vocabSize = isFastMode ? 3 : proVocab.size();
                                if (isFastMode) {
                                    long fUnk = fastVocab.getOrDefault("[UNK]", 1L); long fMask = fastVocab.getOrDefault("[MASK]", 2L);
                                    long[] ids = new long[sentence.length()];
                                    for (int i = 0; i < sentence.length(); i++) {
                                        String ch = String.valueOf(sentence.charAt(i));
                                        if (!isIgnored[i] && (ch.equals("的") || ch.equals("地") || ch.equals("得"))) ids[i] = fMask;
                                        else ids[i] = fastVocab.getOrDefault(ch, fUnk);
                                    }
                                    Tensor inputTensor = Tensor.fromBlob(ids, new long[]{1, sentence.length()});
                                    scores = fastModule.forward(IValue.from(inputTensor)).toTensor().getDataAsFloatArray();
                                } else {
                                    int exactLen = sentence.length() + 2;
                                    long[] ids = new long[exactLen]; long[] masks = new long[exactLen]; long[] types = new long[exactLen];
                                    ids[0] = clsId; masks[0] = 1; types[0] = 0;
                                    for (int i = 0; i < sentence.length(); i++) {
                                        String ch = String.valueOf(sentence.charAt(i));
                                        if (!isIgnored[i] && (ch.equals("的") || ch.equals("地") || ch.equals("得"))) ids[i + 1] = maskId;
                                        else ids[i + 1] = proVocab.getOrDefault(ch, unkId);
                                        masks[i + 1] = 1; types[i + 1] = 0;
                                    }
                                    ids[exactLen - 1] = sepId; masks[exactLen - 1] = 1; types[exactLen - 1] = 0;
                                    Tensor tIds = Tensor.fromBlob(ids, new long[]{1, exactLen}); Tensor tMasks = Tensor.fromBlob(masks, new long[]{1, exactLen}); Tensor tTypes = Tensor.fromBlob(types, new long[]{1, exactLen});
                                    IValue outputVal = proModule.forward(IValue.from(tIds), IValue.from(tMasks), IValue.from(tTypes));
                                    Tensor outTensor = outputVal.isTuple() ? outputVal.toTuple()[0].toTensor() : outputVal.toTensor();
                                    scores = outTensor.getDataAsFloatArray();
                                }

                                StringBuilder normalText = new StringBuilder();
                                Runnable flushNormal = () -> {
                                    if(normalText.length() > 0) { currentSentenceBlocks.add(new TextBlock(normalText.toString(), normalText.toString(), false, 0f, 0)); normalText.setLength(0); }
                                };

                                for (int i = 0; i < sentence.length(); i++) {
                                    char ch = sentence.charAt(i);
                                    if (isIgnored[i] || (ch != '的' && ch != '地' && ch != '得')) {
                                        normalText.append(ch);
                                        if (ch == '，' || ch == ',' || ch == '；' || ch == ';' || ch == '、' || ch == '\n') flushNormal.run();
                                        continue;
                                    }
                                    flushNormal.run();
                                    
                                    float s0, s1, s2;
                                    if (isFastMode) {
                                        int base = i * 3; s0 = (float) Math.exp(scores[base] / temp); s1 = (float) Math.exp(scores[base + 1] / temp); s2 = (float) Math.exp(scores[base + 2] / temp);
                                    } else {
                                        int seqPos = i + 1; 
                                        s0 = (float) Math.exp(scores[seqPos * vocabSize + (int)deId] / temp); s1 = (float) Math.exp(scores[seqPos * vocabSize + (int)diId] / temp); s2 = (float) Math.exp(scores[seqPos * vocabSize + (int)de2Id] / temp);
                                    }
                                    float sum = s0 + s1 + s2; float p0 = s0 / sum, p1 = s1 / sum, p2 = s2 / sum;
                                    int maxIdx = 0; float maxProb = p0;
                                    if (p1 > maxProb) { maxProb = p1; maxIdx = 1; }
                                    if (p2 > maxProb) { maxProb = p2; maxIdx = 2; }
                                    float threshold = maxIdx == 1 ? tDi : (maxIdx == 2 ? tDe3 : tDe);
                                    String pred = labels[maxIdx];
                                    boolean changed = !pred.equals(String.valueOf(ch)) && maxProb >= threshold;
                                    currentSentenceBlocks.add(new TextBlock(String.valueOf(ch), changed ? pred : String.valueOf(ch), true, maxProb, 1));
                                }
                                flushNormal.run();
                            }

                            List<TextBlock> finalSentenceBlocks = new ArrayList<>();
                            for (TextBlock b : currentSentenceBlocks) {
                                if (b.isMutable) {
                                    finalSentenceBlocks.add(b);
                                } else {
                                    int i = 0;
                                    StringBuilder normalBuf = new StringBuilder();
                                    while (i < b.original.length()) {
                                        boolean matchedTypo = false;
                                        boolean matchedQuant = false;
                                        
                                        if (maxTypoLen > 0) {
                                            for (int len = Math.min(maxTypoLen, b.original.length() - i); len >= minTypoLen; len--) {
                                                String sub = b.original.substring(i, i + len);
                                                if (typoMap.containsKey(sub)) {
                                                    if (normalBuf.length() > 0) {
                                                        finalSentenceBlocks.add(new TextBlock(normalBuf.toString(), normalBuf.toString(), false, 0f, 0));
                                                        normalBuf.setLength(0);
                                                    }
                                                    String correct = typoMap.get(sub);
                                                    boolean isRealTypo = !sub.equals(correct);
                                                    int blockType = customTypoKeys.contains(sub) ? 4 : 2;
                                                    finalSentenceBlocks.add(new TextBlock(sub, correct, isRealTypo, 1.0f, blockType));
                                                    i += len;
                                                    matchedTypo = true;
                                                    break;
                                                }
                                            }
                                        }
                                        
                                        if (!matchedTypo && i > 0 && i + 1 < b.original.length()) {
                                            if (normalBuf.length() > 0) {
                                                char numChar = normalBuf.charAt(normalBuf.length() - 1);
                                                char quantChar = b.original.charAt(i);
                                                char nounChar = b.original.charAt(i + 1);
                                                
                                                if (KNOWN_QUANTS.indexOf(quantChar) >= 0 && NUMS.indexOf(numChar) >= 0) {
                                                    if (quantRules.containsKey(nounChar)) {
                                                        QuantifierRule rule = quantRules.get(nounChar);
                                                        if (rule.allowedQuants.indexOf(quantChar) < 0) {
                                                            char nextC = (i + 2 < b.original.length()) ? b.original.charAt(i + 2) : '\0';
                                                            if (isSafeCharAfterNoun(nextC)) {
                                                                if (normalBuf.length() > 0) {
                                                                    finalSentenceBlocks.add(new TextBlock(normalBuf.toString(), normalBuf.toString(), false, 0f, 0));
                                                                    normalBuf.setLength(0);
                                                                }
                                                                finalSentenceBlocks.add(new TextBlock(String.valueOf(quantChar), rule.primaryQuant, true, 1.0f, 3));
                                                                i += 1;
                                                                matchedQuant = true;
                                                            }
                                                        }
                                                    }
                                                }
                                            }
                                        }

                                        if (!matchedTypo && !matchedQuant) {
                                            normalBuf.append(b.original.charAt(i));
                                            i++;
                                        }
                                    }
                                    if (normalBuf.length() > 0) {
                                        finalSentenceBlocks.add(new TextBlock(normalBuf.toString(), normalBuf.toString(), false, 0f, 0));
                                    }
                                }
                            }
                            
                            List<List<TextBlock>> clauses = new ArrayList<>(); List<TextBlock> currentClause = new ArrayList<>();
                            for (TextBlock b : finalSentenceBlocks) {
                                currentClause.add(b); char lastChar = b.original.charAt(b.original.length() - 1);
                                if (lastChar == '，' || lastChar == ',' || lastChar == '；' || lastChar == ';' || lastChar == '、' || lastChar == '\n') { clauses.add(currentClause); currentClause = new ArrayList<>(); }
                            }
                            if (!currentClause.isEmpty()) clauses.add(currentClause);
                            
                            boolean sentenceHasError = false; StringBuilder sentenceErrorHtml = new StringBuilder();
                            for (List<TextBlock> clause : clauses) {
                                if (hasError(clause)) {
                                    sentenceHasError = true;
                                    List<TextBlock> errsInClause = new ArrayList<>();
                                    for (TextBlock b : clause) { if (b.isMutable && (!b.current.equals(b.original) || b.userModified)) errsInClause.add(b); }
                                    
                                    sentenceErrorHtml.append("<font color='#2196F3'><b>[");
                                    for (int i = 0; i < errsInClause.size(); i++) {
                                        sentenceErrorHtml.append(liveErrorCount + i + 1);
                                        if (i < errsInClause.size() - 1) sentenceErrorHtml.append(",");
                                    }
                                    sentenceErrorHtml.append("]</b></font> ");
                                    
                                    for (TextBlock b : clause) {
                                        String safeOrig = b.original.replace("&", "&amp;").replace("<", "&lt;").replace(">", "&gt;");
                                        String safeCurr = b.current.replace("&", "&amp;").replace("<", "&lt;").replace(">", "&gt;");
                                        if (b.isMutable && (!b.current.equals(b.original) || b.userModified)) {
                                            liveErrorCount++;
                                            String confStr = (b.type == 1) ? String.format(" (置信度:%.2f)", b.conf) : ((b.type == 4) ? " (自定义)" : "");
                                            sentenceErrorHtml.append("<font color='#9E9E9E'><s>").append(safeOrig).append("</s></font> <font color='#E53935'><b>").append(safeCurr).append("</b></font><font color='#9E9E9E'><small>").append(confStr).append("</small></font>");
                                        } else { sentenceErrorHtml.append(safeOrig); }
                                    }
                                }
                            }
                            if (sentenceHasError) liveErrorsHtml.append(sentenceErrorHtml.toString()).append("<br><br>");
                            
                            allSentencesBlocks.add(finalSentenceBlocks);

                            StringBuilder liveFullText = new StringBuilder();
                            for (List<TextBlock> sent : allSentencesBlocks) {
                                for (TextBlock tb : sent) {
                                    liveFullText.append(tb.current.replace("&", "&amp;").replace("<", "&lt;").replace(">", "&gt;"));
                                }
                            }
                            String liveTextHtml = liveFullText.toString().replace("\n", "<br>");

                            long now = System.currentTimeMillis(); final int currentProgress = sIdx + 1;
                            if (now - lastUIUpdateTime > 300) {
                                lastUIUpdateTime = now;
                                final String progHtml = "<b>AI 正在审查中...</b><br>已耗时 " + String.format("%.1f", (now-startTime)/1000.0) + " 秒<br>进度：" + currentProgress + " / " + sentences.length + "<br><br>" + 
                                (liveErrorsHtml.length() > 0 ? "<b><font color='#757575'>【发现错误】：</font></b><br>" + liveErrorsHtml.toString() : "") + 
                                "<br><b><font color='#757575'>【全文预览】：</font></b><br>" + liveTextHtml;
                                
                                final int currentErrorCount = liveErrorCount;
                                runOnUiThread(() -> {
                                    progressBar.setProgress(currentProgress); outputText.setText(Html.fromHtml(progHtml, Html.FROM_HTML_MODE_COMPACT));
                                    if (autoScrollEnabled) {
                                        scrollView.post(() -> {
                                            if (currentErrorCount > 0) {
                                                Layout layout = outputText.getLayout();
                                                if (layout != null) {
                                                    String textStr = outputText.getText().toString();
                                                    int offset = textStr.indexOf("【发现错误】：");
                                                    if (offset != -1) {
                                                        int line = layout.getLineForOffset(offset);
                                                        int y = layout.getLineTop(line);
                                                        scrollView.scrollTo(0, Math.max(0, y - scrollView.getHeight() + 150));
                                                    }
                                                }
                                            } else {
                                                scrollView.scrollTo(0, 0);
                                            }
                                        });
                                    }
                                });
                            }
                        }
                        lastTimeMs = System.currentTimeMillis() - startTime;
                        runOnUiThread(() -> { 
                            isCheckingMain = false;
                            btnCheck.setText("开始纠错");
                            renderFinalBlocks(); 
                            btnCheck.setEnabled(true); 
                            btnCopy.setEnabled(true); 
                            btnSaveTxt.setEnabled(true); 
                            scrollView.post(() -> scrollView.fullScroll(View.FOCUS_UP)); 
                        });
                    } catch (Exception e) {
                        final String err = e.getMessage(); runOnUiThread(() -> { 
                            isCheckingMain = false;
                            btnCheck.setText("开始纠错");
                            outputText.setText("推理运行中断: " + err); 
                            btnCheck.setEnabled(true); 
                            btnSaveTxt.setEnabled(true); 
                        });
                    } finally { runOnUiThread(() -> { getWindow().clearFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON); progressBar.setVisibility(View.INVISIBLE); }); }
                }).start();
            }

            private void showEditDialog(TextBlock b) {
                if (b.type == 1) { 
                    String[] options = {"的", "地", "得", "还原为原字 (" + b.original + ")"};
                    new AlertDialog.Builder(this).setTitle("手动修改 (当前：" + b.current + ")").setItems(options, (dialog, which) -> {
                        String choice = which == 0 ? "的" : (which == 1 ? "地" : (which == 2 ? "得" : b.original));
                        b.userModified = !choice.equals(b.modelCorrected);
                        b.current = choice;
                        renderFinalBlocks(); 
                    }).show();
                } else { 
                    String[] options = {"采用修改 (" + b.modelCorrected + ")", "还原 (" + b.original + ")"};
                    new AlertDialog.Builder(this).setTitle("手动修改 (当前：" + b.current + ")").setItems(options, (dialog, which) -> {
                        String choice = (which == 0) ? b.modelCorrected : b.original;
                        b.userModified = !choice.equals(b.modelCorrected);
                        b.current = choice;
                        renderFinalBlocks(); 
                    }).show();
                }
            }

            private void renderFinalBlocks() {
                blockToMainTargetSpan.clear();
                int currentErrors = 0;
                for (List<TextBlock> sentence : allSentencesBlocks) { for (TextBlock b : sentence) { if (b.isMutable && (!b.current.equals(b.original) || b.userModified)) currentErrors++; } }
                
                final int[] baseOffsetObj = {0};
                
                SpannableStringBuilder ssbFull = new SpannableStringBuilder();
                SpannableStringBuilder ssbFullEditor = new SpannableStringBuilder();
                
                currentClauseLinks.clear();
                Map<TextBlock, TargetSpan> blockToTargetSpan = new HashMap<>();
                
                for (List<TextBlock> sentence : allSentencesBlocks) {
                    for (TextBlock b : sentence) {
                        boolean isError = b.isMutable && (!b.current.equals(b.original) || b.userModified);
                        // errorOffsets 已被 TargetSpan 动态锚点替代
                        
                        // 生成主视窗富文本
                        int start = ssbFull.length(); ssbFull.append(b.current);
                        if (isError) {
                            TargetSpan mainTs = new TargetSpan(b.current);
                            blockToMainTargetSpan.put(b, mainTs);
                            ssbFull.setSpan(mainTs, start, ssbFull.length(), Spanned.SPAN_EXCLUSIVE_EXCLUSIVE);
                        }
                        if (b.isMutable) {
                            EditSpan span = new EditSpan() {
                                @Override public void onClick(View widget) { showEditDialog(b); }
                                @Override public void updateDrawState(TextPaint ds) {
                                    ds.setUnderlineText(true);
                                    if (!b.current.equals(b.original)) { 
                                        if (b.userModified) ds.setColor(0xFF4CAF50); 
                                        else ds.setColor(0xFFE53935); 
                                        ds.setTypeface(android.graphics.Typeface.DEFAULT_BOLD); 
                                    } else { 
                                        ds.setColor(0xFF2196F3); 
                                    }
                                }
                            };
                            ssbFull.setSpan(span, start, ssbFull.length(), Spanned.SPAN_EXCLUSIVE_EXCLUSIVE);
                        }
                        
                        // 生成便签专用的纯净富文本
                        int startEd = ssbFullEditor.length(); ssbFullEditor.append(b.current);
                        if (b.isMutable) {
                            if (isError) {
                                TargetSpan ts = new TargetSpan(b.current);
                                blockToTargetSpan.put(b, ts);
                                ssbFullEditor.setSpan(ts, startEd, ssbFullEditor.length(), Spanned.SPAN_EXCLUSIVE_EXCLUSIVE);
                            }
                            
                            if (!b.current.equals(b.original)) { // Green wavy line for both user and model
                                ssbFullEditor.setSpan(new WavyUnderlineSpan(0xFF4CAF50), startEd, ssbFullEditor.length(), Spanned.SPAN_EXCLUSIVE_EXCLUSIVE);
                            }
                        }
                    }
                }
                
                SpannableStringBuilder ssb = new SpannableStringBuilder();
                SpannableStringBuilder ssbEditor = new SpannableStringBuilder();
                
                if (currentErrors == 0) {
                    String header = "检查完毕！未检测到错误。耗时 " + String.format("%.2f", lastTimeMs/1000.0) + " 秒。\n\n";
                    SpannableString headerSp = new SpannableString(header); headerSp.setSpan(new ForegroundColorSpan(0xFF4CAF50), 0, header.length(), Spanned.SPAN_EXCLUSIVE_EXCLUSIVE); 
                    ssb.append(headerSp);
                    SpannableString headerSpEd = new SpannableString(header); headerSpEd.setSpan(new ForegroundColorSpan(0xFF4CAF50), 0, header.length(), Spanned.SPAN_EXCLUSIVE_EXCLUSIVE);
                    ssbEditor.append(headerSpEd);
                } else {
                    String header = "检查完毕！共更正 " + currentErrors + " 处。耗时 " + String.format("%.2f", lastTimeMs/1000.0) + " 秒。\n（点击序号可快速跳转）\n\n";
                    SpannableString headerSp = new SpannableString(header); headerSp.setSpan(new ForegroundColorSpan(0xFF757575), 0, header.length(), Spanned.SPAN_EXCLUSIVE_EXCLUSIVE); 
                    ssb.append(headerSp);
                    SpannableString headerSpEd = new SpannableString(header); headerSpEd.setSpan(new ForegroundColorSpan(0xFF757575), 0, header.length(), Spanned.SPAN_EXCLUSIVE_EXCLUSIVE);
                    ssbEditor.append(headerSpEd);
                    
                    SpannableString listHeader = new SpannableString("【纠错清单：】\n"); 
                    listHeader.setSpan(new ForegroundColorSpan(0xFF757575), 0, listHeader.length(), Spanned.SPAN_EXCLUSIVE_EXCLUSIVE); 
                    listHeader.setSpan(new android.text.style.StyleSpan(android.graphics.Typeface.BOLD), 0, listHeader.length(), Spanned.SPAN_EXCLUSIVE_EXCLUSIVE); 
                    ssb.append(listHeader);
                    SpannableString listHeaderEd = new SpannableString("【纠错清单：】\n"); 
                    listHeaderEd.setSpan(new ForegroundColorSpan(0xFF757575), 0, listHeader.length(), Spanned.SPAN_EXCLUSIVE_EXCLUSIVE); 
                    listHeaderEd.setSpan(new android.text.style.StyleSpan(android.graphics.Typeface.BOLD), 0, listHeader.length(), Spanned.SPAN_EXCLUSIVE_EXCLUSIVE);
                    ssbEditor.append(listHeaderEd);
                    
                    int listErrIdx = 0; 
                    for (List<TextBlock> sentence : allSentencesBlocks) {
                        List<List<TextBlock>> clauses = new ArrayList<>(); List<TextBlock> currentClause = new ArrayList<>();
                        for (TextBlock b : sentence) {
                            currentClause.add(b); char lastChar = b.original.charAt(b.original.length() - 1);
                            if (lastChar == '，' || lastChar == ',' || lastChar == '；' || lastChar == ';' || lastChar == '、' || lastChar == '\n') { clauses.add(currentClause); currentClause = new ArrayList<>(); }
                        }
                        if (!currentClause.isEmpty()) clauses.add(currentClause);
                        
                        for (List<TextBlock> clause : clauses) {
                            List<TextBlock> errsInClause = new ArrayList<>();
                            for (TextBlock b : clause) { if (b.isMutable && (!b.current.equals(b.original) || b.userModified)) errsInClause.add(b); }
                            
                            if (!errsInClause.isEmpty()) {
                                // ======== Main view (ssb) ========
                                int stStart = ssb.length();
                                ssb.append("[");
                                for (int i = 0; i < errsInClause.size(); i++) {
                                    ssb.append(String.valueOf(listErrIdx + i + 1));
                                    if (i < errsInClause.size() - 1) ssb.append(",");
                                }
                                ssb.append("] ");
                                
                                final int firstErrIdxInClause = listErrIdx;
                                JumpSpan jumpSpan = new JumpSpan() {
                                    @Override public void onClick(View w) {
                                        try {
                                            TextView tv = (TextView) w;
                                            Spannable spanText = (Spannable) tv.getText();
                                            for (TextBlock b : clause) {
                                                if (b.isMutable && (!b.current.equals(b.original) || b.userModified)) {
                                                    TargetSpan mainTs = blockToMainTargetSpan.get(b);
                                                    if (mainTs != null) {
                                                        int pos = spanText.getSpanStart(mainTs);
                                                        if (pos >= 0 && pos < spanText.length()) {
                                                            Layout layout = tv.getLayout();
                                                            if (layout != null) {
                                                                int line = layout.getLineForOffset(pos);
                                                                int y = layout.getLineTop(line);
                                                                scrollView.scrollTo(0, Math.max(0, y - scrollView.getHeight() / 3));
                                                                int lineStart = layout.getLineStart(line);
                                                                int lineEnd = layout.getLineEnd(line);
                                                                BackgroundColorSpan flashSpan = new BackgroundColorSpan(0x609E9E9E); 
                                                                spanText.setSpan(flashSpan, lineStart, lineEnd, Spanned.SPAN_EXCLUSIVE_EXCLUSIVE);
                                                                Handler handler = new Handler(Looper.getMainLooper());
                                                                handler.postDelayed(() -> { spanText.removeSpan(flashSpan); tv.invalidate(); }, 500);
                                                                handler.postDelayed(() -> { spanText.setSpan(flashSpan, lineStart, lineEnd, Spanned.SPAN_EXCLUSIVE_EXCLUSIVE); tv.invalidate(); }, 800);
                                                                handler.postDelayed(() -> { spanText.removeSpan(flashSpan); tv.invalidate(); }, 1300);
                                                                break;
                                                            }
                                                        }
                                                    }
                                                }
                                            }
                                        } catch (Exception e) {}
                                    }
                                    @Override public void updateDrawState(TextPaint ds) { ds.setColor(0xFF2196F3); ds.setUnderlineText(true); ds.setFakeBoldText(true); }
                                };
                                ssb.setSpan(jumpSpan, stStart, ssb.length(), Spanned.SPAN_EXCLUSIVE_EXCLUSIVE);
                                
                                for (TextBlock b : clause) {
                                    if (b.isMutable && (!b.current.equals(b.original) || b.userModified)) {
                                        int oldTextStart = ssb.length(); 
                                        ssb.append(b.original); 
                                        ssb.setSpan(new StrikethroughSpan(), oldTextStart, ssb.length(), Spanned.SPAN_EXCLUSIVE_EXCLUSIVE); 
                                        ssb.setSpan(new ForegroundColorSpan(0xFF9E9E9E), oldTextStart, ssb.length(), Spanned.SPAN_EXCLUSIVE_EXCLUSIVE); 
                                        ssb.append(" ");
                                        
                                        int newStart = ssb.length(); 
                                        ssb.append(b.current);
                                        
                                        EditSpan clickSpan = new EditSpan() {
                                            @Override public void onClick(View w) { showEditDialog(b); }
                                            @Override public void updateDrawState(TextPaint ds) { 
                                                if (!b.current.equals(b.original)) { 
                                                    if (b.userModified) ds.setColor(0xFF4CAF50); 
                                                    else ds.setColor(0xFFE53935); 
                                                    ds.setTypeface(android.graphics.Typeface.DEFAULT_BOLD); 
                                                } else { 
                                                    ds.setColor(0xFF2196F3); 
                                                }
                                                ds.setUnderlineText(true); 
                                            }
                                        };
                                        ssb.setSpan(clickSpan, newStart, ssb.length(), Spanned.SPAN_EXCLUSIVE_EXCLUSIVE);
                                        
                                        if (!b.userModified && b.type == 1) {
                                            String confStr = "置信度: " + String.format("%.2f", b.conf);
                                            int confStart = ssb.length(); ssb.append("(").append(confStr).append(")"); 
                                            ssb.setSpan(new ForegroundColorSpan(0xFF9E9E9E), confStart, ssb.length(), Spanned.SPAN_EXCLUSIVE_EXCLUSIVE); 
                                            ssb.setSpan(new android.text.style.RelativeSizeSpan(0.85f), confStart, ssb.length(), Spanned.SPAN_EXCLUSIVE_EXCLUSIVE);
                                        } else if (!b.userModified && b.type == 4) {
                                            int confStart = ssb.length(); ssb.append("(自定义)");
                                            ssb.setSpan(new ForegroundColorSpan(0xFF9E9E9E), confStart, ssb.length(), Spanned.SPAN_EXCLUSIVE_EXCLUSIVE); 
                                            ssb.setSpan(new android.text.style.RelativeSizeSpan(0.85f), confStart, ssb.length(), Spanned.SPAN_EXCLUSIVE_EXCLUSIVE);
                                        }
                                        
                                        listErrIdx++;
                                    } else { 
                                        ssb.append(b.current); 
                                    }
                                }
                                ssb.append("\n");
                                
                                // ======== Editor (ssbEditor) ========
                                final ClauseLink link = new ClauseLink();
                                int edMarkerStart = ssbEditor.length();
                                ssbEditor.append("[");
                                for (int i = 0; i < errsInClause.size(); i++) {
                                    ssbEditor.append(String.valueOf(listErrIdx - errsInClause.size() + i + 1));
                                    if (i < errsInClause.size() - 1) ssbEditor.append(",");
                                }
                                ssbEditor.append("] ");
                                int edMarkerEnd = ssbEditor.length();
                                
                                ListMarkerSpan lms = new ListMarkerSpan();
                                ssbEditor.setSpan(lms, edMarkerStart, edMarkerEnd, Spanned.SPAN_EXCLUSIVE_EXCLUSIVE);
                                ssbEditor.setSpan(new ForegroundColorSpan(0xFF2196F3), edMarkerStart, edMarkerEnd, Spanned.SPAN_EXCLUSIVE_EXCLUSIVE);
                                ssbEditor.setSpan(new android.text.style.StyleSpan(android.graphics.Typeface.BOLD), edMarkerStart, edMarkerEnd, Spanned.SPAN_EXCLUSIVE_EXCLUSIVE);
                                link.listMarkerSpan = lms;
                                
                                JumpSpan edJumpSpan = new JumpSpan() {
                                    @Override public void onClick(View w) {
                                        try {
                                            if (!link.isDead && !link.targetSpans.isEmpty()) {
                                                EditText et = (EditText) w;
                                                Editable editable = et.getText();
                                                TargetSpan firstTarget = null;
                                                for (TargetSpan ts : link.targetSpans) {
                                                    int tsStart = editable.getSpanStart(ts);
                                                    if (tsStart >= 0 && tsStart < editable.length()) { firstTarget = ts; break; }
                                                }
                                                if (firstTarget != null) {
                                                    int pos = editable.getSpanStart(firstTarget);
                                                    Layout layout = et.getLayout();
                                                    if (layout != null && pos >= 0 && pos < editable.length()) {
                                                        int line = layout.getLineForOffset(pos);
                                                        int y = layout.getLineTop(line);
                                                        et.scrollTo(0, Math.max(0, y - et.getHeight() / 3));
                                                        int lineStart = layout.getLineStart(line);
                                                        int lineEnd = layout.getLineEnd(line);
                                                        BackgroundColorSpan flashSpan = new BackgroundColorSpan(0x609E9E9E); 
                                                        editable.setSpan(flashSpan, lineStart, lineEnd, Spanned.SPAN_EXCLUSIVE_EXCLUSIVE);
                                                        Handler handler = new Handler(Looper.getMainLooper());
                                                        handler.postDelayed(() -> { try { editable.removeSpan(flashSpan); et.invalidate(); } catch(Exception e){} }, 500);
                                                        handler.postDelayed(() -> { try { editable.setSpan(flashSpan, lineStart, lineEnd, Spanned.SPAN_EXCLUSIVE_EXCLUSIVE); et.invalidate(); } catch(Exception e){} }, 800);
                                                        handler.postDelayed(() -> { try { editable.removeSpan(flashSpan); et.invalidate(); } catch(Exception e){} }, 1300);
                                                    }
                                                }
                                            }
                                        } catch (Exception e) {}
                                    }
                                    @Override public void updateDrawState(TextPaint ds) { ds.setColor(0xFF2196F3); ds.setUnderlineText(true); ds.setFakeBoldText(true); }
                                };
                                ssbEditor.setSpan(edJumpSpan, edMarkerStart, edMarkerEnd, Spanned.SPAN_EXCLUSIVE_EXCLUSIVE);
                                
                                for (TextBlock b : clause) {
                                    if (b.isMutable && (!b.current.equals(b.original) || b.userModified)) {
                                        int edOldStart = ssbEditor.length();
                                        ssbEditor.append(b.original);
                                        ssbEditor.setSpan(new StrikethroughSpan(), edOldStart, ssbEditor.length(), Spanned.SPAN_EXCLUSIVE_EXCLUSIVE); 
                                        ssbEditor.setSpan(new ForegroundColorSpan(0xFF9E9E9E), edOldStart, ssbEditor.length(), Spanned.SPAN_EXCLUSIVE_EXCLUSIVE); 
                                        ssbEditor.append(" ");
                                        int edNewStart = ssbEditor.length();
                                        ssbEditor.append(b.current);
                                        if (b.userModified) {
                                            ssbEditor.setSpan(new ForegroundColorSpan(0xFF4CAF50), edNewStart, ssbEditor.length(), Spanned.SPAN_EXCLUSIVE_EXCLUSIVE);
                                        } else {
                                            ssbEditor.setSpan(new ForegroundColorSpan(0xFFE53935), edNewStart, ssbEditor.length(), Spanned.SPAN_EXCLUSIVE_EXCLUSIVE);
                                        }
                                        ssbEditor.setSpan(new android.text.style.StyleSpan(android.graphics.Typeface.BOLD), edNewStart, ssbEditor.length(), Spanned.SPAN_EXCLUSIVE_EXCLUSIVE);
                                        if (!b.userModified && b.type == 1) {
                                            String confStr = "置信度: " + String.format("%.2f", b.conf);
                                            int confStart = ssbEditor.length(); ssbEditor.append("(").append(confStr).append(")"); 
                                            ssbEditor.setSpan(new ForegroundColorSpan(0xFF9E9E9E), confStart, ssbEditor.length(), Spanned.SPAN_EXCLUSIVE_EXCLUSIVE); 
                                            ssbEditor.setSpan(new android.text.style.RelativeSizeSpan(0.85f), confStart, ssbEditor.length(), Spanned.SPAN_EXCLUSIVE_EXCLUSIVE);
                                        } else if (!b.userModified && b.type == 4) {
                                            int confStart = ssbEditor.length(); ssbEditor.append("(自定义)");
                                            ssbEditor.setSpan(new ForegroundColorSpan(0xFF9E9E9E), confStart, ssbEditor.length(), Spanned.SPAN_EXCLUSIVE_EXCLUSIVE); 
                                            ssbEditor.setSpan(new android.text.style.RelativeSizeSpan(0.85f), confStart, ssbEditor.length(), Spanned.SPAN_EXCLUSIVE_EXCLUSIVE);
                                        }
                                    } else { 
                                        ssbEditor.append(b.current); 
                                    }
                                }
                                ssbEditor.append("\n");
                                
                                for (TextBlock b : clause) {
                                    if (b.isMutable && (!b.current.equals(b.original) || b.userModified)) {
                                        TargetSpan ts = blockToTargetSpan.get(b);
                                        if (ts != null) link.targetSpans.add(ts);
                                    }
                                }
                                
                                currentClauseLinks.add(link);
                            }
                        }
                    }
                    
                    SpannableString sep = new SpannableString("\n---------------------------------\n\n"); 
                    sep.setSpan(new ForegroundColorSpan(0xFF757575), 0, sep.length(), Spanned.SPAN_EXCLUSIVE_EXCLUSIVE); 
                    ssb.append(sep); ssbEditor.append(sep);
                }
                
                SpannableString fullHeader = new SpannableString(currentErrors > 0 ? "【修正后的全文】\n" : "【原文】\n"); 
                fullHeader.setSpan(new ForegroundColorSpan(0xFF757575), 0, fullHeader.length(), Spanned.SPAN_EXCLUSIVE_EXCLUSIVE); 
                fullHeader.setSpan(new android.text.style.StyleSpan(android.graphics.Typeface.BOLD), 0, fullHeader.length(), Spanned.SPAN_EXCLUSIVE_EXCLUSIVE); 
                ssb.append(fullHeader);
                SpannableString fullHeaderEd = new SpannableString(currentErrors > 0 ? "【修正后的全文】\n" : "【原文】\n"); 
                fullHeaderEd.setSpan(new ForegroundColorSpan(0xFF757575), 0, fullHeaderEd.length(), Spanned.SPAN_EXCLUSIVE_EXCLUSIVE); 
                fullHeaderEd.setSpan(new android.text.style.StyleSpan(android.graphics.Typeface.BOLD), 0, fullHeaderEd.length(), Spanned.SPAN_EXCLUSIVE_EXCLUSIVE);
                ssbEditor.append(fullHeaderEd);
                
                int topSectionEnd = ssb.length();
                if (topSectionEnd > 0) {
                    ssb.setSpan(new IgnoredInCopySpan(), 0, topSectionEnd, Spanned.SPAN_EXCLUSIVE_EXCLUSIVE);
                }
                int edHeaderEnd = ssbEditor.length();
                if (edHeaderEnd > 0) {
                    ssbEditor.setSpan(new IgnoredInCopySpan(), 0, edHeaderEnd, Spanned.SPAN_EXCLUSIVE_EXCLUSIVE);
                }
                
                baseOffsetObj[0] = ssb.length();
                ssb.append(ssbFull);
                ssbEditor.append(ssbFullEditor);
                
                if (edHeaderEnd > 0 && ssbEditor.length() > edHeaderEnd) {
                    ssbEditor.setSpan(new HeaderEndSpan(), edHeaderEnd, edHeaderEnd + 1, Spanned.SPAN_EXCLUSIVE_EXCLUSIVE);
                }
                
                lastEditorSpannable = ssbEditor;
                
                if (lastSavedHistoryFileId != null && !allSentencesBlocks.isEmpty()) {
                    try {
                        File dir = new File(getFilesDir(), "history");
                        String blocksJson = serializeBlocks(allSentencesBlocks);
                        FileOutputStream fosBlocks = new FileOutputStream(new File(dir, lastSavedHistoryFileId + "_blocks.json"));
                        fosBlocks.write(blocksJson.getBytes("UTF-8"));
                        fosBlocks.close();
                    } catch (Exception e) {}
                }
                
                outputText.setText(ssb); outputText.setMovementMethod(LinkMovementMethod.getInstance()); outputText.setHighlightColor(Color.TRANSPARENT);
            }
        }
        EOF

        wget -q https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.jar -O gradle/wrapper/gradle-wrapper.jar
        wget -q https://raw.githubusercontent.com/gradle/gradle/master/gradlew -O gradlew
        chmod +x gradlew

        cat << 'EOF' > gradle/wrapper/gradle-wrapper.properties
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-7.5-bin.zip
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        EOF

    - name: set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    - name: Build APK (Release mode)
      run: |
        ./gradlew assembleRelease --stacktrace --console=plain > build_output.log 2>&1 || {
          echo "### ❌ 编译未通过！以下是具体报错信息：" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`text" >> $GITHUB_STEP_SUMMARY
          tail -n 300 build_output.log >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔍 关键错误提取：" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`text" >> $GITHUB_STEP_SUMMARY
          grep -E "error:|ERROR:|FAILED|Exception|cannot find symbol|method does not" build_output.log | head -30 >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          exit 1
        }

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Dededi-App-APK-Pro
        path: app/build/outputs/apk/release/app-release.apk
                            
