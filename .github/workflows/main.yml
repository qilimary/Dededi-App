            private boolean hasError(List<TextBlock> clause) {
                for (TextBlock b : clause) {
                    if (b.isMutable && !b.current.equals(b.original)) return true;
                }
                return false;
            }

            private String getCleanText() {
                StringBuilder sb = new StringBuilder();
                for (List<TextBlock> sentence : allSentencesBlocks) {
                    for (TextBlock b : sentence) {
                        sb.append(b.current);
                    }
                }
                return sb.toString();
            }

