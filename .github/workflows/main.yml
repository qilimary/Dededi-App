            @Override
            protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                super.onActivityResult(requestCode, resultCode, data);
                if (requestCode == 201) {
                    if (android.os.Build.VERSION.SDK_INT >= android.os.Build.VERSION_CODES.M && android.provider.Settings.canDrawOverlays(this)) {
                        startFloatingService();
                    } else { Toast.makeText(this, "悬浮窗权限未被授予，无法开启", Toast.LENGTH_SHORT).show(); }
                }
                if (requestCode == 101 && resultCode == RESULT_OK && data != null && data.getData() != null) {
                    try {
                        OutputStream os = getContentResolver().openOutputStream(data.getData());
                        if (os != null) {
                            if (saveFormat == 0) {
                                os.write(getCleanText().getBytes(StandardCharsets.UTF_8));
                            } else if (saveFormat == 1) {
                                android.graphics.pdf.PdfDocument pdf = new android.graphics.pdf.PdfDocument();
                                android.text.TextPaint paint = new android.text.TextPaint();
                                paint.setTextSize(14); paint.setColor(Color.BLACK);
                                android.text.StaticLayout sl = new android.text.StaticLayout(getCleanText(), paint, 555, android.text.Layout.Alignment.ALIGN_NORMAL, 1.5f, 0.0f, false);
                                int textHeight = sl.getHeight() + 40; int pageHeight = Math.max(842, textHeight);
                                android.graphics.pdf.PdfDocument.PageInfo pageInfo = new android.graphics.pdf.PdfDocument.PageInfo.Builder(595, pageHeight, 1).create();
                                android.graphics.pdf.PdfDocument.Page page = pdf.startPage(pageInfo);
                                android.graphics.Canvas canvas = page.getCanvas();
                                canvas.translate(20, 20); sl.draw(canvas);
                                pdf.finishPage(page); pdf.writeTo(os); pdf.close();
                            } else if (saveFormat == 2) {
                                java.util.zip.ZipOutputStream zos = new java.util.zip.ZipOutputStream(os);
                                zos.putNextEntry(new java.util.zip.ZipEntry("[Content_Types].xml"));
                                zos.write(("<?xml version=\"1.0\" encoding=\"UTF-8\"?><Types xmlns=\"http://schemas.openxmlformats.org/package/2006/content-types\"><Default Extension=\"rels\" ContentType=\"application/vnd.openxmlformats-package.relationships+xml\"/><Override PartName=\"/word/document.xml\" ContentType=\"application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml\"/></Types>").getBytes(StandardCharsets.UTF_8));
                                zos.closeEntry(); zos.putNextEntry(new java.util.zip.ZipEntry("_rels/.rels"));
                                zos.write(("<?xml version=\"1.0\" encoding=\"UTF-8\"?><Relationships xmlns=\"http://schemas.openxmlformats.org/package/2006/relationships\"><Relationship Id=\"rId1\" Type=\"http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument\" Target=\"word/document.xml\"/></Relationships>").getBytes(StandardCharsets.UTF_8));
                                zos.closeEntry(); zos.putNextEntry(new java.util.zip.ZipEntry("word/document.xml"));
                                String safeText = getCleanText().replace("&", "&amp;").replace("<", "&lt;").replace(">", "&gt;");
                                StringBuilder docxContent = new StringBuilder("<?xml version=\"1.0\" encoding=\"UTF-8\"?><w:document xmlns:w=\"http://schemas.openxmlformats.org/wordprocessingml/2006/main\"><w:body>");
                                for(String p : safeText.split("\n")) { docxContent.append("<w:p><w:r><w:t>").append(p).append("</w:t></w:r></w:p>"); }
                                docxContent.append("</w:body></w:document>");
                                zos.write(docxContent.toString().getBytes(StandardCharsets.UTF_8));
                                zos.closeEntry(); zos.close();
                            } else if (saveFormat == 3) {
                                android.text.TextPaint paint = new android.text.TextPaint();
                                paint.setTextSize(40); paint.setColor(Color.BLACK); paint.setAntiAlias(true);
                                String cleanText = getCleanText();
                                if (cleanText.isEmpty()) cleanText = "无内容";
                                android.text.StaticLayout sl = new android.text.StaticLayout(cleanText, paint, 1000, android.text.Layout.Alignment.ALIGN_NORMAL, 1.5f, 0.0f, false);
                                android.graphics.Bitmap bitmap = android.graphics.Bitmap.createBitmap(1080, sl.getHeight() + 80, android.graphics.Bitmap.Config.ARGB_8888);
                                android.graphics.Canvas canvas = new android.graphics.Canvas(bitmap);
                                canvas.drawColor(Color.WHITE);
                                canvas.translate(40, 40);
                                sl.draw(canvas);
                                bitmap.compress(android.graphics.Bitmap.CompressFormat.JPEG, 90, os);
                                bitmap.recycle();
                            }
                            os.close(); Toast.makeText(this, "保存成功", Toast.LENGTH_SHORT).show();
                        }
                    } catch (Exception e) { Toast.makeText(this, "保存过程出现错误", Toast.LENGTH_SHORT).show(); }
                }
            }

            private void loadVocab(Map<String, Long> map, String assetName) throws Exception {
                InputStream is = getAssets().open(assetName);
                byte[] buffer = new byte[is.available()];
                is.read(buffer); is.close();
                JSONObject json = new JSONObject(new String(buffer, StandardCharsets.UTF_8));
                Iterator<String> keys = json.keys();
                while(keys.hasNext()) { String key = keys.next(); map.put(key, (long) json.getInt(key)); }
            }

            private Module loadDecryptedModule(Context context, String assetName, String cacheKey) throws Exception {
                File cacheFile = new File(context.getFilesDir(), cacheKey + ".ptl");
                if (cacheFile.exists() && cacheFile.length() > 0) {
                    try { return LiteModuleLoader.load(cacheFile.getAbsolutePath()); } catch (Exception e) { cacheFile.delete(); }
                }
                byte[] keyBytes = getSecretKey(); byte[] ivBytes = getSecretIV();
                Cipher cipher = Cipher.getInstance("AES/CBC/PKCS5Padding");
                cipher.init(Cipher.DECRYPT_MODE, new SecretKeySpec(keyBytes, "AES"), new IvParameterSpec(ivBytes));
                File tempFile = new File(context.getFilesDir(), cacheKey + "_tmp.ptl");
                try (InputStream is = context.getAssets().open(assetName); CipherInputStream cis = new CipherInputStream(is, cipher); GZIPInputStream gis = new GZIPInputStream(cis); FileOutputStream os = new FileOutputStream(tempFile)) {
                    byte[] buffer = new byte[8192]; int read; while ((read = gis.read(buffer)) != -1) os.write(buffer, 0, read);
                    os.flush();
                }
                tempFile.renameTo(cacheFile); return LiteModuleLoader.load(cacheFile.getAbsolutePath());
            }

            private void doInference(boolean isFastMode) {
                String text = inputText.getText().toString();
                if (text.isEmpty()) return;

                btnCheck.setEnabled(false); btnCopy.setEnabled(false); btnSaveTxt.setEnabled(false);
                final float temp, tDe, tDi, tDe3;
                float t1 = 1.0f, t2 = 0.70f, t3 = 0.75f, t4 = 0.75f;
                try {
                    t1 = Float.parseFloat(editTemp.getText().toString()); t2 = Float.parseFloat(editThreshDe1.getText().toString());
                    t3 = Float.parseFloat(editThreshDe2.getText().toString()); t4 = Float.parseFloat(editThreshDe3.getText().toString());
                } catch (Exception ignored) {}
                temp = t1; tDe = t2; tDi = t3; tDe3 = t4;

                new Thread(() -> {
                    try {
                        runOnUiThread(() -> { getWindow().addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON); progressBar.setVisibility(View.VISIBLE); progressBar.setProgress(0); });
                        long startTime = System.currentTimeMillis();
                        String[] labels = {"的", "地", "得"};
                        String[] sentences = text.split("(?<=[。！？!?\n])");
                        runOnUiThread(() -> progressBar.setMax(sentences.length));
                        allSentencesBlocks.clear(); StringBuilder liveErrorsHtml = new StringBuilder(); long lastUIUpdateTime = System.currentTimeMillis();

                        for (int sIdx = 0; sIdx < sentences.length; sIdx++) {
                            String sentence = sentences[sIdx];
                            if (sentence.isEmpty()) continue;
                            List<TextBlock> currentSentenceBlocks = new ArrayList<>();
                            boolean[] isIgnored = new boolean[sentence.length()];
                            for (String w : IGNORE_WORDS) {
                                int idx = sentence.indexOf(w);
                                while (idx >= 0) { for (int k = 0; k < w.length(); k++) isIgnored[idx + k] = true; idx = sentence.indexOf(w, idx + 1); }
                            }

                            boolean hasTarget = false;
                            for (int i = 0; i < sentence.length(); i++) {
                                char c = sentence.charAt(i);
                                if ((c == '的' || c == '地' || c == '得') && !isIgnored[i]) { hasTarget = true; break; }
                            }

                            if (!hasTarget) {
                                currentSentenceBlocks.add(new TextBlock(sentence, sentence, false, 0f));
                            } else {
                                float[] scores;
                                int vocabSize = isFastMode ? 3 : proVocab.size();
                                if (isFastMode) {
                                    long fUnk = fastVocab.getOrDefault("[UNK]", 1L); long fMask = fastVocab.getOrDefault("[MASK]", 2L);
                                    long[] ids = new long[sentence.length()];
                                    for (int i = 0; i < sentence.length(); i++) {
                                        String ch = String.valueOf(sentence.charAt(i));
                                        if (!isIgnored[i] && (ch.equals("的") || ch.equals("地") || ch.equals("得"))) ids[i] = fMask;
                                        else ids[i] = fastVocab.getOrDefault(ch, fUnk);
                                    }
                                    Tensor inputTensor = Tensor.fromBlob(ids, new long[]{1, sentence.length()});
                                    scores = fastModule.forward(IValue.from(inputTensor)).toTensor().getDataAsFloatArray();
                                } else {
                                    int exactLen = sentence.length() + 2;
                                    long[] ids = new long[exactLen]; long[] masks = new long[exactLen]; long[] types = new long[exactLen];
                                    ids[0] = clsId; masks[0] = 1; types[0] = 0;
                                    for (int i = 0; i < sentence.length(); i++) {
                                        String ch = String.valueOf(sentence.charAt(i));
                                        if (!isIgnored[i] && (ch.equals("的") || ch.equals("地") || ch.equals("得"))) ids[i + 1] = maskId;
                                        else ids[i + 1] = proVocab.getOrDefault(ch, unkId);
                                        masks[i + 1] = 1; types[i + 1] = 0;
                                    }
                                    ids[exactLen - 1] = sepId; masks[exactLen - 1] = 1; types[exactLen - 1] = 0;
                                    Tensor tIds = Tensor.fromBlob(ids, new long[]{1, exactLen}); Tensor tMasks = Tensor.fromBlob(masks, new long[]{1, exactLen}); Tensor tTypes = Tensor.fromBlob(types, new long[]{1, exactLen});
                                    IValue outputVal = proModule.forward(IValue.from(tIds), IValue.from(tMasks), IValue.from(tTypes));
                                    Tensor outTensor = outputVal.isTuple() ? outputVal.toTuple()[0].toTensor() : outputVal.toTensor();
                                    scores = outTensor.getDataAsFloatArray();
                                }

                                StringBuilder normalText = new StringBuilder();
                                Runnable flushNormal = () -> {
                                    if(normalText.length() > 0) { currentSentenceBlocks.add(new TextBlock(normalText.toString(), normalText.toString(), false, 0f)); normalText.setLength(0); }
                                };

                                for (int i = 0; i < sentence.length(); i++) {
                                    char ch = sentence.charAt(i);
                                    if (isIgnored[i] || (ch != '的' && ch != '地' && ch != '得')) {
                                        normalText.append(ch);
                                        if (ch == '，' || ch == ',' || ch == '；' || ch == ';' || ch == '、' || ch == '\n') flushNormal.run();
                                        continue;
                                    }
                                    flushNormal.run();
                                    
                                    float s0, s1, s2;
                                    if (isFastMode) {
                                        int base = i * 3; s0 = (float) Math.exp(scores[base] / temp); s1 = (float) Math.exp(scores[base + 1] / temp); s2 = (float) Math.exp(scores[base + 2] / temp);
                                    } else {
                                        int seqPos = i + 1; 
                                        s0 = (float) Math.exp(scores[seqPos * vocabSize + (int)deId] / temp); s1 = (float) Math.exp(scores[seqPos * vocabSize + (int)diId] / temp); s2 = (float) Math.exp(scores[seqPos * vocabSize + (int)de2Id] / temp);
                                    }
                                    float sum = s0 + s1 + s2; float p0 = s0 / sum, p1 = s1 / sum, p2 = s2 / sum;
                                    int maxIdx = 0; float maxProb = p0;
                                    if (p1 > maxProb) { maxProb = p1; maxIdx = 1; }
                                    if (p2 > maxProb) { maxProb = p2; maxIdx = 2; }
                                    float threshold = maxIdx == 1 ? tDi : (maxIdx == 2 ? tDe3 : tDe);
                                    String pred = labels[maxIdx];
                                    boolean changed = !pred.equals(String.valueOf(ch)) && maxProb >= threshold;
                                    currentSentenceBlocks.add(new TextBlock(String.valueOf(ch), changed ? pred : String.valueOf(ch), true, maxProb));
                                }
                                flushNormal.run();

                                List<List<TextBlock>> clauses = new ArrayList<>(); List<TextBlock> currentClause = new ArrayList<>();
                                for (TextBlock b : currentSentenceBlocks) {
                                    currentClause.add(b); char lastChar = b.original.charAt(b.original.length() - 1);
                                    if (lastChar == '，' || lastChar == ',' || lastChar == '；' || lastChar == ';' || lastChar == '、' || lastChar == '\n') { clauses.add(currentClause); currentClause = new ArrayList<>(); }
                                }
                                if (!currentClause.isEmpty()) clauses.add(currentClause);
                                
                                boolean sentenceHasError = false; StringBuilder sentenceErrorHtml = new StringBuilder();
                                for (List<TextBlock> clause : clauses) {
                                    if (hasError(clause)) {
                                        sentenceHasError = true;
                                        for (TextBlock b : clause) {
                                            if (b.isMutable && !b.current.equals(b.original)) {
                                                sentenceErrorHtml.append("<font color='#9E9E9E'><s>").append(b.original).append("</s></font> <font color='#E53935'><b>").append(b.current).append("</b></font><font color='#9E9E9E'><small>(置信度: ").append(String.format("%.2f", b.conf)).append(")</small></font>");
                                            } else { sentenceErrorHtml.append(b.original); }
                                        }
                                    }
                                }
                                if (sentenceHasError) liveErrorsHtml.append(sentenceErrorHtml.toString()).append("<br><br>");
                            }
                            allSentencesBlocks.add(currentSentenceBlocks);
                            long now = System.currentTimeMillis(); final int currentProgress = sIdx + 1;
                            if (now - lastUIUpdateTime > 300 || currentProgress == sentences.length) {
                                lastUIUpdateTime = now;
                                final String progHtml = "<b>AI 正在审查中...</b><br>已耗时 " + String.format("%.1f", (now-startTime)/1000.0) + " 秒<br>进度：" + currentProgress + " / " + sentences.length + "<br><br>" + (liveErrorsHtml.length() > 0 ? "<b><font color='#757575'>【实时更正记录】：</font></b><br>" + liveErrorsHtml.toString() : "");
                                runOnUiThread(() -> {
                                    progressBar.setProgress(currentProgress); outputText.setText(Html.fromHtml(progHtml, Html.FROM_HTML_MODE_COMPACT));
                                    if (autoScrollEnabled) scrollView.post(() -> scrollView.fullScroll(View.FOCUS_DOWN)); 
                                });
                            }
                        }
                        lastTimeMs = System.currentTimeMillis() - startTime;
                        runOnUiThread(() -> { renderFinalBlocks(); btnCheck.setEnabled(true); btnCopy.setEnabled(true); btnSaveTxt.setEnabled(true); scrollView.post(() -> scrollView.fullScroll(View.FOCUS_UP)); });
                    } catch (Exception e) {
                        final String err = e.getMessage(); runOnUiThread(() -> { outputText.setText("推理运行中断: " + err); btnCheck.setEnabled(true); });
                    } finally { runOnUiThread(() -> { getWindow().clearFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON); progressBar.setVisibility(View.INVISIBLE); }); }
                }).start();
            }

            private void showEditDialog(TextBlock b) {
                String[] options = {"的", "地", "得", "还原为原字 (" + b.original + ")"};
                new AlertDialog.Builder(this).setTitle("手动修改 (当前：" + b.current + ")").setItems(options, (dialog, which) -> {
                    if (which == 0) b.current = "的"; else if (which == 1) b.current = "地"; else if (which == 2) b.current = "得"; else if (which == 3) b.current = b.original;
                    renderFinalBlocks(); 
                }).show();
            }

            private void renderFinalBlocks() {
                SpannableStringBuilder ssb = new SpannableStringBuilder();
                int currentErrors = 0;
                for (List<TextBlock> sentence : allSentencesBlocks) { for (TextBlock b : sentence) { if (b.isMutable && !b.current.equals(b.original)) currentErrors++; } }
                if (currentErrors == 0) {
                    String header = "检查完毕！未检测到“的地得”误用。耗时 " + String.format("%.2f", lastTimeMs/1000.0) + " 秒。\n\n";
                    SpannableString headerSp = new SpannableString(header); headerSp.setSpan(new ForegroundColorSpan(0xFF4CAF50), 0, header.length(), Spanned.SPAN_EXCLUSIVE_EXCLUSIVE); ssb.append(headerSp);
                } else {
                    String header = "检查完毕！共更正 " + currentErrors + " 处。耗时 " + String.format("%.2f", lastTimeMs/1000.0) + " 秒。\n（点击带下划线的字可手动修改）\n\n";
                    SpannableString headerSp = new SpannableString(header); headerSp.setSpan(new ForegroundColorSpan(0xFF757575), 0, header.length(), Spanned.SPAN_EXCLUSIVE_EXCLUSIVE); ssb.append(headerSp);
                    SpannableString listHeader = new SpannableString("【更正清单：】\n"); listHeader.setSpan(new ForegroundColorSpan(0xFF757575), 0, listHeader.length(), Spanned.SPAN_EXCLUSIVE_EXCLUSIVE); listHeader.setSpan(new android.text.style.StyleSpan(android.graphics.Typeface.BOLD), 0, listHeader.length(), Spanned.SPAN_EXCLUSIVE_EXCLUSIVE); ssb.append(listHeader);
                    for (List<TextBlock> sentence : allSentencesBlocks) {
                        List<List<TextBlock>> clauses = new ArrayList<>(); List<TextBlock> currentClause = new ArrayList<>();
                        for (TextBlock b : sentence) {
                            currentClause.add(b); char lastChar = b.original.charAt(b.original.length() - 1);
                            if (lastChar == '，' || lastChar == ',' || lastChar == '；' || lastChar == ';' || lastChar == '、' || lastChar == '\n') { clauses.add(currentClause); currentClause = new ArrayList<>(); }
                        }
                        if (!currentClause.isEmpty()) clauses.add(currentClause);
                        boolean hasAnyError = false;
                        for (List<TextBlock> clause : clauses) {
                            if (hasError(clause)) {
                                hasAnyError = true;
                                for (TextBlock b : clause) {
                                    if (b.isMutable && !b.current.equals(b.original)) {
                                        int stStart = ssb.length(); ssb.append(b.original); ssb.setSpan(new StrikethroughSpan(), stStart, ssb.length(), Spanned.SPAN_EXCLUSIVE_EXCLUSIVE); ssb.setSpan(new ForegroundColorSpan(0xFF9E9E9E), stStart, ssb.length(), Spanned.SPAN_EXCLUSIVE_EXCLUSIVE); ssb.append(" ");
                                        int newStart = ssb.length(); ssb.append(b.current);
                                        ClickableSpan clickSpan = new ClickableSpan() {
                                            @Override public void onClick(View w) { showEditDialog(b); }
                                            @Override public void updateDrawState(TextPaint ds) { ds.setColor(0xFFE53935); ds.setTypeface(android.graphics.Typeface.DEFAULT_BOLD); ds.setUnderlineText(true); }
                                        };
                                        ssb.setSpan(clickSpan, newStart, ssb.length(), Spanned.SPAN_EXCLUSIVE_EXCLUSIVE);
                                        int confStart = ssb.length(); ssb.append("(置信度: ").append(String.format("%.2f", b.conf)).append(")"); ssb.setSpan(new ForegroundColorSpan(0xFF9E9E9E), confStart, ssb.length(), Spanned.SPAN_EXCLUSIVE_EXCLUSIVE); ssb.setSpan(new android.text.style.RelativeSizeSpan(0.85f), confStart, ssb.length(), Spanned.SPAN_EXCLUSIVE_EXCLUSIVE);
                                    } else { ssb.append(b.current); }
                                }
                            }
                        }
                        if (hasAnyError) ssb.append("\n\n");
                    }
                    SpannableString sep = new SpannableString("---------------------------------\n\n"); sep.setSpan(new ForegroundColorSpan(0xFF757575), 0, sep.length(), Spanned.SPAN_EXCLUSIVE_EXCLUSIVE); ssb.append(sep);
                }
                SpannableString fullHeader = new SpannableString(currentErrors > 0 ? "【修正后的全文】\n" : "【原文】\n"); fullHeader.setSpan(new ForegroundColorSpan(0xFF757575), 0, fullHeader.length(), Spanned.SPAN_EXCLUSIVE_EXCLUSIVE); fullHeader.setSpan(new android.text.style.StyleSpan(android.graphics.Typeface.BOLD), 0, fullHeader.length(), Spanned.SPAN_EXCLUSIVE_EXCLUSIVE); ssb.append(fullHeader);
                for (List<TextBlock> sentence : allSentencesBlocks) {
                    for (TextBlock b : sentence) {
                        int start = ssb.length(); ssb.append(b.current);
                        if (b.isMutable) {
                            ClickableSpan span = new ClickableSpan() {
                                @Override public void onClick(View widget) { showEditDialog(b); }
                                @Override public void updateDrawState(TextPaint ds) {
                                    ds.setUnderlineText(true);
                                    if (!b.current.equals(b.original)) { ds.setColor(0xFFE53935); ds.setTypeface(android.graphics.Typeface.DEFAULT_BOLD); } else { ds.setColor(0xFF2196F3); }
                                }
                            };
                            ssb.setSpan(span, start, ssb.length(), Spanned.SPAN_EXCLUSIVE_EXCLUSIVE);
                        }
                    }
                }
                outputText.setText(ssb); outputText.setMovementMethod(LinkMovementMethod.getInstance()); outputText.setHighlightColor(Color.TRANSPARENT);
            }
        }
        EOF

        wget -q https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.jar -O gradle/wrapper/gradle-wrapper.jar
        wget -q https://raw.githubusercontent.com/gradle/gradle/master/gradlew -O gradlew
        chmod +x gradlew

        cat << 'EOF' > gradle/wrapper/gradle-wrapper.properties
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-7.5-bin.zip
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        EOF

    - name: set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    - name: Build APK (Release mode)
      run: |
        ./gradlew assembleRelease --stacktrace --console=plain > build_output.log 2>&1 || {
          echo "### ❌ 编译未通过！以下是具体报错信息：" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`text" >> $GITHUB_STEP_SUMMARY
          tail -n 100 build_output.log >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          exit 1
        }

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Dededi-App-APK-Pro
        path: app/build/outputs/apk/release/app-release.apk
