        cat << 'EOF' > app/src/main/java/com/app/dededi/FilePickerActivity.java
        package com.app.dededi;
        import android.app.Activity;
        import android.content.Intent;
        import android.net.Uri;
        import android.os.Bundle;
        import android.widget.Toast;

        public class FilePickerActivity extends Activity {
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                Toast.makeText(this, "支持 txt、md、docx、pptx、pdf 及图片格式", Toast.LENGTH_SHORT).show();
                Intent intent = new Intent(Intent.ACTION_GET_CONTENT);
                intent.setType("*/*");
                intent.putExtra(Intent.EXTRA_MIME_TYPES, new String[]{"text/plain", "text/markdown", "application/vnd.openxmlformats-officedocument.wordprocessingml.document", "application/vnd.openxmlformats-officedocument.presentationml.presentation", "application/pdf", "image/*"});
                startActivityForResult(intent, 103);
            }

            @Override
            protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                super.onActivityResult(requestCode, resultCode, data);
                if (requestCode == 103 && resultCode == RESULT_OK && data != null) {
                    Uri uri = data.getData();
                    if (uri != null) {
                        Toast.makeText(this, "正在处理导入文件...", Toast.LENGTH_SHORT).show();
                        MainActivity.extractTextFromUriAsync(this, uri, new MainActivity.TextExtractCallback() {
                            @Override public void onStart() {}
                            @Override public void onProgress(int progress, int max) {}
                            @Override public void onExtracted(String text) {
                                if (text != null && !text.trim().isEmpty()) {
                                    Intent serviceIntent = new Intent(FilePickerActivity.this, FloatingService.class);
                                    serviceIntent.putExtra("IMPORTED_TEXT", text);
                                    startService(serviceIntent);
                                } else {
                                    Toast.makeText(FilePickerActivity.this, "无法读取文件内容或内容为空", Toast.LENGTH_SHORT).show();
                                }
                                finish();
                            }
                        });
                        return; // Async call handles finish
                    }
                }
                finish();
            }
        }
        EOF

