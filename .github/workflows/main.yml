                            "专业版：模型参数量大，推理速度较慢，精确率极高，错误率少。\n" +
                            "注：不同性能的手机在推理速度上会有不同，性能越强的手机推理速度越快。\n" +
                            "神经网络可能会犯一些低级错误，这是通病，在所难免。\n\n" +
                            "【温度参数】\n" +
                            "控制AI判断的果断程度。\n" +
                            "• 值越低（如0.5）：概率分布越尖锐。模型更自信（置信度更高），更激进，修改量可能上升，因为更不容易被拦截。\n" +
                            "• 值越高（如2.0）：概率分布越平缓。模型更保守（置信度更低），修改量可能下降，因为更容易被拦截。\n" +
                            "• 默认1.0～1.2，适合大多数场景\n\n" +
                            "示例：AI预测某处应为\"地\"\n" +
                            "• 温度0.5 → 置信度升高，更容易触发修改\n" +
