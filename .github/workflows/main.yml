            public static class WavyUnderlineSpan extends android.text.style.ReplacementSpan {
                private int color;
                private android.graphics.Paint wavePaint;
                private android.graphics.Path wavePath;
                public WavyUnderlineSpan(int color) {
                    this.color = color;
                    wavePaint = new android.graphics.Paint(android.graphics.Paint.ANTI_ALIAS_FLAG);
                    wavePaint.setColor(color);
                    wavePaint.setStyle(android.graphics.Paint.Style.STROKE);
                    wavePaint.setStrokeWidth(3.5f);
                    wavePath = new android.graphics.Path();
                }
                @Override
                public int getSize(android.graphics.Paint paint, CharSequence text, int start, int end, android.graphics.Paint.FontMetricsInt fm) {
                    return (int) paint.measureText(text, start, end);
                }
                @Override
                public void draw(android.graphics.Canvas canvas, CharSequence text, int start, int end, float x, int top, int y, int bottom, android.graphics.Paint paint) {
                    canvas.drawText(text, start, end, x, y, paint);
                    float width = paint.measureText(text, start, end);
                    wavePath.reset();
                    float waveLength = 12f;
                    float amplitude = 2.5f;
                    float startX = x;
                    float endX = x + width;
                    float currentY = y + paint.getFontMetrics().descent + 3;
                    wavePath.moveTo(startX, currentY);
                    for (float i = startX; i < endX; i += waveLength) {
                        float nextX = Math.min(i + waveLength, endX);
                        wavePath.quadTo(i + waveLength / 4, currentY - amplitude, i + waveLength / 2, currentY);
                        wavePath.quadTo(i + waveLength * 3 / 4, currentY + amplitude, nextX, currentY);
                    }
                    canvas.drawPath(wavePath, wavePaint);
                }
            }

            public static String extractCleanTextFromSpanned(Spanned sp) {
                if (sp == null) return "";
                StringBuilder sb = new StringBuilder();
                IgnoredInCopySpan[] spans = sp.getSpans(0, sp.length(), IgnoredInCopySpan.class);
                boolean[] ignore = new boolean[sp.length()];
                for (IgnoredInCopySpan span : spans) {
                    int start = sp.getSpanStart(span);
                    int end = sp.getSpanEnd(span);
                    for (int i = start; i < end; i++) {
                        if (i >= 0 && i < ignore.length) ignore[i] = true;
                    }
                }
                for (int i = 0; i < sp.length(); i++) {
                    if (!ignore[i]) sb.append(sp.charAt(i));
                }
                return sb.toString();
            }

