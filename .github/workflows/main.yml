name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Python Dependencies
      run: pip install gdown torch pycryptodome

    - name: Download, Unzip and Preprocess Pro Model
      run: |
        echo "正在利用云端从 Google Drive 下载专业版大模型..."
        gdown 10NTeKyG6JigASVwsekKs3MJl0Ev4Oj29 -O dededi_mobile_model_quantized.zip
        
        echo "正在解压..."
        unzip -o dededi_mobile_model_quantized.zip
        
        cat << 'EOF' > convert.py
        import json
        import torch
        import os
        from torch.utils.mobile_optimizer import optimize_for_mobile
        
        model_path = None
        vocab_path = None
        for root, dirs, files in os.walk('.'):
            if 'model_traced.pt' in files:
                model_path = os.path.join(root, 'model_traced.pt')
            if 'tokenizer.json' in files:
                vocab_path = os.path.join(root, 'tokenizer.json')
                
        with open(vocab_path, 'r', encoding='utf-8') as f:
            data = json.load(f)
        raw_vocab = data['model']['vocab']
        clean_vocab = {token: int(idx) for token, idx in raw_vocab.items()}
        with open('roberta_vocab.json', 'w', encoding='utf-8') as f:
            json.dump(clean_vocab, f, ensure_ascii=False)
            
        model = torch.jit.load(model_path)
        optimized_model = optimize_for_mobile(model)
        optimized_model._save_for_lite_interpreter('roberta_mobile.ptl')
        EOF
        
        python convert.py

    - name: Compress and Encrypt Models (Size & Security)
      run: |
        cat << 'EOF' > encrypt.py
        import os
        import gzip
        from Crypto.Cipher import AES
        from Crypto.Util.Padding import pad

        KEY = b'xT9#mP2!qL5*vN8^cK4@bJ7$zR1%yW0&'
        IV = b'1234567890123456'

        def encrypt_file(file_in, file_out):
            if not os.path.exists(file_in): return
            with open(file_in, 'rb') as f: data = f.read()
            compressed_data = gzip.compress(data)
            cipher = AES.new(KEY, AES.MODE_CBC, IV)
            enc_data = cipher.encrypt(pad(compressed_data, AES.block_size))
            with open(file_out, 'wb') as f: f.write(enc_data)

        encrypt_file('dededi_mobile.ptl', 'sys_core_f.dat')
        encrypt_file('roberta_mobile.ptl', 'sys_core_p.dat')
        EOF
        python encrypt.py

    - name: Scaffold Android Project
      run: |
        mkdir -p app/src/main/java/com/app/dededi
        mkdir -p app/src/main/res/layout
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/values-night
        mkdir -p app/src/main/res/drawable
        mkdir -p app/src/main/res/mipmap-anydpi-v26
        mkdir -p app/src/main/assets
        mkdir -p app/src/main/cpp
        mkdir -p gradle/wrapper

        cp sys_core_f.dat app/src/main/assets/ || true
        cp sys_core_p.dat app/src/main/assets/
        cp student_vocab.json app/src/main/assets/ || true
        cp roberta_vocab.json app/src/main/assets/

        cat << 'EOF' > gradle.properties
        android.useAndroidX=true
        android.enableJetifier=true
        org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m
        EOF

        cat << 'EOF' > build.gradle
        buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath "com.android.tools.build:gradle:7.4.2" }
        }
        allprojects { repositories { google(); mavenCentral() } }
        EOF

        echo "include ':app'" > settings.gradle

        cat << 'EOF' > app/src/main/cpp/CMakeLists.txt
        cmake_minimum_required(VERSION 3.10.2)
        project("dededi")
        add_library(dededi SHARED native-lib.cpp)
        find_library(log-lib log)
        target_link_libraries(dededi ${log-lib})
        EOF

        cat << 'EOF' > app/src/main/cpp/native-lib.cpp
        #include <jni.h>

        extern "C" JNIEXPORT jbyteArray JNICALL
        Java_com_app_dededi_MainActivity_getSecretKey(JNIEnv* env, jobject) {
            char k[] = { (char)('x'^0x37), (char)('T'^0x37), (char)('9'^0x37), (char)('#'^0x37),
                         (char)('m'^0x37), (char)('P'^0x37), (char)('2'^0x37), (char)('!'^0x37),
                         (char)('q'^0x37), (char)('L'^0x37), (char)('5'^0x37), (char)('*'^0x37),
                         (char)('v'^0x37), (char)('N'^0x37), (char)('8'^0x37), (char)('^'^0x37),
                         (char)('c'^0x37), (char)('K'^0x37), (char)('4'^0x37), (char)('@'^0x37),
                         (char)('b'^0x37), (char)('J'^0x37), (char)('7'^0x37), (char)('$'^0x37),
                         (char)('z'^0x37), (char)('R'^0x37), (char)('1'^0x37), (char)('%'^0x37),
                         (char)('y'^0x37), (char)('W'^0x37), (char)('0'^0x37), (char)('&'^0x37) };
            jbyteArray ret = env->NewByteArray(32);
            jbyte bytes[32];
            for(int i=0; i<32; i++) bytes[i] = k[i] ^ 0x37;
            env->SetByteArrayRegion(ret, 0, 32, bytes);
            return ret;
        }

        extern "C" JNIEXPORT jbyteArray JNICALL
        Java_com_app_dededi_MainActivity_getSecretIV(JNIEnv* env, jobject) {
            char iv[] = { (char)('1'^0x37), (char)('2'^0x37), (char)('3'^0x37), (char)('4'^0x37),
                          (char)('5'^0x37), (char)('6'^0x37), (char)('7'^0x37), (char)('8'^0x37),
                          (char)('9'^0x37), (char)('0'^0x37), (char)('1'^0x37), (char)('2'^0x37),
                          (char)('3'^0x37), (char)('4'^0x37), (char)('5'^0x37), (char)('6'^0x37) };
            jbyteArray ret = env->NewByteArray(16);
            jbyte bytes[16];
            for(int i=0; i<16; i++) bytes[i] = iv[i] ^ 0x37;
            env->SetByteArrayRegion(ret, 0, 16, bytes);
            return ret;
        }
        EOF

