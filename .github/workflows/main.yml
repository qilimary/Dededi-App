name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Python Dependencies
      run: pip install gdown torch pycryptodome

    - name: Download, Unzip and Preprocess Pro Model
      run: |
        echo "正在利用云端从 Google Drive 下载专业版大模型..."
        gdown 10NTeKyG6JigASVwsekKs3MJl0Ev4Oj29 -O dededi_mobile_model_quantized.zip
        
        echo "正在解压..."
        unzip -o dededi_mobile_model_quantized.zip
        
        cat << 'EOF' > convert.py
        import json
        import torch
        import os
        from torch.utils.mobile_optimizer import optimize_for_mobile
        
        model_path = None
        vocab_path = None
        for root, dirs, files in os.walk('.'):
            if 'model_traced.pt' in files:
                model_path = os.path.join(root, 'model_traced.pt')
            if 'tokenizer.json' in files:
                vocab_path = os.path.join(root, 'tokenizer.json')
                
        with open(vocab_path, 'r', encoding='utf-8') as f:
            data = json.load(f)
        raw_vocab = data['model']['vocab']
        clean_vocab = {token: int(idx) for token, idx in raw_vocab.items()}
        with open('roberta_vocab.json', 'w', encoding='utf-8') as f:
            json.dump(clean_vocab, f, ensure_ascii=False)
            
        model = torch.jit.load(model_path)
        optimized_model = optimize_for_mobile(model)
        optimized_model._save_for_lite_interpreter('roberta_mobile.ptl')
        EOF
        
        python convert.py

    - name: Compress and Encrypt Models (Size & Security)
      run: |
        cat << 'EOF' > encrypt.py
        import os
        import gzip
        from Crypto.Cipher import AES
        from Crypto.Util.Padding import pad

        KEY = b'xT9#mP2!qL5*vN8^cK4@bJ7$zR1%yW0&'
        IV = b'1234567890123456'

        def encrypt_file(file_in, file_out):
            if not os.path.exists(file_in): return
            with open(file_in, 'rb') as f: data = f.read()
            compressed_data = gzip.compress(data)
            cipher = AES.new(KEY, AES.MODE_CBC, IV)
            enc_data = cipher.encrypt(pad(compressed_data, AES.block_size))
            with open(file_out, 'wb') as f: f.write(enc_data)

        encrypt_file('dededi_mobile.ptl', 'sys_core_f.dat')
        encrypt_file('roberta_mobile.ptl', 'sys_core_p.dat')
        EOF
        python encrypt.py

    - name: Scaffold Android Project
      run: |
        mkdir -p app/src/main/java/com/app/dededi
        mkdir -p app/src/main/res/layout
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/values-night
